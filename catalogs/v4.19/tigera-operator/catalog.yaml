        displayName: FelixConfiguration
        kind: FelixConfiguration
        name: felixconfigurations.crd.projectcalico.org
        version: v1
      - description: GlobalNetworkPolicy represents an ordered set of rules which
          are applied to a collection of endpoints that match a label selector.
        displayName: GlobalNetworkPolicy
        kind: GlobalNetworkPolicy
        name: globalnetworkpolicies.crd.projectcalico.org
        version: v1
      - description: GlobalNetworkSet represents an arbitrary set of IP subnetworks/CIDRs,
          allowing it to be matched by Calico policy. Network sets are useful for
          applying policy to traffic coming from (or going to) external, non-Calico,
          networks.
        displayName: GlobalNetworkSet
        kind: GlobalNetworkSet
        name: globalnetworksets.crd.projectcalico.org
        version: v1
      - description: HostEndpoint represents one or more real or virtual interfaces
          attached to a host that is running Calico. It enforces Calico policy on
          the traffic that is entering or leaving the host’s default network namespace
          through those interfaces.
        displayName: HostEndpoint
        kind: HostEndpoint
        name: hostendpoints.crd.projectcalico.org
        version: v1
      - kind: ImageSet
        name: imagesets.operator.tigera.io
        version: v1
      - description: Installation configures an installation of Calico or Calico Enterprise.
          At most one instance of this resource is supported. It must be named "default".
          The Installation API installs core networking and network policy components,
          and provides general install-time configuration.
        displayName: Installation
        kind: Installation
        name: installations.operator.tigera.io
        version: v1
      - description: IPAMBlock contains information about a block for IP address assignment.
        displayName: IPAMBlock
        kind: IPAMBlock
        name: ipamblocks.crd.projectcalico.org
        version: v1
      - description: IPAMConfig contains information about a block for IP address
          assignment.
        displayName: IPAMConfig
        kind: IPAMConfig
        name: ipamconfigs.crd.projectcalico.org
        version: v1
      - description: IPAMHandle contains information about an IPAMHandle resource.
        displayName: IPAMHandle
        kind: IPAMHandle
        name: ipamhandles.crd.projectcalico.org
        version: v1
      - description: IPPool represents a collection of IP addresses from which Calico
          expects endpoint IPs to be assigned.
        displayName: IPPool
        kind: IPPool
        name: ippools.crd.projectcalico.org
        version: v1
      - description: KubeControllersConfiguration represents configuration options
          for the Calico Kubernetes controllers.
        displayName: KubeControllersConfiguration
        kind: KubeControllersConfiguration
        name: kubecontrollersconfigurations.crd.projectcalico.org
        version: v1
      - description: NetworkPolicy represents an ordered set of rules which are applied
          to a collection of endpoints that match a label selector.
        displayName: NetworkPolicy
        kind: NetworkPolicy
        name: networkpolicies.crd.projectcalico.org
        version: v1
      - description: NetworkSet represents an arbitrary set of IP subnetworks/CIDRs,
          allowing it to be matched by Calico policy. Network sets are useful for
          applying policy to traffic coming from (or going to) external, non-Calico,
          networks.
        displayName: NetworkSet
        kind: NetworkSet
        name: networksets.crd.projectcalico.org
        version: v1
      - description: TigeraStatus represents the most recently observed status for
          Calico or a Calico Enterprise functional area.
        displayName: TigeraStatus
        kind: TigeraStatus
        name: tigerastatuses.operator.tigera.io
        version: v1
    description: 'An operator which manages the lifecycle of a Calico or Calico Enterprise
      installation on Kubernetes or OpenShift. Its goal is to make installation, upgrades,
      and ongoing lifecycle management of Calico and Calico Enterprise as simple and
      reliable as possible. **Important**: this operator should only be installed
      if the cluster was already provisioned with Calico.'
    displayName: Tigera Operator
    installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: true
      type: AllNamespaces
    keywords:
    - networking
    - security
    - monitoring
    links:
    - name: Calico Introduction
      url: https://docs.projectcalico.org/introduction/
    - name: Install an OpenShift 4 cluster with Calico
      url: https://docs.projectcalico.org/getting-started/openshift/installation
    maintainers:
    - email: maintainers@tigera.io
      name: Project Calico Maintainers
    maturity: stable
    provider:
      name: Tigera

    apiServiceDefinitions: {}
    crdDescriptions:
      owned:
      - description: BGPConfiguration represents BGP specific configuration options
          for the cluster or a specific node.
        displayName: BGPConfiguration
        kind: BGPConfiguration
        name: bgpconfigurations.crd.projectcalico.org
        version: v1
      - description: BGPPeer represents a remote BGP peer with which the node(s) in
          a Calico cluster will peer. Configuring BGP peers allows you to peer a Calico
          network with your datacenter fabric (e.g. ToR).
        displayName: BGPPeer
        kind: BGPPeer
        name: bgppeers.crd.projectcalico.org
        version: v1
      - description: BlockAffinity maintains a block affinity's state.
        displayName: BlockAffinity
        kind: BlockAffinity
        name: blockaffinities.crd.projectcalico.org
        version: v1
      - description: ClusterInformation contains the cluster specific information.
        displayName: ClusterInformation
        kind: ClusterInformation
        name: clusterinformations.crd.projectcalico.org
        version: v1
      - description: FelixConfiguration represents Felix configuration options for

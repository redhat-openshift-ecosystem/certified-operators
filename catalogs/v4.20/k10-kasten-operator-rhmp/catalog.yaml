      containerImage: registry.connect.redhat.com/kasten/k10-operator@sha256:15f3b113afdf67ce0888a56bfaa7a4416b32bf8b36a74db1ffa2254f9d83c49b
      createdAt: Wed Feb 26 04:43:29 AM UTC 2025
      description: Kasten data management platform for OpenShift, The Market Leader

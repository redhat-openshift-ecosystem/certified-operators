- type: olm.gvk
  value:
    group: apik10.kasten.io
    kind: K10restore
    version: v1alpha1
- type: olm.package
  value:
    packageName: k10-kasten-operator-rhmp
    version: 6.5.11
- type: olm.csv.metadata
  value:
    annotations:
      alm-examples: |-
        [
          {
            "apiVersion": "apik10.kasten.io/v1alpha1",
            "kind": "K10",
            "metadata": {
              "annotations": {
                "helm.sdk.operatorframework.io/rollback-force": "false"
              },
              "name": "k10"
            },
            "spec": {
              "auth": {
                "basicAuth": {
                  "enabled": false,
                  "htpasswd": "",
                  "secretName": ""
                },
                "tokenAuth": {

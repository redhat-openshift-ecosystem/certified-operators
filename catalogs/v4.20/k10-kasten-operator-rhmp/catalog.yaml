                }
              }
            }
          },
          {
            "apiVersion": "apik10.kasten.io/v1alpha1",
            "kind": "K10restore",
            "metadata": {
              "name": "k10restore"
            },
            "spec": {
              "pointInTime": null,
              "profileName": "",
              "skipResource": null,
              "sourceClusterID": ""
            }
          }
        ]
      capabilities: Full Lifecycle
      categories: Storage
      console.openshift.io/plugins: '["veeam-kasten-console-plugin"]'
      containerImage: registry.connect.redhat.com/kasten/k10-operator@sha256:4e8ccf38e47f92d2a308587591f85fb4f15aea1e7fd5c248803764c94eaecd4a
      createdAt: Wed Sep 24 02:11:59 PM UTC 2025
      description: Kasten data management platform for OpenShift, The Market Leader
        for Kubernetes Backup and DR
      features.operators.openshift.io/cnf: "false"
      features.operators.openshift.io/cni: "false"
      features.operators.openshift.io/csi: "false"
      features.operators.openshift.io/disconnected: "true"
      features.operators.openshift.io/fips-compliant: "false"
      features.operators.openshift.io/proxy-aware: "false"
      features.operators.openshift.io/tls-profiles: "false"
      features.operators.openshift.io/token-auth-aws: "false"
      features.operators.openshift.io/token-auth-azure: "false"
      features.operators.openshift.io/token-auth-gcp: "false"
      marketplace.openshift.io/remote-workflow: https://marketplace.redhat.com/en-us/operators/k10-kasten-operator-rhmp/pricing?utm_source=openshift_console
      marketplace.openshift.io/support-workflow: https://marketplace.redhat.com/en-us/operators/k10-kasten-operator-rhmp/support?utm_source=openshift_console
      operatorframework.io/suggested-namespace: kasten-io
      operators.operatorframework.io/builder: operator-sdk-v1.35.0
      operators.operatorframework.io/project_layout: helm.sdk.operatorframework.io/v1
      support: contact@kasten.io
    apiServiceDefinitions: {}
    crdDescriptions:
      owned:
      - description: |-
          k10restore can recover the K10 platform in case of a variety of disasters such as
          the accidental deletion of K10, failure of underlying storage that K10 uses for its catalog,
          or even the accidental destruction of the Kubernetes cluster on which K10 is deployed.

          **Before creating k10restore**: [K10 Disaster Recovery documentation](https://docs.kasten.io/latest/operating/dr.html#recovering-with-the-operator)
        kind: K10restore
        name: k10restores.apik10.kasten.io
        specDescriptors:
        - description: Required - The cluster ID shown when enabling k10 backup
          displayName: Cluster ID
          path: sourceClusterID
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Required - Name of the location profile used for backup
          displayName: Profile name
          path: profileName
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Optional - Point in time (RFC3339) at which to evaluate restore
            data. Eg. "2022-01-02T15:04:05Z"
          displayName: Point in time
          path: pointInTime
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Optional - Specify if restore of policies, profiles or secrets
            need to be skipped. Eg. "profiles,policies"
          displayName: Resources to skip
          path: skipResource
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Enable reading the K10 Disaster Recovery passphrase from a
            HashiCorp Vault instance
          displayName: Enable HashiCorp Vault
          path: vault.enabled
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - description: Vault server address
          displayName: Address
          path: vault.address
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:vault.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: |-
            Required when Vault authentication uses a Kubernetes service account token.
            Name of the Vault Kubernetes authentication role binding the K10 service account and namespace to the Vault policy.
          displayName: Role name
          path: vault.role
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:vault.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: |-
            Optional when Vault authentication uses a Kubernetes service account token.
            Defaults to /var/run/secrets/kubernetes.io/serviceaccount/token.
          displayName: Service account token path
          path: vault.serviceAccountTokenPath
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:vault.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Required when Vault authentication token is provided in a Kubernetes
            secret via "vault_token" key
          displayName: Secret name
          path: vault.secretName
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:vault.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        version: v1alpha1
      - description: |-
          [Kasten's k10](https://docs.kasten.io/) is a data lifecycle management system for all your persistence enabled container-based applications.

          **Note: The complete list of values supported by the K10 spec field in the "YAML View" are documented [here](https://docs.kasten.io/latest/install/advanced.html#complete-list-of-k10-helm-options).**
        kind: K10
        name: k10s.apik10.kasten.io
        specDescriptors:
        - description: Optional - Configures basic authentication for the K10 dashboard.
            Once enabled, you need to either provide Authentication Details (htpasswd)
            or Secret Name
          displayName: Enable Basic Authentication
          path: auth.basicAuth.enabled
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:auth.tokenAuth.enabled:false
        - description: Name of an existing Secret that contains a file generated with
            htpasswd
          displayName: Secret Name
          path: auth.basicAuth.secretName
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:auth.basicAuth.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: A username and password pair separated by a colon character
          displayName: Authentication Details (htpasswd)
          path: auth.basicAuth.htpasswd
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:auth.basicAuth.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:password
        - description: Optional - Configure Token based authentication for the K10
            dashboard
          displayName: Enable Token Based Authentication
          path: auth.tokenAuth.enabled
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:auth.basicAuth.enabled:false
        - description: Optional - Configure Route for the K10 dashboard
          displayName: Enable K10 dashboard to be exposed via route
          path: route.enabled
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
        - description: Specify FQDN (e.g., `.k10.example.com`), Defaults to empty
            string
          displayName: FQDN for name-based virtual host
          path: route.host
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:route.enabled:true
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Optional - Defaults to false
          displayName: Create secured edge route for exposing k10
          path: route.tls.enabled
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:booleanSwitch
          - urn:alm:descriptor:com.tectonic.ui:fieldDependency:route.enabled:true
        - description: Optional - Defaults to the default StorageClass of the cloud
            provider. (gp2 on AWS, standard on GKE, AWS & OpenStack)
          displayName: Specify StorageClassName to be used for PVCs
          path: global.persistence.storageClass
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Optional - Defaults to global size of volumes for K10 persistent
            services. Controlled by `global.persistence.size`
          displayName: Size of a volume for catalog service. For e.g. "20Gi"
          path: global.persistence.catalog.size
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        - description: Optional - Set to `airgap` for private-network installs.
          displayName: Control metric and license reporting
          path: metering.mode
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:text
        version: v1alpha1
    description: |-
      Kasten data management platform for OpenShift, The Market Leader for Kubernetes Backup and DR.

      The supported Kubernetes versions are listed here - https://docs.kasten.io/latest/operating/support.html
      Please review release notes before an upgrade - https://docs.kasten.io/latest/releasenotes.html
    displayName: Veeam Kasten (Free)
    installModes:
    - supported: true
      type: OwnNamespace
    - supported: true
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: false
      type: AllNamespaces
    keywords:

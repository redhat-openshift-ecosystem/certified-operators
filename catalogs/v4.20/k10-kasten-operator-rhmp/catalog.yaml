    kind: K10restore
    version: v1alpha1
- type: olm.package
  value:
    packageName: k10-kasten-operator-rhmp
    version: 8.0.5
- type: olm.csv.metadata
  value:
    annotations:
      alm-examples: |-
        [
          {
            "apiVersion": "apik10.kasten.io/v1alpha1",
            "kind": "K10",
            "metadata": {
              "annotations": {
                "helm.sdk.operatorframework.io/reconcile-period": "2m",
                "helm.sdk.operatorframework.io/rollback-force": "false"
              },
              "name": "k10"
            },
            "spec": {
              "auth": {
                "basicAuth": {
                  "enabled": false,
                  "htpasswd": "",
                  "secretName": ""
                },
                "tokenAuth": {
                  "enabled": false
                }
              },
              "global": {
                "persistence": {
                  "catalog": {
                    "size": ""
                  },
                  "storageClass": ""
                }
              },
              "metering": {
                "mode": ""
              },

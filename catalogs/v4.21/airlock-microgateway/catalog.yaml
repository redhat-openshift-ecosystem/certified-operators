    description: "Airlock Microgateway is a Kubernetes native WAAP (Web Application
      and API Protection) solution to protect microservices.\n\nModern application
      security is embedded in the development workflow and follows DevSecOps paradigms.
      Airlock Microgateway is the perfect fit for these requirements.\nIt is a lightweight
      WAAP solution, optimized for Kubernetes environments.\nAirlock Microgateway
      protects your applications and microservices with the tried-and-tested Airlock
      security features against attacks, while also providing a high degree of scalability.\n\nA
      valid license is required unless Airlock Microgateway is used in the Community
      Edition. \nFor a list of all features, view the [comparison of the community
      and premium edition](https://docs.airlock.com/microgateway/5.1/?topic=MGW-00000056).\n\nThe
      instructions below provide a quick start guide.\n\n## Prerequisites\n\n* [Kubernetes
      Gateway API CRDs](https://gateway-api.sigs.k8s.io/guides/#installing-gateway-api)\n\n###
      Install Gateway API standard channel\n***Note:*** *This step is only required
      for OpenShift versions below 4.19, as Gateway API is included by default in
      OpenShift 4.19+.*\n\n```console\nkubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml\n```\n\n##
      Configuring Airlock Microgateway Operator deployed by OLM\n***Note:*** *It is
      possible to configure how OLM deploys an Operator via the [Subscription Config](https://github.com/operator-framework/operator-lifecycle-manager/blob/master/doc/design/subscription-config.md).*\n\nThe
      following environment variables are supported:\n| Name        | Default     |
      Example     | Description |\n| ----------- | ----------- | ----------- | -----------
      |\n| LOG\\_LEVEL   | \"info\"      | \"debug\"     | Operator application log
      level. Allowed Values: “error”, “warn”, “info”, “debug” |\n| CONTROLLER\\_NAME
      |  \"microgateway.airlock.com/gatewayclass-controller\" | \"true\" | Controller
      name referred in the GatewayClasses managed by this operator. The value must
      be a path prefixed by the domain microgateway.airlock.com. |\n| GATEWAY\\_POD\\_MONITOR\\_CREATE
      | \"true\" | \"true\" | Whether to create a PodMonitor resource for monitoring
      the Gateway API resources. |\n| GATEWAY\\_POD\\_MONITOR\\_ADDITIONAL\\_LABELS
      | \"\" | \"release=my-microgateway,env=dev\" | Labels to add to the PodMonitor.
      Allowed Values: Comma-separated list of key=value pairs|\n\n## What’s next\n\nAfter
      installing the Airlock Microgateway Operator, the various [Configuration Guides](https://docs.airlock.com/microgateway/5.1/?topic=MGW-00000146)
      describe how to deploy and configure a Gateway in your cluster and how to implement
      common scenarios.\n\n***Note:*** Several features require a license. See [Community
      vs. Premium editions in detail](https://docs.airlock.com/microgateway/5.1/?topic=MGW-00000056)
      to choose the right license type."

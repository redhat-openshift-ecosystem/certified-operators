    description: |-
      Airlock Microgateway is a Kubernetes native WAAP (Web Application and API Protection) solution to protect microservices.

      Modern application security is embedded in the development workflow and follows DevSecOps paradigms. Airlock Microgateway is the perfect fit for these requirements.
      It is a lightweight WAAP solution, optimized for Kubernetes environments.
      Airlock Microgateway protects your applications and microservices with the tried-and-tested Airlock security features against attacks, while also providing a high degree of scalability.

      For a list of all features, view the [comparison of the community and premium edition](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000056).

      The instructions below provide a quick start guide.

      ## Prerequisites

      * [Airlock Microgateway License](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000056)
      * [Gateway API](https://gateway-api.sigs.k8s.io/)

      In order to use Airlock Microgateway you need a license. You may either request a community license free of charge or purchase a premium license.

      ### Obtain Airlock Microgateway License
      Airlock Microgateway requires a valid license. See [Community vs. Premium editions in detail](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000056) to choose the right license type.
      1. Either request a community or premium license
          * Community license: [airlock.com/microgateway-community](https://airlock.com/en/microgateway-community)
            A license will be sent automatically within minutes.
          * Premium license: [airlock.com/microgateway-premium](https://airlock.com/en/microgateway-premium)
            Your sales partner will contact you for licensing.
      2. Check your inbox and save the license file microgateway-license.txt locally.

      ### Deploy Airlock Microgateway License
      1. Create the `airlock-microgateway-system` namespace.

      ```console
      oc create project airlock-microgateway-system
      ```
      2. Create a Kubernetes secret with the name `airlock-microgateway-license` and the key `microgateway-license.txt` in the Microgateway Operator namespace to store the license.

      ```console
      oc create secret generic airlock-microgateway-license \
        -n airlock-microgateway-system \
        --from-file=microgateway-license.txt=<path-to-your-local-microgateway-license.txt>
      ```

      ### Install Gateway API standard channel
      ***Note:*** *This step is only required for OpenShift versions below 4.19, as Gateway API is included by default in OpenShift 4.19+.*

      ```console
      kubectl apply -f https://github.com/kubernetes-sigs/gateway-api/releases/download/v1.2.1/standard-install.yaml
      ```

      ## Configuring Airlock Microgateway Operator deployed by OLM
      ***Note:*** *It is possible to configure how OLM deploys an Operator via the [Subscription Config](https://github.com/operator-framework/operator-lifecycle-manager/blob/master/doc/design/subscription-config.md).*

      The following environment variables are supported:
      | Name        | Default     | Example     | Description |
      | ----------- | ----------- | ----------- | ----------- |
      | LOG\_LEVEL   | "info"      | "debug"     | Operator application log level. Allowed Values: “error”, “warn”, “info”, “debug” |
      | CONTROLLER\_NAME |  "microgateway.airlock.com/gatewayclass-controller" | "true" | Controller name referred in the GatewayClasses managed by this operator. The value must be a path prefixed by the domain microgateway.airlock.com. |
      | GATEWAY\_POD\_MONITOR\_CREATE | "true" | "true" | Whether to create a PodMonitor resource for monitoring the Gateway API resources. |
      | GATEWAY\_POD\_MONITOR\_ADDITIONAL\_LABELS | "" | "release=my-microgateway,env=dev" | Labels to add to the PodMonitor. Allowed Values: Comma-separated list of key=value pairs|

      ## What’s next
      After installing the Airlock Microgateway Operator, the next steps describe how to deploy and configure a Gateway in your cluster and how to implement common scenarios.

      * [Gateway deployment](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000147)

          Deploy the gateway either as an Ingress or as an in-cluster Gateway.

      * [Session handling](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000148)

          Enable session handling to persist session information and correlate requests with a session ID. This is a prerequisite for OIDC-based authentication.

      * [Use cases](https://docs.airlock.com/microgateway/5.0/?topic=MGW-00000146)

          Learn how to use Airlock Microgateway for other typical scenarios such as request routing, request filtering or authentication enforcement.

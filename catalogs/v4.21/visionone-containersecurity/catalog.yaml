            Provider-specific configuration (selfManaged / eks / aks / gke / gardener)
            goes via YAML view under spec.auditLogCollection.
          displayName: Audit Log Collection
          path: auditLogCollection
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:object

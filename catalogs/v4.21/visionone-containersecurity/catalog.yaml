    description: "[Trend Vision One™ Container Security](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-container-security)
      delivers comprehensive, end-to-end\n protection for containerized workloads
      across OpenShift and Kubernetes environments.\n It continuously monitors for
      threats, vulnerabilities, policy violations, and\n exposed secrets ensuring
      compliance and enabling rapid, automated response. Purpose-built\n for hybrid
      cloud, it instantly isolates compromised containers to prevent lateral\n movement
      and minimize impact. Seamlessly integrating into OpenShift DevSecOps\n pipelines,
      it empowers security teams to enforce policies while enabling developers\n to
      innovate and deploy with confidence without disrupting workflows or compromising\n
      agility.\n\n **Installation**\n \n - Use the recommended `trendmicro-system`
      namespace.\n - Refer to the [Trend Vision One™ Documentation](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-red-hat-openshift-operator)
      for registration and installation steps.\n"

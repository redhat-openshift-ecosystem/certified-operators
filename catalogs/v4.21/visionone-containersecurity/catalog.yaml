    description: |
      [TrendAI Vision One™ Container Security](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-container-security) delivers comprehensive, end-to-end
      protection for containerized workloads across OpenShift and Kubernetes environments.
      It continuously monitors for threats, vulnerabilities, policy violations, and
      exposed secrets ensuring compliance and enabling rapid, automated response. Purpose-built
      for hybrid cloud, it instantly isolates compromised containers to prevent lateral
      movement and minimize impact. Seamlessly integrating into OpenShift DevSecOps
      pipelines, it empowers security teams to enforce policies while enabling developers
      to innovate and deploy with confidence without disrupting workflows or compromising
      agility.

      **Prerequisites**

      - **TrendAI Vision One™** with the Container Security entitlement. See [TrendAI Vision One™](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-container-security) for details.
      - A Vision One bootstrap token *or* a cluster registration key
      - Cluster outbound connectivity to your Vision One API endpoint - or a proxy / Service Gateway path configured via `spec.proxy` / `spec.serviceGateway` for restricted-egress clusters.

      **Installation**

      - Use the recommended `trendmicro-system` namespace.
      - Refer to the [TrendAI Vision One™ Documentation](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-red-hat-openshift-operator) for registration and installation steps.

      **Advanced configuration**

      The strict fields shown in Form view (Vision One, Proxy, Service Gateway, Images, Audit Log Collection)
      cover the most common settings. The CRD also accepts arbitrary additional keys under `spec.*` matching
      the underlying helm chart's [values.yaml](https://github.com/trendmicro/visionone-container-security-helm) —
      so for anything not exposed as a strict field (resources, runtime sockets, certificate config, log levels,
      scanner tuning, etc.) switch to **YAML view** when creating the CR and set the value directly under
      `spec.<key>`.

      **Support & release notes**

      - [Documentation](https://docs.trendmicro.com/en-us/documentation/article/trend-vision-one-red-hat-openshift-operator) — installation, configuration, and operational guides.
      - [Release notes](https://github.com/trendmicro/visionone-container-security-helm/releases) — versioned changelog of the helm chart that ships with each operator release.
      - Contact [support@trendmicro.com](mailto:support@trendmicro.com) for product support
    displayName: TrendAI Vision One Container Security
    installModes:
    - supported: true
      type: OwnNamespace
    - supported: false
      type: SingleNamespace
    - supported: false
      type: MultiNamespace
    - supported: false
      type: AllNamespaces

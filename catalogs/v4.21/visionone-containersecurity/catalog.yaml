          displayName: Bootstrap Token
          path: visionOne.bootstrapToken
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
          - urn:alm:descriptor:com.tectonic.ui:password
        - description: TrendAI Vision One API endpoint. Accepts a region shortcut
            (e.g. "us-1") or a full URL.
          displayName: Endpoint
          path: visionOne.endpoint
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
        - description: Human-readable cluster name shown in the Vision One console.
          displayName: Cluster Name
          path: visionOne.clusterName
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
        - description: Prefix prepended to an auto-generated cluster name when clusterName
            is not set.
          displayName: Cluster Name Prefix
          path: visionOne.clusterNamePrefix
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
        - description: Vision One group / organization ID where this cluster should
            be placed.
          displayName: Group ID
          path: visionOne.groupId
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
        - description: Alternative registration key for cluster onboarding (in lieu
            of bootstrapToken).
          displayName: Cluster Registration Key
          path: visionOne.clusterRegistrationKey
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
          - urn:alm:descriptor:com.tectonic.ui:password
        - description: Vision One policy ID to apply at registration.
          displayName: Policy ID
          path: visionOne.policyId
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Registration
        - description: Validating admission webhook for image security and runtime
            policy enforcement.
          displayName: Admission Controller
          path: visionOne.admissionController
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Continuous monitoring of cluster resources and configuration
            drift.
          displayName: Oversight
          path: visionOne.oversight
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Falco-based runtime threat detection (eBPF / kernel module).
          displayName: Runtime Security
          path: visionOne.runtimeSecurity
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Image vulnerability scanning via scan-manager + scan-job.
          displayName: Vulnerability Scanning
          path: visionOne.vulnerabilityScanning
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Container image malware detection.
          displayName: Malware Scanning
          path: visionOne.malwareScanning
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Detection of exposed secrets in container images.
          displayName: Secret Scanning
          path: visionOne.secretScanning
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Track changes to critical files inside running containers.
          displayName: File Integrity Monitoring
          path: visionOne.fileIntegrityMonitoring
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Compliance and benchmark scanning against standards (CIS, NIST,
            etc.).
          displayName: Compliance Scan
          path: visionOne.complianceScan
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Cluster asset inventory collection (workloads, namespaces,
            RBAC).
          displayName: Inventory Collection
          path: visionOne.inventoryCollection
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Policy-as-code enforcement engine.
          displayName: Policy Operator
          path: visionOne.policyOperator
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Features
        - description: Resources excluded from scanning and policy enforcement.
          displayName: Exclusion
          path: visionOne.exclusion
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Exclusions
        - description: Outbound proxy configuration for in-cluster components (HTTP(S)
            endpoints, credentials, Kubernetes-service-host bypass, self-signed certificates).
          displayName: Proxy
          path: proxy
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:object
        - description: Trend Service Gateway proxy support for outbound traffic (appliances,
            Client Security Network credentials).
          displayName: Service Gateway
          path: serviceGateway
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:object
        - description: Container image registry overrides. Required for disconnected
            or private-mirror OpenShift clusters.
          displayName: Images
          path: images
          x-descriptors:
          - urn:alm:descriptor:com.tectonic.ui:object

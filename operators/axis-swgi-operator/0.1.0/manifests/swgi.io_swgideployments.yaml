apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: swgideployments.swgi.io
spec:
  group: swgi.io
  names:
    kind: SwgiDeployment
    listKind: SwgiDeploymentList
    plural: swgideployments
    singular: swgideployment
    shortNames:
      - swgi
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                image:
                  type: string
                replicas:
                  type: integer
                  minimum: 1
                port:
                  type: integer
                  minimum: 1
                swgiMode:
                  type: string
                logLevel:
                  type: string
                logFormat:
                  type: string
                orgId:
                  type: string
                nodeId:
                  type: string
                policyPath:
                  type: string
                receiptStoreBackend:
                  type: string
                receiptDbPath:
                  type: string
                databaseUrl:
                  type: string
                dbConnectTimeoutSeconds:
                  type: integer
                runDbMigrations:
                  type: boolean
                tlsEnabled:
                  type: boolean
                metricsEnabled:
                  type: boolean
                serviceAccountName:
                  type: string
                tokens:
                  type: object
                  properties:
                    admin:
                      type: string
                    viewer:
                      type: string
                signingKey:
                  type: object
                  properties:
                    pem:
                      type: string
                resources:
                  type: object
                  x-kubernetes-preserve-unknown-fields: true
              required:
                - image
      subresources:
        status: {}

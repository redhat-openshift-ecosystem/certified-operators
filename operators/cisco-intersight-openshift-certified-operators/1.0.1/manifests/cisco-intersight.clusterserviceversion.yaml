  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: Cisco Intersight installs a dynamic plugin to display UCS hardware
        inventory and health in the cluster. The Console Plugin must be enabled for
        this custom resource to function.
      displayName: Cisco Intersight
      kind: CiscoIntersight
      name: ciscointersightapps.intersight.cisco.com
      version: v1
  description: "The Cisco Intersight Plugin for OpenShift integrates powerful hardware
    management directly into the OpenShift Web Console, bridging the gap between your
    applications and the physical servers they run on. \nIt provides OpenShift administrators
    with a unified view of server inventory, health status, real-time metrics, and
    security advisories. \nFrom within the OpenShift UI, you can perform critical
    operations like server power control, launch a vKVM session for deep troubleshooting,
    and initiate firmware upgrades. \nThis integration enables proactive management,
    allowing you to prevent outages by responding to hardware alerts before they impact
    production.\nPreRequisites \n- Outbound network connectivity to Intersight SaaS
    endpoints (us-east-1.intersight.com or eu-central-1.intersight.com). \n- Active
    Cisco Intersight account with server administrator access. \n- Cisco UCS servers
    registered in Intersight with Advantage License Tier or higher subscription.\n\nThe
    following images are deployed as part of the Operator and must be mirrored for
    use in a disconnected OpenShift environment.\n\n
    quay.io/ciscointersightteam/intersight-api@sha256:3ce4ac878512a262667b49594e72bdc06574dface1792548610136929883cf9e\n
    quay.io/ciscointersightteam/ucsinfra@sha256:accc922db0e38d0bd8272ab9bc9df104a3a28e6d0c60ac516dba61e03a06a9ac\n
    quay.io/ciscointersightteam/cisco-intersight-ui@sha256:79f5829dfe905e942fb294f1d4af40bca5be3374cc3a072623361e60aea8d474\n
    quay.io/ciscointersightteam/intersight-operator@sha256:9d68fedd158ca0e3c5a18aa418b3570b53688f7cb43477f7b9d608e6906e260c\n
    quay.io/ciscointersightteam/rhelucstool@sha256:ca6846163af12b4ae641c247f5bb3c614e6d1b6116e26d98885f908478a86ec5\n\n
    For more details, please refer to the documentation at https://intersight.com/help/saas/resources/plugin_openshift.\n
    Please contact Cisco TAC for any assistance."

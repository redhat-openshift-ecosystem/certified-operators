        description: |-
          CiscoIntersight enables unified management and visibility of Cisco UCS infrastructure through an OpenShift Console Plugin.
          When a CiscoIntersight resource is created, the operator automatically deploys
          a dynamic console plugin that provides a dedicated UI within the OpenShift console.
          This plugin displays real-time inventory data, server health, and operational metrics from your Cisco UCS environment,
          allowing cluster administrators to monitor and manage UCS servers directly from OpenShift without leaving the console.
          The operator manages all required resources (Deployments, Services, and ConsolePlugin)
          and maintains synchronization with the Cisco Intersight API.

                    startTime:
                      type: string
                    state:
                      type: string
                    updateTime:
                      type: string
                    upgradeSavepointPath:
                      type: string
                  type: object
                lifecycleState:
                  type: string
                observedGeneration:
                  description: observedGeneration is the most recent generation observed for this Confluent component.
                  format: int64
                  type: integer
                reconciliationStatus:
                  description: FlinkApplicationAutogenStatusReconciliationStatus defines model for FlinkApplicationAutogenStatusReconciliationStatus.
                  properties:

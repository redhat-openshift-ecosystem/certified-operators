      name: v1beta1
      schema:
        openAPIV3Schema:
          description: FlinkEnvironment is the Schema for the flinkenvironments API
          properties:
            apiVersion:
              description: |-
                APIVersion defines the versioned schema of this representation of an object.
                Servers should convert recognized schemas to the latest internal value, and
                may reject unrecognized values.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
              type: string
            kind:
              description: |-
                Kind is a string value representing the REST resource this object represents.
                Servers may infer this from the endpoint the client submits requests to.
                Cannot be updated.
                In CamelCase.
                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
              type: string
            metadata:
              type: object
            spec:
              description: |-
                FlinkEnvironmentSpec defines the desired state of FlinkEnvironment.

                The embedded FlinkEnvironmentAutogenSpec is mirrored from the CMF
                `Environment` schema by build/flink-sql-types/. The kubernetesNamespace
                immutability check is applied as a struct-level CEL rule because the field
                lives on the embedded autogen struct and field-level markers can't be
                attached to embedded members from the wrapper.
              properties:
                cmfRestClassRef:
                  description: |-
                    cmfRestClassRef references the CMFRestClass which defines CMF REST API connection information.
                    by default would use `default` CMFRestClass if not specified.
                  properties:
                    name:
                      description: name specifies the name of the CMFRestClass application resource.
                      minLength: 1
                      type: string
                    namespace:
                      description: namespace specifies the namespace of the CMFRestClass.
                      type: string
                  required:
                    - name
                  type: object
                computePoolDefaults:
                  x-kubernetes-preserve-unknown-fields: true
                flinkApplicationDefaults:
                  x-kubernetes-preserve-unknown-fields: true
                kubernetesClusterName:
                  type: string
                kubernetesNamespace:
                  type: string
                secrets:
                  additionalProperties:
                    type: string
                  description: Secrets The secrets mapping for the environment. This is a mapping between connection_secret_id and the secret name.
                  type: object
                statementDefaults:
                  description: StatementDefaults the defaults for detached and interactive Statements
                  properties:
                    detached:
                      description: StatementDefaults defines model for StatementDefaults.
                      properties:
                        flinkConfiguration:
                          additionalProperties:
                            type: string
                          description: FlinkConfiguration default Flink configuration for Statements
                          type: object
                      type: object
                    interactive:
                      description: StatementDefaults defines model for StatementDefaults.
                      properties:
                        flinkConfiguration:
                          additionalProperties:
                            type: string
                          description: FlinkConfiguration default Flink configuration for Statements
                          type: object
                      type: object
                  type: object
              required:
                - kubernetesNamespace
              type: object
              x-kubernetes-validations:
                - message: kubernetesNamespace is immutable
                  rule: self.kubernetesNamespace == oldSelf.kubernetesNamespace
            status:
              description: |-
                FlinkEnvironmentStatus defines the observed state of FlinkEnvironment.

                Wraps the CMF-mirrored FlinkEnvironmentAutogenStatus with CFK-owned status
                fields (cmfSync, cfkInternalState, conditions, observedGeneration).
              properties:
                cfkInternalState:
                  description: state is the internal state managed by CFK.
                  type: string
                cmfSync:
                  description: cmfSync is the status of the CMF REST API sync.
                  properties:
                    errorMessage:
                      description: Error message indicates error message if any.
                      type: string
                    lastSyncTime:
                      description: LastSyncTime is the time when the last sync was performed.
                      type: string
                    status:
                      default: Unknown
                      description: appState is the current state of the flink Environment/Application.
                      enum:
                        - Unknown
                        - Created
                        - Failed
                        - Deleted
                      type: string
                  required:
                    - errorMessage
                    - lastSyncTime
                  type: object
                conditions:
                  description: conditions are the latest available observed states of the flinkEnvironment.
                  items:
                    description: Condition represent the latest available observations of the current state.
                    properties:
                      lastProbeTime:
                        description: lastProbeTime shows the last time the condition was evaluated.
                        format: date-time
                        type: string
                      lastTransitionTime:
                        description: lastTransitionTime shows the last time the condition was transitioned from one status to another.
                        format: date-time
                        type: string
                      message:
                        description: message shows a human-readable message with details about the transition.
                        type: string
                      reason:
                        description: reason shows the reason for the last transition of the condition.
                        type: string
                      status:
                        description: status shows the status of the condition, one of `True`, `False`, or `Unknown`.
                        type: string
                      type:
                        description: type shows the condition type.
                        type: string
                    type: object
                  type: array
                kubernetesCluster:
                  description: KubernetesCluster Status of the Kubernetes cluster.
                  properties:
                    kubernetesVersion:
                      description: KubernetesVersion The Kubernetes server version reported by the cluster (e.g., "v1.28.3"). Only available when the cluster is CONNECTED.
                      type: string
                    lastHeartbeatTimestamp:
                      description: LastHeartbeatTimestamp Timestamp of the last successful heartbeat check.
                      type: string
                    message:
                      description: Message A human-readable message providing details about the current state (e.g., connection error details).
                      type: string
                    state:
                      description: State The effective state of the cluster. CONNECTED when the cluster is reachable, DISCONNECTED when unreachable, or DECOMMISSIONED when intentionally taken offline.
                      enum:
                        - CONNECTED
                        - DECOMMISSIONED
                        - DISCONNECTED
                      type: string
                  type: object
                observedGeneration:
                  description: observedGeneration is the most recent generation observed for this Confluent component.
                  format: int64
                  type: integer
                resourceSummary:
                  description: ResourceSummary Represents a summary of resource usage for the CMF resource
                  properties:
                    jobManager:
                      description: JobManager JobManager resource usage
                      properties:
                        count:
                          description: Count Number of instances
                          type: integer
                        cpu:
                          description: Cpu Total CPU units allocated
                          type: number
                        memory:
                          description: Memory Total memory allocated in bytes
                          format: int64
                          type: integer
                      type: object
                    taskManager:
                      description: TaskManager TaskManager resource usage
                      properties:
                        count:
                          description: Count Number of instances
                          type: integer
                        cpu:
                          description: Cpu Total CPU units allocated
                          type: number
                        memory:
                          description: Memory Total memory allocated in bytes
                          format: int64
                          type: integer
                      type: object
                  type: object
                resources:
                  description: Resources Summary of resources by status and type
                  properties:
                    applications:
                      additionalProperties:
                        type: integer
                      description: Applications Summary of applications by status
                      type: object
                    statements:
                      additionalProperties:
                        type: integer
                      description: Statements Summary of statements by status
                      type: object
                  type: object
              type: object
          type: object
      served: true
      storage: true
      subresources:

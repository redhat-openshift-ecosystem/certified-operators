  description: "IBM Cloud Pak for Data is a cloud-native solution that enables you\
    \ to put your data to work quickly and efficiently. \nCloud Pak for Data includes\
    \ a suite of services that support you on your journey to AI.\n# Introduction\n\
    With Cloud Pak for Data, your users can collaborate from a single, unified interface\
    \ that supports a large number of \nservices that are designed to work together.\
    \ You can use the Cloud Pak for Data Operator to quickly provision services for\
    \ \nimmediate use. These are just a few of the services that are available in\
    \ Cloud Pak for Data:     \n- Watson Studio\n- Watson Machine Learning\n- Watson\
    \ Knowledge Catalog\n- Watson OpenScale\n- Watson Machine Learning Accelerator\n\
    - Data Virtualization\n- Db2 Data Management Console\n- Db2 Warehouse\n- Cognos\xAE\
    \ Dashboards\n- Analytics Engine Powered by Apache Spark\n- IBM Match 360 with\
    \ Watson\n- Data Refinery\n- Db2\xAE Big SQL\n- Decision Optimization\n- SPSS\xAE\
    \ Modeler\n- Db2 Data Gate\n\n# Details\n\n## Prerequisites\n- Red Hat OpenShift\
    \ Container Platform 4.6 or newer installed on x86_64\n- A user with cluster administrator\
    \ role\n- No storage is required to install the operator, but you need storage\
    \ and resources to install Cloud Pak for Data services. For more information,\
    \ see [Storage considerations](https://www.ibm.com/docs/en/cloud-paks/cp-data/latest?topic=planning-storage-considerations).\n\
    - See [Pre-installation](https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=installing-pre-installation-tasks)\n\
    - To install the Cloud Pak for Data control plane, review the [system\nrequirements\
    \ for IBM Cloud Pak for Data](https://www.ibm.com/docs/en/cloud-paks/cp-data/latest?topic=planning-system-requirements).\n\
    - Before you install Cloud Pak for Data services, review the [system requirements\n\
    for services](https://www.ibm.com/docs/en/cloud-paks/cp-data/latest?topic=requirements-system-services).\n\
    - For air-gapped installations, see [Installing the Cloud Pak for Data Operator\
    \ on air-gapped clusters](https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=tasks-mirroring-images-your-container-registry).\n\
    ## Resources Required\n- The operator requires 100m CPU and 256Mi memory.\n- For\
    \ the minimum requirements for services, see the [system requirements for services](https://www.ibm.com/docs/en/cloud-paks/cp-data/latest?topic=requirements-system-services).\n\
    ## Installing\n- [Installing Cloud Pak for Data Control Plane] (https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=installing-cloud-pak-data)\n\
    - [Installing Cloud Pak for Data Service Subscriptions](https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=tasks-creating-operator-subscriptions)\n\
    - [Installing Cloud Pak for Data Services](https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=integrations-services)\n\
    ## Configuration\n See [Cloud Pak for Data Post Installation](https://www.ibm.com/docs/en/cloud-paks/cp-data/4.0?topic=installing-post-installation-tasks)\n\
    ## Limitations\n- `x86-64`, `PPCLE`, and `x390` platforms are supported by this\
    \ operator.\n- See [limitations](https://www.ibm.com/docs/en/search/limitations?scope=SSQNUZ_4.0)\
    \ in Cloud Pak for Data services\n## SecurityContextConstraints Requirements\n\
    The `restricted` security context constraint (SCC) is used for the operator.\n\
    ## Documentation\nSee the [Cloud Pak for Data documentation](https://www.ibm.com/docs/en/cloud-paks/cp-data/latest)\
    \ and [license information](https://ibm.biz/BdfVHT).\n"
  displayName: Cloud Pak for Data Platform Operator
  icon:
  - base64data: 
    mediatype: image/png
  install:
    spec:
      deployments:
      - name: cpd-platform-operator-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: cpd
          strategy: {}
          template:
            metadata:
              annotations:
                cloudpakId: ca7963422a064869abf2e46477d9eb38
                cloudpakName: IBM Cloud Pak for Data Enterprise Edition
                productID: 068a62892a1e4db39641342e592daa25
                productMetric: FREE
                productName: IBM Cloud Platform Common Services
              labels:
                control-plane: cpd
                intent: projected
            spec:
              initContainers:
              - command:
                - /bin/bash
                - -c
                - 'mkdir -p /operator-volume/ansible/tmp && chmod 777 /operator-volume/ansible/tmp
                  && chmod o+t /operator-volume/ansible/tmp

                  cp -R /opt/ansible /operator-volume

                  touch /tmp/live /tmp/ready

                  '
                env:
                - name: PLATFORM_OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: PLATFORM_OPERATOR_VERSION
                  value: 6.4.0
                image: registry.marketplace.redhat.com/cpopen/ibm-cpd-platform-operator@sha256:f115ea0b24fbcd35a2927d4a02b22dc063e09c1d169e81f6da704a047da92796
                name: setup-probes
                securityContext:
                  privileged: false
                  runAsNonRoot: true
                  allowPrivilegeEscalation: false
                  readOnlyRootFilesystem: true
                  capabilities:
                    drop:
                    - ALL
                resources:
                  limits:
                    cpu: 500m
                    memory: 1024Mi
                    ephemeral-storage: 2560Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                    ephemeral-storage: 512Mi
                volumeMounts:
                - mountPath: /operator-volume
                  name: cpd-platform-operator-volume
                - mountPath: /tmp
                  name: cpd-platform-operator-volume
                  subPath: ansible/tmp
              containers:
              - args:
                - --zap-log-level
                - error
                - --ansible-verbosity
                - '4'
                - --leader-elect
                - --leader-election-id=cpd-platform-operator-manager
                env:
                - name: PLATFORM_OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: ANSIBLE_STDOUT_CALLBACK
                  value: default
                - name: WATCH_NAMESPACE
                  valueFrom:
                    configMapKeyRef:
                      name: namespace-scope
                      key: namespaces
                - name: PLATFORM_OPERATOR_VERSION
                  value: 6.4.0
                image: registry.marketplace.redhat.com/cpopen/ibm-cpd-platform-operator@sha256:f115ea0b24fbcd35a2927d4a02b22dc063e09c1d169e81f6da704a047da92796
                name: manager
                resources:
                  limits:
                    cpu: 1250m
                    memory: 3072Mi
                    ephemeral-storage: 2560Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
                    ephemeral-storage: 512Mi
                livenessProbe:
                  exec:
                    command:
                    - cat
                    - /tmp/live
                  failureThreshold: 10
                  initialDelaySeconds: 5
                  periodSeconds: 60
                  timeoutSeconds: 10
                readinessProbe:
                  exec:
                    command:
                    - cat
                    - /tmp/ready
                  failureThreshold: 10
                  initialDelaySeconds: 3
                  periodSeconds: 20
                  timeoutSeconds: 3
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
                  privileged: false
                  readOnlyRootFilesystem: true
                  runAsNonRoot: true
                volumeMounts:
                - mountPath: /opt/ansible
                  name: cpd-platform-operator-volume
                  subPath: ansible
                - mountPath: /tmp
                  name: cpd-platform-operator-volume
                  subPath: ansible/tmp
              serviceAccountName: cpd-platform-sa
              terminationGracePeriodSeconds: 10
              volumes:
              - emptyDir:
                  sizeLimit: 2Gi
                name: cpd-platform-operator-volume

          verbs:
          - get
          - list
          - patch
          - update
          - watch
        - apiGroups:
          - autoscaling
          resources:
          - horizontalpodautoscalers
          verbs:
          - get
          - update
          - watch
          - create
          - patch
          - list
        serviceAccountName: cpd-platform-sa

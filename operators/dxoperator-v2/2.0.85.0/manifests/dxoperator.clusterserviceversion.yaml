                      - name: KESTREL__ENDPOINTS__HTTPS__URL
                        value: https://0.0.0.0:5001
                    image: 'docker.io/dh2i/dxoperator@sha256:ef363edef5fa92bb7c831d08c67148874bb56acbf3545c3794727d30465799e8'
                    imagePullPolicy: Always
                    name: operator

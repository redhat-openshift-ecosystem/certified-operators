spec:
  displayName: eQube® Operator
  icon:
    - base64data: 
      mediatype: image/png
  description: >-
    The eQube®-Operator automates the deployment, configuration, scaling, and lifecycle management of the eQube® DaaS platform on Kubernetes.
    
    Features:
    •	Automated deployment of eQube-BI, eQube-MI, eQube-AG, and eQube-ADA, along with their associated components.
    •	Support for both monolithic and distributed deployment models.
    •	Declarative configuration and management of eQube® products.
    •	Independent scaling of individual platform services based on workload requirements.
    •	Support for deploying a single eQube® product or the entire eQube® DaaS platform within a Kubernetes cluster.
    •	Simplified application version upgrades.
  version: 1.0.3
  replaces: eqube-operator.v1.0.2
  maturity: alpha
  minKubeVersion: 1.26.0
  provider:
    name: eQ Technologic
  installModes:
    - type: OwnNamespace
      supported: true
    - type: SingleNamespace
      supported: true
    - type: MultiNamespace
      supported: true
    - type: AllNamespaces
      supported: true
  install:
    strategy: deployment
    spec:
      deployments:
        - name: eqube-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: eqube-operator
            template:
              metadata:
                labels:
                  app: eqube-operator
              spec:
                serviceAccountName: eqube-operator
                hostAliases:

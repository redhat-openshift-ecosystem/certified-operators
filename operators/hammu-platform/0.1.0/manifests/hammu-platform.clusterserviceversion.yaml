spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: "HammuPlatform is a complete Hammu.ai deployment \u2014 Flask Console, PostgreSQL, optional ChromaDB, Route, secrets, and the one-shot db-init Job."
      displayName: Hammu Platform
      kind: HammuPlatform
      name: hammuplatforms.hammu.ai
      resources:
      - kind: ConfigMap
        version: v1
      - kind: Deployment
        version: apps/v1
      - kind: Job
        version: batch/v1
      - kind: PersistentVolumeClaim
        version: v1
      - kind: Route
        version: route.openshift.io/v1
      - kind: Secret
        version: v1
      - kind: Service
        version: v1
      - kind: ServiceAccount
        version: v1
      specDescriptors:
      - description: Operand release version (informational). Image tags fall back to .Chart.AppVersion when image.tag is empty.
        displayName: Release Version
        path: version
      - description: Flask Console application \u2014 replicas, image, resources, OpenShift Route.
        displayName: Flask Console Application
        path: app
      - description: PostgreSQL backing store. Operator-managed by default; set .enabled=false and populate .external to point at an external Postgres.
        displayName: PostgreSQL Backing Store
        path: postgresql
      - description: ChromaDB vector store (disabled by default). The chromadb/chroma image is not Red Hat certified; enabling acknowledges that.
        displayName: ChromaDB Vector Store
        path: chroma
      - description: API key Secret references for LLM inference providers. Empty .name on a provider disables that provider.
        displayName: Inference Provider API Keys
        path: inferenceProviders
      - description: Optional external integrations (Kanboard task tracking, Forgejo git). Off unless explicitly enabled.
        displayName: External Integrations
        path: integrations
      - description: Database seed Job that loads the atos and atos_banking schemas on first install.
        displayName: Database Initialization Job
        path: initialization
      - description: Instance metadata surfaced to the Flask app via ConfigMap.
        displayName: Instance Metadata
        path: instance
      - description: ServiceAccount under which operand pods run.
        displayName: Operand ServiceAccount
        path: serviceAccount
      version: v1alpha1
  description: "Hammu.ai is a governed agentic business process execution platform that\nruns complete multi-step business processes with full audit provenance,\nstructural governance at every step, and deterministic outcomes.\nNew process = new database rows, not new code.\n\n## Features\n- Governed multi-gate pipeline execution\n- Dual-path convergence verification\n- Full audit trail with provenance\n- Process-agnostic architecture\n- Multi-model AI inference with model routing\n- Canonical data model per business domain\n\n## Prerequisites\n- OpenShift 4.12+\n- At least one inference provider API key (Groq, xAI, Anthropic, DeepInfra,\n  Google, OpenAI, or a self-hosted Ollama endpoint)\n- Persistent storage (any StorageClass)\n"
  displayName: Hammu Platform

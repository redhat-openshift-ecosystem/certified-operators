apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: appmods.ama.ibm.com
spec:
  group: ama.ibm.com
  names:
    kind: AppMod
    listKind: AppModList
    plural: appmods
    singular: appmod
  scope: Namespaced
  versions:
    - name: v2

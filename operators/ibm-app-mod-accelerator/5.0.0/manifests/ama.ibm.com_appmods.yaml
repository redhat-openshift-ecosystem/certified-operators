                    livenessProbe:
                      properties:
                        failureThreshold:
                          type: number
                        initialDelaySeconds:
                          type: number
                        periodSeconds:
                          type: number
                        timeoutSeconds:
                          type: number
                      type: object
                    logLevel:
                      type: string
                    readinessProbe:
                      properties:
                        failureThreshold:
                          type: number
                        initialDelaySeconds:
                          type: number
                        periodSeconds:
                          type: number

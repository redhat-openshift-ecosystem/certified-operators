  minKubeVersion: 1.18.0
  description: |-
    # Introduction

    IBM Application Modernization Accelerator helps you plan, prioritize, and package your on-premise workloads for container orchestration platforms such as RedHat OpenShift Container Platform. Documentation for the product can be found at the following location: https://www.ibm.com/docs/en/ama

    # Details

    The Application Modernization Accelerator is delivered as an interconnected set of pods and Kubernetes services. It consists of four pods: server, ui, couch DB, Neo4j, managed by an operator.
    The Application Modernization Accelerator operator is available in the IBM operator catalog.

    ## Prerequisites

    ### Cluster Admin Permissions

    To install Application Modernization Accelerator, you need to perform some tasks as a user with cluster admin permissions.
    Please refer to the Installing section below for more details.

    ### Access Application Modernization Accelerator images from the entitled registry

    Application Modernization Accelerator can be installed with a time limited evaluation license (fully featured), or as an entitled product. Please read the license (which can be found here: https://www.ibm.com/docs/en/ama?topic=accelerator-licensing) for more details:

    - If installing as an evaluation, you can ignore the following instructions that describe how to set up the image pull secret for the entitled registry access. For the evaluation license, the required images will be pulled from a public registry and no access details are required.

    - If installing as an entitled product, you will need to have an entitled registry key.

    Follow the Cloud Pak instructions (which can be found here: https://www.ibm.com/docs/en/cloud-paks/1.0.0?topic=entitlements-obtaining-your-red-hat-entitlement-key) to get your entitled registry key.

    Create an image pull secret with the following details:

    ```
    ENTITLED_REGISTRY=cp.icr.io
    ENTITLED_REGISTRY_USER=cp
    ENTITLED_REGISTRY_KEY=<entitled registry key>
    ```

    You will need to add the created image pull secret to the custom resource YAML when installing the Application Modernization Accelerator instance (see "Configure and Install Application Modernization Accelerator Instance" section below). It will need to be added in the following three places:

    ```
    couchdb:
      imagePullSecret: ibm-entitlement-key

    appmod:
      imagePullSecret: ibm-entitlement-key

    appmodui:
      imagePullSecret: ibm-entitlement-key
    ```


    ### Persistence

    Application Modernization Accelerator requires persistence to be configured in order to persist the database data. There are a number of different configuration options depending on the type of persistence that is available on your cluster.

    Please refer to the documentation (which can be found here: https://www.ibm.com/docs/en/ama) for full details on how to configure persistence.

    Although it is NOT recommended for a production install, you can also turn the persistence off. If you turn persistence off - you will lose all of your Application Modernization Accelerator data when the database container restarts.

    ```
    spec:
      ...
      persistence:
        ...
        enabled: <true|false>
    ```

    The persistence enabled and other persistence options can be set in the custom resource YAML when installing the Application Modernization Accelerator instance (see "Configure and Install Application Modernization Accelerator Instance" section below).

    ### Authentication

    By default, the Application Modernization Accelerator instance will be automatically configured to use the OpenShift Container Platform OAuthClient.
    You may configure configure Application Modernization Accelerator to use a third party authentication source. Please refer to the documentation for more information on how to configure a thrid party authentication source. See https://www.ibm.com/docs/en/ama?topic=configuring-application-modernization-accelerator

    ## Resources Required

    ### Minimum Default Configuration

    | Subsystem  | CPU Minimum | Memory Minimum (GB) | Disk Space Minimum (GB) |
    | ---------- | ----------- | ------------------- | ----------------------- |
    | CouchDB    | 0.5         | 1                   | 20                      |
    | GraphDB    | 0.5         | 1                   | 5                       |
    | Server     | 0.5         | 1                   | N/A                     |
    | UI         | 0.5         | 1                   | N/A                     |
    | Operator   | 0.4         | 0.5                 | N/A                     |

    These values can be changed in the custom resource YAML prior to install (see "Configure and Install Application Modernization Accelerator Instance" section below).

    ## Installing

    Application Modernization Accelerator supports two installation modes:
    - All namespaces on the cluster (default): Operator will be available in all Namespaces.
    - A specific namespace on the cluster: Operator will be available in a single Namespace only.

    ### Installing the Operator to All Namespaces in the Cluster

    - After clicking on the operator tile from the catalog, click the "Install" button. This will take you to a page called "Install Operator".
    - Ensure "Installation mode" is set to "All namespaces on the cluster". It is set to this by default.
    - The operator is installed by subscribing to one of the update channels which also keeps the Operator up to date. Click the install button on this page.

    After a few minutes you should see confirmation that the operator has installed successfully. The Application Modernization Accelerator operator is now available in all namespaces in the cluster.

    ### Installing the Operator to a Specific Namespace in the Cluster
    Please refer to the Application Modernization Accelerator online documentation (https://www.ibm.com/docs/en/ama?topic=install) for details on how to install to a specific namespace. There are manual steps that must be carried out by a cluster admin before installing to a single namespace.

    ### Configure and Install Application Modernization Accelerator Instance
    Before installing the Application Modernization Accelerator instance, you need to complete the following three steps as cluster administrator:

    **Create a project to install the instance**

    If you have already chosen to install the Application Modernization Accelerator Operator to a specific namespace, then you will have already created the project, otherwise create it now as follows:

    Creating the project can be done from the OpenShift UI:
    - Click the hamburger icon in the top left of the Red Hat OpenShift Container Platform dashboard.
    - Expand "Home" menu and select "Projects".
    - Click "Create Project" button.
    - Name the project and click "Create".

    Alternatively, you can use the `oc new-project <AMA_PROJECT>` command from the command line, where `<AMA_PROJECT>` is the name of the desired project.

    You will need the name of the project during the install.

    - **You will need to read and accept the license terms on the create instance page before you will be allowed to proceed with the install of the instance.**

    - The default configuration gives you most of what you need to install the product. Click on the "YAML View" radio button to access the custom resource YAML. Update values in that YAML as required.

    - **You will need to configure the persistence before proceeding with the install**. Please see the prerequisites documentation (which can be found here: https://www.ibm.com/docs/en/ama) document for full details, including examples, of the persistence configuration.

    - You may also need to add image pull secrets to access Application Modernization Accelerator images in the entitled registry. See prerequisites documentation (which can be found here: https://www.ibm.com/docs/en/ama) section for more details on accessing images in the entitled registry.

    See configuration documentation (which can be found here: https://www.ibm.com/docs/en/ama?topic=configuring-application-modernization-accelerator) for a full list of the configurations available in the custom resource YAML file.

    - When you are happy with your configuration, click on the "Create instance" link in the "Details" tab, or click into the "Application Modernization Accelerator" tab and click the "Create AppMod" button.

    ### Customizing UI landing page

    Use "custom.titleText" to put some additional text into "IBM Application Modernization Accelerator" title on the UI landing page.

    Use "custom.landingIcon" variable to replace AMA icon on the landing screen. It consists of four pages. Use following variables to configure each page individually:"custom.landingIcon, custom.landingIcon2, custom.landingIcon3, custom.landingIcon4". Provide a URI or a string encrypted image (max 128KiB in length). For example:

    ```
    landingIcon: "<icon URI>"

    or

    landingIcon: "data:[<mime type>][;charset=<charset>][;base64], <encoded icon>"

    ```

    ### Accessing the UI

    By default, the Application Modernization Accelerator operator exposes the UI as a Route on OpenShift.
    Go to "Networking" - "Routes" and click on the location of the ui-route.

    ### Installing in a Disconnected/Air-gapped Environment

    Documentation for the Disconnected/Air-gapped installation can be found at the following location: https://www.ibm.com/docs/en/ama?topic=ocp-air-gap-install

    # Configuration

    The Application Modernization Accelerator install can be configured by editing the custom resource YAML. This can be access by clicking on the "YAML View" when installing the Application Modernization Accelerator instance. See "Configure and Install Application Modernization Accelerator Instance" section above for more details.

    The full list of configurations available in the custom resource YAML can be found in the configuration documentation (which can be found here: https://www.ibm.com/docs/en/ama?topic=configuring-application-modernization-accelerator)


                        type: string
                      vmAgentImageTag:
                        description: |-
                          VMAgentImageTag overrides vmagent image tag when non-empty.
                          Leave empty to use the vmagent image tag selected by spec.version.
                        type: string
                      vmAgentReplicas:
                        default: 2
                        description: VMAgentReplicas controls replicas for vmagent.
                        format: int32
                        type: integer
                      vmAuthImageRepository:
                        description: VMAuthImageRepository overrides vmauth image
                          repository when non-empty.
                        type: string
                      vmAuthImageTag:
                        description: |-
                          VMAuthImageTag overrides vmauth image tag when non-empty.
                          Leave empty to use the vmauth image tag selected by spec.version.
                        type: string
                      vmAuthReplicas:
                        default: 2
                        description: VMAuthReplicas controls VMAuth replicas.
                        format: int32
                        type: integer
                      vmClusterRequestsLBReplicas:
                        description: |-
                          VMClusterRequestsLBReplicas is deprecated and currently ignored.
                          The operator no longer configures VMCluster requestsLoadBalancer and relies on vminsert services instead.
                        format: int32
                        type: integer
                      vmClusterRetentionPeriod:
                        default: 100y
                        description: VMClusterRetentionPeriod controls VMCluster retention.
                        type: string
                      vmClusterVersion:
                        description: |-
                          VMClusterVersion controls VMCluster clusterVersion.
                          Leave empty to use the VMCluster version selected by spec.version.
                        type: string
                      vmInsertReplicas:
                        default: 2
                        description: VMInsertReplicas controls VMCluster vminsert
                          replicas.
                        format: int32
                        type: integer
                      vmSelectReplicas:
                        default: 2
                        description: VMSelectReplicas controls VMCluster vmselect
                          replicas.
                        format: int32
                        type: integer
                      vmSelectSize:
                        default: 1Gi
                        description: VMSelectSize controls VMCluster vmselect PVC
                          request size.
                        type: string
                      vmStorageReplicas:
                        default: 2
                        description: VMStorageReplicas controls VMCluster vmstorage
                          replicas.
                        format: int32
                        type: integer
                      vmStorageSize:
                        default: 10Gi
                        description: VMStorageSize controls VMCluster vmstorage PVC
                          request size.
                        type: string
                    required:
                    - enabled
                    type: object
                type: object
              mode:
                default: oss
                description: |-
                  Mode selects the Jamaibase runtime profile and controls required secret refs,
                  authentication mode, and generated defaults such as OWL_DB_INIT.
                enum:
                - oss
                - cloud-password
                - cloud-auth0
                type: string
              version:
                default: 0.1.0
                description: |-
                  Version selects the supported Jamaibase stack/image set to reconcile.
                  This is the user-facing operand version and is separate from the Kubernetes API version.
                type: string
            type: object
          status:
            description: JamaibaseStatus defines the observed state of Jamaibase.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              lastError:
                type: string
              observedGeneration:
                format: int64
                type: integer
              phase:
                type: string
            type: object

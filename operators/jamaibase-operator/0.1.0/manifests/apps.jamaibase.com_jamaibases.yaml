                        type: string
                      useSecureCookies:
                        description: |-
                          UseSecureCookies overrides the Jambu auth cookie security setting.
                          Leave unset to derive it from the configured public origin scheme.
                        type: boolean
                    required:
                    - enabled
                    type: object
                  kopi:
                    properties:
                      enabled:
                        default: false
                        description: Enabled controls whether Kopi server and workers
                          should be reconciled.
                        type: boolean
                      imagePullPolicy:
                        default: IfNotPresent
                        description: ImagePullPolicy controls how Kopi images are

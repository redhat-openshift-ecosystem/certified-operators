                            type: boolean
                          instances:
                            default: 1
                            description: Instances is the number of pgbouncer instances
                              in the CNPG pooler.
                            format: int32
                            type: integer
                          type:
                            default: rw
                            description: Type is the pooler service type ("rw" or
                              "ro").
                            type: string
                        required:
                        - enabled
                        type: object
                      secretName:
                        default: pg-owl-user-secret
                        description: SecretName is the namespace secret containing
                          bootstrap database credentials.
                        type: string
                      storageClass:
                        description: StorageClass is the storage class to use. Defaults
                          to spec.global.storageClass.
                        type: string
                      storageSize:
                        default: 10Gi
                        description: StorageSize is the requested PVC size for postgres
                          data.
                        type: string
                    required:
                    - enabled
                    type: object
                  victoriaMetrics:
                    properties:
                      enabled:
                        default: true
                        description: Enabled controls whether VictoriaMetrics child
                          CRs should be reconciled.
                        type: boolean
                      secretName:
                        default: vmuser-secret
                        description: SecretName is the namespace secret containing
                          the vmuser password.
                        type: string
                      storageClass:
                        description: StorageClass is the storage class to use. Defaults

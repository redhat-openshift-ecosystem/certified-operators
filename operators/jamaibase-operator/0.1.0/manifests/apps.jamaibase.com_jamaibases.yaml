              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: JamaibaseSpec defines the desired state of Jamaibase.
            properties:
              application:
                properties:
                  gotenberg:
                    properties:
                      enabled:
                        default: true
                        description: Enabled controls whether Gotenberg child resources
                          should be reconciled.
                        type: boolean
                      image:
                        description: Leave empty to use the Gotenberg image selected

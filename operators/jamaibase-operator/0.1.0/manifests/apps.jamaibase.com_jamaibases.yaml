                              memory:
                                type: string
                            type: object
                          requests:
                            properties:
                              cpu:
                                type: string
                              memory:
                                type: string
                            type: object
                        type: object
                    required:
                    - enabled
                    type: object
                  jambu:
                    properties:
                      enabled:
                        default: true
                        description: Enabled controls whether Jambu frontend resources

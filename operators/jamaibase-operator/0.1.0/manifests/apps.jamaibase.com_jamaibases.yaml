                        type: boolean
                      image:
                        description: Leave empty to use the Jambu image selected by
                          spec.version.
                        type: string
                      imagePullPolicy:
                        default: Always
                        description: ImagePullPolicy controls how the image is pulled.
                        type: string
                      publicOrigin:
                        description: |-
                          PublicOrigin overrides the browser-facing Jambu origin used for cookies, auth callbacks,
                          and absolute frontend URLs. Set this when Jambu sits behind an external reverse proxy or custom domain.
                          Example: https://builder.chefjeff.vip
                        type: string
                      replicas:
                        default: 1
                        description: Replicas is the number of Jambu replicas.
                        format: int32
                        type: integer
                      routeHost:
                        description: RouteHost sets an explicit host for the Jambu
                          route. Empty means auto-generated host.
                        type: string
                      routeTLS:
                        description: RouteTLS configures TLS for the generated Jambu
                          route. Empty keeps the current non-TLS default.
                        properties:
                          enabled:
                            description: Enabled turns on OpenShift Route TLS for
                              the generated route.
                            type: boolean
                          insecureEdgeTerminationPolicy:
                            description: InsecureEdgeTerminationPolicy controls how
                              insecure traffic is handled.
                            type: string
                          termination:
                            default: edge
                            description: Termination is the OpenShift route TLS termination
                              mode.
                            type: string
                        type: object
                      secretName:
                        description: |-
                          SecretName is an optional namespace secret consumed by Jambu via envFrom.

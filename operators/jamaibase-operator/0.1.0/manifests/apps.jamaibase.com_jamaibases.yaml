                        type: string
                      workerReplicas:
                        default: 5
                        description: WorkerReplicas is the number of Kopi worker replicas.
                        format: int32
                        type: integer
                      workerRouteHost:
                        description: WorkerRouteHost sets an explicit host for the
                          Kopi worker route. Empty means auto-generated host.
                        type: string
                      workerRouteTLS:
                        description: WorkerRouteTLS configures TLS for the generated
                          Kopi worker route.
                        properties:
                          enabled:
                            description: Enabled turns on OpenShift Route TLS for

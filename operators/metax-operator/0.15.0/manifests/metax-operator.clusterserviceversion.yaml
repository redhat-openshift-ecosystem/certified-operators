          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/component: metax-operator
                app.kubernetes.io/instance: metax-operator
                app.kubernetes.io/name: metax-operator
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: metax-operator
                  app.kubernetes.io/instance: metax-operator
                  app.kubernetes.io/name: metax-operator
              spec:
                affinity:
                  nodeAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - preference:
                          matchExpressions:
                            - key: node-role.kubernetes.io/master
                              operator: In
                              values:
                                - ""
                        weight: 1
                      - preference:
                          matchExpressions:
                            - key: node-role.kubernetes.io/control-plane
                              operator: In
                              values:
                                - ""
                        weight: 1
                containers:
                  - args:
                      - --leader-elect
                    command:
                      - /metax-operator
                    env:
                      - name: POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: NODE_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName
                      - name: MINIMAL_MODE
                        value: "false"
                      - name: OPERATOR_REGISTRY

  description: |
    The Metax Operator manages the full lifecycle of GPU drivers,
    MACA runtime, device plugins, and monitoring components on Kubernetes clusters.
    It automates the deployment, configuration, and maintenance of GPU infrastructure
    for AI/ML workloads.
  displayName: Metax Operator

                    image: cr.metax-tech.com/cloud/operator-controller@sha256:6fd103a444c8c2ac8e13d12fca0c7791afad3486a61a6de58488be91fcf99475
                    imagePullPolicy: IfNotPresent
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: metax-operator
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    securityContext: {}
                securityContext: {}
                serviceAccountName: metax-operator
                tolerations:

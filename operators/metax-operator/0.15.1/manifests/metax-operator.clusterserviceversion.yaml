          serviceAccountName: metax-operator
      deployments:
        - name: metax-operator
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/component: metax-operator
                app.kubernetes.io/instance: metax-operator
                app.kubernetes.io/name: metax-operator
            template:
              metadata:
                labels:
                  app.kubernetes.io/component: metax-operator
                  app.kubernetes.io/instance: metax-operator
                  app.kubernetes.io/name: metax-operator
              spec:
                affinity:
                  nodeAffinity:
                    preferredDuringSchedulingIgnoredDuringExecution:
                      - preference:
                          matchExpressions:
                            - key: node-role.kubernetes.io/master
                              operator: In
                              values:
                                - ""
                        weight: 1
                      - preference:
                          matchExpressions:
                            - key: node-role.kubernetes.io/control-plane
                              operator: In
                              values:
                                - ""
                        weight: 1
                containers:
                  - args:
                      - --leader-elect
                    command:
                      - /metax-operator
                    env:
                      - name: POD_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: NODE_NAME
                        valueFrom:
                          fieldRef:
                            fieldPath: spec.nodeName
                      - name: MINIMAL_MODE
                        value: "false"
                      - name: OPERATOR_REGISTRY
                        value: cr.metax-tech.com/cloud
                    image: cr.metax-tech.com/cloud/operator-controller@sha256:ee001462d1daf769d6102eff44080995d93587237d2b344258ebc1a6a0e28886
                    imagePullPolicy: IfNotPresent
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: metax-operator
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    securityContext: {}
                securityContext: {}
                serviceAccountName: metax-operator
                tolerations:
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/master
                    operator: Equal
                    value: ""
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/control-plane
                    operator: Equal
                    value: ""

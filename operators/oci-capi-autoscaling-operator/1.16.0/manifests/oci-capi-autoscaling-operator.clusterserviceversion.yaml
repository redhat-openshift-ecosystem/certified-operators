            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:text
          - description: OCI flexible shape OCPU and memory settings.
            displayName: Shape Config
            path: autoscaling.shapeConfig
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Shape Config
          - description: Number of OCPUs for flexible OCI VM shapes.
            displayName: Shape OCPUs
            path: autoscaling.shapeConfig.cpus
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:number
          - description: Memory in GB for flexible OCI VM shapes.
            displayName: Shape Memory
            path: autoscaling.shapeConfig.memory
            x-descriptors:

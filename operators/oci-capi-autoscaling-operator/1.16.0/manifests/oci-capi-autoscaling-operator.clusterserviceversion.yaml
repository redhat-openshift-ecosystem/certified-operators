            path: clusterAutoscaler
            x-descriptors:
              - urn:alm:descriptor:com.tectonic.ui:fieldGroup:Cluster Autoscaler
        statusDescriptors:
          - description: Current high-level reconciliation phase.
            displayName: Phase
            path: phase
            x-descriptors:
              - urn:alm:descriptor:text
          - description: Whether CAPI and CAPOCI dependencies are available.
            displayName: CAPI Installed
            path: capiInstalled
            x-descriptors:

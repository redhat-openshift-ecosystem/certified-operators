          serviceAccountName: oci-capi-operator-controller-manager
      deployments:
        - label:
            app.kubernetes.io/managed-by: kustomize
            app.kubernetes.io/name: oci-capi-autoscaling-operator
            control-plane: controller-manager
          name: oci-capi-operator-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            strategy:
              type: Recreate
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  control-plane: controller-manager
              spec:
                affinity:
                  nodeAffinity:
                    requiredDuringSchedulingIgnoredDuringExecution:
                      nodeSelectorTerms:
                        - matchExpressions:
                            - key: kubernetes.io/os
                              operator: In
                              values:
                                - linux
                            - key: kubernetes.io/arch
                              operator: In
                              values:
                                - amd64
                                - arm64
                containers:
                  - args:
                      - run
                      - --leader-elect
                      - --metrics-bind-address=:28080
                      - --health-probe-bind-address=:28081
                    command:
                      - /manager
                    env:
                      - name: OCI_CREDENTIALS_FINGERPRINT
                        valueFrom:
                          secretKeyRef:
                            key: fingerprint
                            name: oci-capi-operator-capoci-auth-credentials
                            optional: true
                      - name: OCI_CREDENTIALS_KEY
                        valueFrom:
                          secretKeyRef:
                            key: privateKey
                            name: oci-capi-operator-capoci-auth-credentials
                            optional: true
                      - name: OCI_CREDENTIALS_PASSPHRASE
                        valueFrom:
                          secretKeyRef:
                            key: passphrase
                            name: oci-capi-operator-capoci-auth-credentials
                            optional: true
                    envFrom:
                      - configMapRef:
                          name: oci-capi-operator-config
                    image: ghcr.io/yutpeng/openshift-oracle-capi-autoscaling-dev-preview@sha256:526f5ad02a778cfc03e0e925cc60b56413fffd68a2c1bc70b92ae6b305faf5df
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 28081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 28081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: 500m
                        memory: 1000Mi
                      requests:
                        cpu: 10m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                initContainers:
                  - args:
                      - init
                    command:
                      - /manager
                    envFrom:
                      - configMapRef:
                          name: oci-capi-operator-config
                    image: ghcr.io/yutpeng/openshift-oracle-capi-autoscaling-dev-preview@sha256:526f5ad02a778cfc03e0e925cc60b56413fffd68a2c1bc70b92ae6b305faf5df
                    name: crdgen
                    resources: {}
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                nodeSelector:
                  node-role.kubernetes.io/control-plane: ""
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: oci-capi-operator-controller-manager
                terminationGracePeriodSeconds: 10
                tolerations:
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/master
                  - effect: NoSchedule
                    key: node-role.kubernetes.io/control-plane
    strategy: deployment

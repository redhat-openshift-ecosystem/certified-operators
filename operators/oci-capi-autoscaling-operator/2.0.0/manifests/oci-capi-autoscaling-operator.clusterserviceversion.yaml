      deployments:
      - label:
          app.kubernetes.io/managed-by: kustomize
          app.kubernetes.io/name: oci-capi-autoscaling-operator
          control-plane: controller-manager
        name: oci-capi-operator-controller-manager
        spec:
          replicas: 1
          selector:
            matchLabels:
              control-plane: controller-manager
          strategy: {}
          template:
            metadata:
              annotations:
                kubectl.kubernetes.io/default-container: manager
              labels:
                app.kubernetes.io/name: oci-capi-autoscaling-operator
                control-plane: controller-manager
            spec:
              affinity:
                nodeAffinity:
                  requiredDuringSchedulingIgnoredDuringExecution:
                    nodeSelectorTerms:
                    - matchExpressions:
                      - key: kubernetes.io/os
                        operator: In
                        values:
                        - linux
                      - key: kubernetes.io/arch
                        operator: In
                        values:
                        - amd64
                        - arm64
              containers:
              - args:
                - run
                - --leader-elect
                - --metrics-bind-address=:28080
                - --health-probe-bind-address=:28081
                command:
                - /manager
                env:
                - name: OCI_CREDENTIALS_FINGERPRINT
                  valueFrom:
                    secretKeyRef:
                      key: fingerprint
                      name: oci-capi-operator-capoci-auth-credentials
                      optional: true
                - name: OCI_CREDENTIALS_KEY
                  valueFrom:
                    secretKeyRef:
                      key: privateKey
                      name: oci-capi-operator-capoci-auth-credentials
                      optional: true
                - name: OCI_CREDENTIALS_PASSPHRASE
                  valueFrom:
                    secretKeyRef:
                      key: passphrase
                      name: oci-capi-operator-capoci-auth-credentials
                      optional: true
                - name: OPERATOR_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                envFrom:
                - configMapRef:
                    name: oci-capi-operator-config
                image: ghcr.io/oracle-samples/openshift-oracle-capi-autoscaling@sha256:a372a984b5bf58ca101ae6c7f294fba18a2a5cd6c70f442d5d8a56c138e52235
                livenessProbe:
                  httpGet:
                    path: /healthz
                    port: 28081
                  initialDelaySeconds: 15
                  periodSeconds: 20
                name: manager
                readinessProbe:
                  httpGet:
                    path: /readyz
                    port: 28081
                  initialDelaySeconds: 5
                  periodSeconds: 10
                resources:
                  limits:
                    cpu: 500m
                    memory: 1000Mi
                  requests:
                    cpu: 10m
                    memory: 128Mi
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              initContainers:
              - args:
                - init
                command:
                - /manager
                envFrom:
                - configMapRef:
                    name: oci-capi-operator-config
                image: ghcr.io/oracle-samples/openshift-oracle-capi-autoscaling@sha256:a372a984b5bf58ca101ae6c7f294fba18a2a5cd6c70f442d5d8a56c138e52235
                name: crdgen
                resources: {}
                securityContext:
                  allowPrivilegeEscalation: false
                  capabilities:
                    drop:
                    - ALL
              securityContext:
                runAsNonRoot: true
              serviceAccountName: oci-capi-operator-controller-manager
              terminationGracePeriodSeconds: 10

spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - description: |-
        OCIClusterAutoscaler is the Schema for the ociclusterautoscalers API.
        The controller manages singleton cluster-scoped resources, so only one
        OCIClusterAutoscaler may actively reconcile in a cluster.
      displayName: OCICluster Autoscaler
      kind: OCIClusterAutoscaler
      name: ociclusterautoscalers.capi.openshift.io
      version: v1alpha1
  description: |-
    The OCI CAPI Autoscaling Operator manages Cluster API based worker node
    autoscaling for OpenShift clusters running on Oracle Cloud Infrastructure.
    It reconciles the OCIClusterAutoscaler custom resource, configures the
    cluster-autoscaler deployment for Cluster API, creates the CAPI/CAPOCI
    objects required for autoscaled worker nodes, and reports installation and
    reconciliation status through custom resource conditions.
  displayName: OCI CAPI Autoscaling Operator

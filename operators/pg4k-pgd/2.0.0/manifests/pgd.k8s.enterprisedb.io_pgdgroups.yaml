      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1beta1
    schema:
      openAPIV3Schema:
        description: PGDGroup is the Schema for the pgdgroups API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PGDGroupSpec defines the desired state of PGDGroup
            properties:
              backup:
                description: |-
                  The configuration to be used for backups in the
                  CNP instances.
                properties:
                  configuration:
                    description: The CNP configuration to be used for backup. ServerName
                      value is reserved by the operator.
                    properties:
                      barmanObjectStore:
                        description: The configuration for the barman-cloud tool suite
                        properties:
                          azureCredentials:
                            description: The credentials to use to upload data to
                              Azure Blob Storage
                            properties:
                              connectionString:
                                description: The connection string to be used
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              inheritFromAzureAD:
                                description: Use the Azure AD based authentication
                                  without providing explicitly the keys.
                                type: boolean
                              storageAccount:
                                description: The storage account where to upload data
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              storageKey:
                                description: |-
                                  The storage account key to be used in conjunction
                                  with the storage account name
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              storageSasToken:
                                description: |-
                                  A shared-access-signature to be used in conjunction with
                                  the storage account name
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              useDefaultAzureCredentials:
                                description: |-
                                  Use the default Azure authentication flow, which includes DefaultAzureCredential.
                                  This allows authentication using environment variables and managed identities.
                                type: boolean
                            type: object
                          data:
                            description: |-
                              The configuration to be used to backup the data files
                              When not defined, base backups files will be stored uncompressed and may
                              be unencrypted in the object store, according to the bucket default
                              policy.
                            properties:
                              additionalCommandArgs:
                                description: |-
                                  AdditionalCommandArgs represents additional arguments that can be appended
                                  to the 'barman-cloud-backup' command-line invocation. These arguments
                                  provide flexibility to customize the backup process further according to
                                  specific requirements or configurations.

                                  Example:
                                  In a scenario where specialized backup options are required, such as setting
                                  a specific timeout or defining custom behavior, users can use this field
                                  to specify additional command arguments.

                                  Note:
                                  It's essential to ensure that the provided arguments are valid and supported
                                  by the 'barman-cloud-backup' command, to avoid potential errors or unintended
                                  behavior during execution.
                                items:
                                  type: string
                                type: array
                              compression:
                                description: |-
                                  Compress a backup file (a tar file per tablespace) while streaming it
                                  to the object store. Available options are empty string (no
                                  compression, default), `gzip`, `bzip2`, and `snappy`.
                                enum:
                                - bzip2
                                - gzip
                                - snappy
                                type: string
                              encryption:
                                description: |-
                                  Whenever to force the encryption of files (if the bucket is
                                  not already configured for that).
                                  Allowed options are empty string (use the bucket policy, default),
                                  `AES256` and `aws:kms`
                                enum:
                                - AES256
                                - aws:kms
                                type: string
                              immediateCheckpoint:
                                description: |-
                                  Control whether the I/O workload for the backup initial checkpoint will
                                  be limited, according to the `checkpoint_completion_target` setting on
                                  the PostgreSQL server. If set to true, an immediate checkpoint will be
                                  used, meaning PostgreSQL will complete the checkpoint as soon as
                                  possible. `false` by default.
                                type: boolean
                              jobs:
                                description: |-
                                  The number of parallel jobs to be used to upload the backup, defaults
                                  to 2
                                format: int32
                                minimum: 1
                                type: integer
                            type: object
                          destinationPath:
                            description: |-
                              The path where to store the backup (i.e. s3://bucket/path/to/folder)
                              this path, with different destination folders, will be used for WALs
                              and for data
                            minLength: 1
                            type: string
                          endpointCA:
                            description: |-
                              EndpointCA store the CA bundle of the barman endpoint.
                              Useful when using self-signed certificates to avoid
                              errors with certificate issuer and barman-cloud-wal-archive
                            properties:
                              key:
                                description: The key to select
                                type: string
                              name:
                                description: Name of the referent.
                                type: string
                            required:
                            - key
                            - name
                            type: object
                          endpointURL:
                            description: |-
                              Endpoint to be used to upload data to the cloud,
                              overriding the automatic endpoint discovery
                            type: string
                          googleCredentials:
                            description: The credentials to use to upload data to
                              Google Cloud Storage
                            properties:
                              applicationCredentials:
                                description: The secret containing the Google Cloud
                                  Storage JSON file with the credentials
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              gkeEnvironment:
                                description: |-
                                  If set to true, will presume that it's running inside a GKE environment,
                                  default to false.
                                type: boolean
                            type: object
                          historyTags:
                            additionalProperties:
                              type: string
                            description: |-
                              HistoryTags is a list of key value pairs that will be passed to the
                              Barman --history-tags option.
                            type: object
                          s3Credentials:
                            description: The credentials to use to upload data to
                              S3
                            properties:
                              accessKeyId:
                                description: The reference to the access key id
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              inheritFromIAMRole:
                                description: Use the role based authentication without
                                  providing explicitly the keys.
                                type: boolean
                              region:
                                description: The reference to the secret containing
                                  the region name
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              secretAccessKey:
                                description: The reference to the secret access key
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                              sessionToken:
                                description: The references to the session key
                                properties:
                                  key:
                                    description: The key to select
                                    type: string
                                  name:
                                    description: Name of the referent.
                                    type: string
                                required:
                                - key
                                - name
                                type: object
                            type: object
                          serverName:
                            description: |-
                              The server name on S3, the cluster name is used if this
                              parameter is omitted
                            type: string
                          tags:
                            additionalProperties:
                              type: string
                            description: |-
                              Tags is a list of key value pairs that will be passed to the
                              Barman --tags option.
                            type: object
                          wal:
                            description: |-
                              The configuration for the backup of the WAL stream.
                              When not defined, WAL files will be stored uncompressed and may be
                              unencrypted in the object store, according to the bucket default policy.
                            properties:
                              archiveAdditionalCommandArgs:
                                description: |-
                                  Additional arguments that can be appended to the 'barman-cloud-wal-archive'
                                  command-line invocation. These arguments provide flexibility to customize
                                  the WAL archive process further, according to specific requirements or configurations.

                                  Example:
                                  In a scenario where specialized backup options are required, such as setting
                                  a specific timeout or defining custom behavior, users can use this field
                                  to specify additional command arguments.

                                  Note:
                                  It's essential to ensure that the provided arguments are valid and supported
                                  by the 'barman-cloud-wal-archive' command, to avoid potential errors or unintended
                                  behavior during execution.
                                items:
                                  type: string
                                type: array
                              compression:
                                description: |-
                                  Compress a WAL file before sending it to the object store. Available
                                  options are empty string (no compression, default), `gzip`, `bzip2`,
                                  `lz4`, `snappy`, `xz`, and `zstd`.
                                enum:
                                - bzip2
                                - gzip
                                - lz4
                                - snappy
                                - xz
                                - zstd
                                type: string
                              encryption:
                                description: |-
                                  Whenever to force the encryption of files (if the bucket is
                                  not already configured for that).
                                  Allowed options are empty string (use the bucket policy, default),
                                  `AES256` and `aws:kms`
                                enum:
                                - AES256
                                - aws:kms
                                type: string
                              maxParallel:
                                description: |-
                                  Number of WAL files to be either archived in parallel (when the
                                  PostgreSQL instance is archiving to a backup object store) or
                                  restored in parallel (when a PostgreSQL standby is fetching WAL
                                  files from a recovery object store). If not specified, WAL files
                                  will be processed one at a time. It accepts a positive integer as a
                                  value - with 1 being the minimum accepted value.
                                minimum: 1
                                type: integer
                              restoreAdditionalCommandArgs:
                                description: |-
                                  Additional arguments that can be appended to the 'barman-cloud-wal-restore'
                                  command-line invocation. These arguments provide flexibility to customize
                                  the WAL restore process further, according to specific requirements or configurations.

                                  Example:
                                  In a scenario where specialized backup options are required, such as setting
                                  a specific timeout or defining custom behavior, users can use this field
                                  to specify additional command arguments.

                                  Note:
                                  It's essential to ensure that the provided arguments are valid and supported
                                  by the 'barman-cloud-wal-restore' command, to avoid potential errors or unintended
                                  behavior during execution.
                                items:
                                  type: string
                                type: array
                            type: object
                        required:
                        - destinationPath
                        type: object
                      retentionPolicy:
                        description: |-
                          RetentionPolicy is the retention policy to be used for backups
                          and WALs (i.e. '60d'). The retention policy is expressed in the form
                          of `XXu` where `XX` is a positive integer and `u` is in `[dwm]` -
                          days, weeks, months.
                          It's currently only applicable when using the BarmanObjectStore method.
                        pattern: ^[1-9][0-9]*[dwm]$
                        type: string
                      target:
                        description: |-
                          The policy to decide which instance should perform backups. Available
                          options are empty string, which will default to `prefer-standby` policy,
                          `primary` to have backups run always on primary instances, `prefer-standby`
                          to have backups run preferably on the most updated standby, if available.
                        enum:
                        - primary
                        - prefer-standby
                        type: string
                      volumeSnapshot:
                        description: VolumeSnapshot provides the configuration for
                          the execution of volume snapshot backups.
                        properties:
                          annotations:
                            additionalProperties:
                              type: string
                            description: Annotations key-value pairs that will be
                              added to .metadata.annotations snapshot resources.
                            type: object
                          className:
                            description: |-
                              ClassName specifies the Snapshot Class to be used for PG_DATA PersistentVolumeClaim.
                              It is the default class for the other types if no specific class is present
                            type: string
                          labels:
                            additionalProperties:
                              type: string
                            description: Labels are key-value pairs that will be added
                              to .metadata.labels snapshot resources.
                            type: object
                          online:
                            default: true
                            description: |-
                              Whether the default type of backup with volume snapshots is
                              online/hot (`true`, default) or offline/cold (`false`)
                            type: boolean
                          onlineConfiguration:
                            default:
                              immediateCheckpoint: false
                              waitForArchive: true
                            description: Configuration parameters to control the online/hot
                              backup with volume snapshots
                            properties:
                              immediateCheckpoint:
                                description: |-
                                  Control whether the I/O workload for the backup initial checkpoint will
                                  be limited, according to the `checkpoint_completion_target` setting on
                                  the PostgreSQL server. If set to true, an immediate checkpoint will be
                                  used, meaning PostgreSQL will complete the checkpoint as soon as
                                  possible. `false` by default.
                                type: boolean
                              waitForArchive:
                                default: true
                                description: |-
                                  If false, the function will return immediately after the backup is completed,
                                  without waiting for WAL to be archived.
                                  This behavior is only useful with backup software that independently monitors WAL archiving.
                                  Otherwise, WAL required to make the backup consistent might be missing and make the backup useless.
                                  By default, or when this parameter is true, pg_backup_stop will wait for WAL to be archived when archiving is
                                  enabled.
                                  On a standby, this means that it will wait only when archive_mode = always.
                                  If write activity on the primary is low, it may be useful to run pg_switch_wal on the primary in order to trigger
                                  an immediate segment switch.
                                type: boolean
                            type: object
                          snapshotOwnerReference:
                            default: none
                            description: SnapshotOwnerReference indicates the type
                              of owner reference the snapshot should have
                            enum:
                            - none
                            - cluster
                            - backup
                            type: string
                          tablespaceClassName:
                            additionalProperties:
                              type: string
                            description: |-
                              TablespaceClassName specifies the Snapshot Class to be used for the tablespaces.
                              defaults to the PGDATA Snapshot Class, if set
                            type: object
                          walClassName:
                            description: WalClassName specifies the Snapshot Class
                              to be used for the PG_WAL PersistentVolumeClaim.
                            type: string
                        type: object
                    type: object
                  cron:
                    description: |-
                      The scheduled backup for the data.
                      please use schedulers instead.

                      Deprecated: This field is deprecated, will be removed in future versions.
                    properties:
                      backupOwnerReference:
                        default: none
                        description: |-
                          Indicates which ownerReference should be put inside the created backup resources.
                          - none: no owner reference for created backup objects (same behavior as before the field was introduced)
                          - self: sets the Scheduled backup object as owner of the backup
                          - cluster: set the cluster as owner of the backup
                        enum:
                        - none
                        - self
                        - cluster
                        type: string
                      immediate:
                        description: If the first backup has to be immediately start
                          after creation or not
                        type: boolean
                      method:
                        default: barmanObjectStore
                        description: |-
                          The backup method to be used, possible options are `barmanObjectStore`,
                          `volumeSnapshot` and `plugin`. Defaults to: `barmanObjectStore`.
                        enum:
                        - barmanObjectStore
                        - volumeSnapshot
                        - plugin
                        type: string
                      online:
                        description: |-
                          Whether the default type of backup with volume snapshots is
                          online/hot (`true`, default) or offline/cold (`false`)
                          Overrides the default setting specified in the cluster field '.spec.backup.volumeSnapshot.online'
                        type: boolean
                      onlineConfiguration:
                        description: |-
                          Configuration parameters to control the online/hot backup with volume snapshots
                          Overrides the default settings specified in the cluster '.backup.volumeSnapshot.onlineConfiguration' stanza
                        properties:
                          immediateCheckpoint:
                            description: |-
                              Control whether the I/O workload for the backup initial checkpoint will
                              be limited, according to the `checkpoint_completion_target` setting on
                              the PostgreSQL server. If set to true, an immediate checkpoint will be
                              used, meaning PostgreSQL will complete the checkpoint as soon as
                              possible. `false` by default.
                            type: boolean
                          waitForArchive:
                            default: true
                            description: |-
                              If false, the function will return immediately after the backup is completed,
                              without waiting for WAL to be archived.
                              This behavior is only useful with backup software that independently monitors WAL archiving.
                              Otherwise, WAL required to make the backup consistent might be missing and make the backup useless.
                              By default, or when this parameter is true, pg_backup_stop will wait for WAL to be archived when archiving is
                              enabled.
                              On a standby, this means that it will wait only when archive_mode = always.
                              If write activity on the primary is low, it may be useful to run pg_switch_wal on the primary in order to trigger
                              an immediate segment switch.
                            type: boolean
                        type: object
                      pluginConfiguration:
                        description: Configuration parameters passed to the plugin
                          managing this backup
                        properties:
                          name:
                            description: Name is the name of the plugin managing this
                              backup
                            type: string
                          parameters:
                            additionalProperties:
                              type: string
                            description: |-
                              Parameters are the configuration parameters passed to the backup
                              plugin for this backup
                            type: object
                        required:
                        - name
                        type: object
                      schedule:
                        description: |-
                          The schedule does not follow the same format used in Kubernetes CronJobs
                          as it includes an additional second specifier,
                          see https://pkg.go.dev/github.com/robfig/cron#hdr-CRON_Expression_Format
                        type: string
                      suspend:
                        description: If this backup is suspended or not
                        type: boolean
                      target:
                        description: |-
                          The policy to decide which instance should perform this backup. If empty,
                          it defaults to `cluster.spec.backup.target`.
                          Available options are empty string, `primary` and `prefer-standby`.
                          `primary` to have backups run always on primary instances,
                          `prefer-standby` to have backups run preferably on the most updated
                          standby, if available. For PGD groups, this field is ignored and the backup will always
                          run on the primary instance as there is no standby in the node cluster.
                        enum:
                        - primary
                        - prefer-standby
                        type: string
                    required:
                    - schedule
                    type: object
                  schedulers:
                    description: |-
                      Define schedulers for the backup. Each scheduler has a different backup method.
                      Only one of either `backup.cron` or `backup.schedulers` can be defined.
                    items:
                      description: ScheduledBackupSpec defines the desired state of
                        ScheduledBackup
                      properties:
                        backupOwnerReference:
                          default: none
                          description: |-
                            Indicates which ownerReference should be put inside the created backup resources.
                            - none: no owner reference for created backup objects (same behavior as before the field was introduced)
                            - self: sets the Scheduled backup object as owner of the backup
                            - cluster: set the cluster as owner of the backup
                          enum:
                          - none
                          - self
                          - cluster
                          type: string
                        immediate:
                          description: If the first backup has to be immediately start
                            after creation or not
                          type: boolean
                        method:
                          default: barmanObjectStore
                          description: |-
                            The backup method to be used, possible options are `barmanObjectStore`,
                            `volumeSnapshot` and `plugin`. Defaults to: `barmanObjectStore`.
                          enum:
                          - barmanObjectStore
                          - volumeSnapshot
                          - plugin
                          type: string
                        online:
                          description: |-
                            Whether the default type of backup with volume snapshots is
                            online/hot (`true`, default) or offline/cold (`false`)
                            Overrides the default setting specified in the cluster field '.spec.backup.volumeSnapshot.online'
                          type: boolean
                        onlineConfiguration:
                          description: |-
                            Configuration parameters to control the online/hot backup with volume snapshots
                            Overrides the default settings specified in the cluster '.backup.volumeSnapshot.onlineConfiguration' stanza
                          properties:
                            immediateCheckpoint:
                              description: |-
                                Control whether the I/O workload for the backup initial checkpoint will
                                be limited, according to the `checkpoint_completion_target` setting on
                                the PostgreSQL server. If set to true, an immediate checkpoint will be
                                used, meaning PostgreSQL will complete the checkpoint as soon as
                                possible. `false` by default.
                              type: boolean
                            waitForArchive:
                              default: true
                              description: |-
                                If false, the function will return immediately after the backup is completed,
                                without waiting for WAL to be archived.
                                This behavior is only useful with backup software that independently monitors WAL archiving.
                                Otherwise, WAL required to make the backup consistent might be missing and make the backup useless.
                                By default, or when this parameter is true, pg_backup_stop will wait for WAL to be archived when archiving is
                                enabled.
                                On a standby, this means that it will wait only when archive_mode = always.
                                If write activity on the primary is low, it may be useful to run pg_switch_wal on the primary in order to trigger
                                an immediate segment switch.
                              type: boolean
                          type: object
                        pluginConfiguration:
                          description: Configuration parameters passed to the plugin
                            managing this backup
                          properties:
                            name:
                              description: Name is the name of the plugin managing
                                this backup
                              type: string
                            parameters:
                              additionalProperties:
                                type: string
                              description: |-
                                Parameters are the configuration parameters passed to the backup
                                plugin for this backup
                              type: object
                          required:
                          - name
                          type: object
                        schedule:
                          description: |-
                            The schedule does not follow the same format used in Kubernetes CronJobs
                            as it includes an additional second specifier,
                            see https://pkg.go.dev/github.com/robfig/cron#hdr-CRON_Expression_Format
                          type: string
                        suspend:
                          description: If this backup is suspended or not
                          type: boolean
                        target:
                          description: |-
                            The policy to decide which instance should perform this backup. If empty,
                            it defaults to `cluster.spec.backup.target`.
                            Available options are empty string, `primary` and `prefer-standby`.
                            `primary` to have backups run always on primary instances,
                            `prefer-standby` to have backups run preferably on the most updated
                            standby, if available. For PGD groups, this field is ignored and the backup will always
                            run on the primary instance as there is no standby in the node cluster.
                          enum:
                          - primary
                          - prefer-standby
                          type: string
                      required:
                      - schedule
                      type: object
                    type: array
                type: object
              cnp:
                description: |-
                  DataInstances configuration that will be injected into the CNP
                  clusters that compose the PGD Group
                properties:
                  affinity:
                    description: Affinity/Anti-affinity rules for Pods
                    properties:
                      additionalPodAffinity:
                        description: AdditionalPodAffinity allows to specify pod affinity
                          terms to be passed to all the cluster's pods.
                        properties:
                          preferredDuringSchedulingIgnoredDuringExecution:
                            description: |-
                              The scheduler will prefer to schedule pods to nodes that satisfy
                              the affinity expressions specified by this field, but it may choose
                              a node that violates one or more of the expressions. The node that is
                              most preferred is the one with the greatest sum of weights, i.e.
                              for each node that meets all of the scheduling requirements (resource
                              request, requiredDuringScheduling affinity expressions, etc.),
                              compute a sum by iterating through the elements of this field and adding
                              "weight" to the sum if the node has pods which matches the corresponding podAffinityTerm; the
                              node(s) with the highest sum are the most preferred.
                            items:
                              description: The weights of all of the matched WeightedPodAffinityTerm
                                fields are added per-node to find the most preferred
                                node(s)
                              properties:
                                podAffinityTerm:
                                  description: Required. A pod affinity term, associated
                                    with the corresponding weight.
                                  properties:
                                    labelSelector:
                                      description: |-
                                        A label query over a set of resources, in this case pods.
                                        If it's null, this PodAffinityTerm matches with no Pods.
                                      properties:
                                        matchExpressions:
                                          description: matchExpressions is a list
                                            of label selector requirements. The requirements
                                            are ANDed.
                                          items:
                                            description: |-
                                              A label selector requirement is a selector that contains values, a key, and an operator that
                                              relates the key and values.
                                            properties:
                                              key:
                                                description: key is the label key
                                                  that the selector applies to.
                                                type: string

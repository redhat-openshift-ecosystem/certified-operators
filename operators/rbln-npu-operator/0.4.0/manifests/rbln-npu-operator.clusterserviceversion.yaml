              resources:
                - rblnclusterpolicies
                - rblndrivers
              verbs:
                - create
                - delete
                - get
                - list
                - patch
                - update
                - watch
            - apiGroups:
                - rebellions.ai
              resources:
                - rblnclusterpolicies/finalizers
                - rblndrivers/finalizers
              verbs:
                - update
            - apiGroups:
                - rebellions.ai
              resources:
                - rblnclusterpolicies/status
                - rblndrivers/status
              verbs:

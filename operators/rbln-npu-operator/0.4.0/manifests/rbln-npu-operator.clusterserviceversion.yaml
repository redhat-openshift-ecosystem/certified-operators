  description: RBLN Operator automates the deployment and management of RBLN NPU drivers, device plugins, CRDs, firmware updates, and health monitoring for seamless integration into Kubernetes.
  displayName: RBLN operator
  icon:
    - base64data: 
      mediatype: image/svg+xml
  install:
    spec:
      clusterPermissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps

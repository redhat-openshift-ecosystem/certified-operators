              verbs:
                - use
            - apiGroups:
                - authentication.k8s.io
              resources:
                - tokenreviews
              verbs:
                - create
            - apiGroups:
                - authorization.k8s.io
              resources:
                - subjectaccessreviews
              verbs:
                - create
          serviceAccountName: controller-manager
      deployments:
        - label:
            app.kubernetes.io/managed-by: kustomize
            app.kubernetes.io/name: rbln-npu-operator
            control-plane: controller-manager
          name: controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                control-plane: controller-manager
            strategy: {}
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --metrics-bind-address=:8443
                      - --leader-elect
                      - --health-probe-bind-address=:8081
                    command:
                      - /usr/bin/npu-operator
                    env:
                      - name: OPERATOR_NAMESPACE
                        valueFrom:
                          fieldRef:
                            fieldPath: metadata.namespace
                      - name: RELATED_IMAGE_RBLN_NPU_OPERATOR
                        value: docker.io/rebellions/rbln-npu-operator@sha256:d70b70e804c63f5008520edeb786324e8ecd361e7fc121d0c11f9158602d55c8
                      - name: RELATED_IMAGE_RBLN_K8S_DEVICE_PLUGIN
                        value: docker.io/rebellions/k8s-device-plugin@sha256:4bafc5f81b0a5595b4bdfda2dbbd65ea1c8e2de62b5e764d3b2a8b3da3b33e0b
                      - name: RELATED_IMAGE_RBLN_METRICS_EXPORTER
                        value: docker.io/rebellions/rbln-metrics-exporter@sha256:4455bd983c530b68a7032c4c75beadd24027cbb2eff7558ce8c9a8e37ea2be34
                      - name: RELATED_IMAGE_RBLN_NPU_FEATURE_DISCOVERY
                        value: docker.io/rebellions/rbln-npu-feature-discovery@sha256:f9a31fa0bde0072230565bf7fc0e27bdb1904321db2395dc366f5954f156c0e1
                      - name: RELATED_IMAGE_VFIO_MANAGER
                        value: docker.io/rebellions/rbln-vfio-manager@sha256:308baaa997eda83db530c1631e2ce097df79d2efda818ee85b330a0934113048
                    image: docker.io/rebellions/rbln-npu-operator@sha256:d70b70e804c63f5008520edeb786324e8ecd361e7fc121d0c11f9158602d55c8
                    imagePullPolicy: Always
                    livenessProbe:
                      httpGet:
                        path: /healthz
                        port: 8081
                      initialDelaySeconds: 15
                      periodSeconds: 20
                    name: manager
                    readinessProbe:
                      httpGet:
                        path: /readyz
                        port: 8081
                      initialDelaySeconds: 5
                      periodSeconds: 10
                    resources:
                      limits:
                        cpu: "1"
                        memory: 512Mi
                      requests:
                        cpu: 500m
                        memory: 128Mi
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop:
                          - ALL
                securityContext:
                  runAsNonRoot: true
                serviceAccountName: controller-manager
                terminationGracePeriodSeconds: 10
      permissions:
        - rules:
            - apiGroups:
                - ""
              resources:
                - configmaps
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - coordination.k8s.io
              resources:
                - leases
              verbs:
                - get
                - list
                - watch
                - create
                - update
                - patch
                - delete
            - apiGroups:
                - ""
              resources:
                - events
              verbs:
                - create
                - patch
          serviceAccountName: controller-manager

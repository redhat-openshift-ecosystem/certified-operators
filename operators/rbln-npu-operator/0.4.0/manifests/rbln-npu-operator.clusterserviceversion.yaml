apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "rebellions.ai/v1alpha1",
          "kind": "RBLNDriver",
          "metadata": {
            "labels": {
              "app.kubernetes.io/name": "rbln-npu-operator"
            },
            "name": "rbln-driver"
          },
          "spec": {
            "image": "rebellions/rbln-driver",
            "imagePullPolicy": "IfNotPresent",
            "imagePullSecrets": [
              "drivercred"
            ],
            "manager": {
              "image": "rebellions/rbln-k8s-driver-manager",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "v0.1.3"
            },
            "priorityClassName": "system-node-critical",
            "registry": "repo.rebellions.ai",
            "resources": {
              "limits": {
                "cpu": "500m",
                "memory": "128Mi"
              },
              "requests": {
                "cpu": "250m",
                "memory": "64Mi"
              }
            },
            "version": "3.0.0"
          }
        },
        {
          "apiVersion": "rebellions.ai/v1beta1",
          "kind": "RBLNClusterPolicy",
          "metadata": {
            "labels": {
              "app.kubernetes.io/name": "rbln-npu-operator"
            },
            "name": "rbln-cluster-policy"
          },
          "spec": {
            "containerToolkit": {
              "enabled": true,
              "image": "rebellions/rbln-container-toolkit",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "v0.1.1"
            },
            "devicePlugin": {
              "enabled": true,
              "image": "rebellions/k8s-device-plugin",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "v0.4.0"
            },
            "draKubeletPlugin": {
              "driverName": "npu.rebellions.ai",
              "enabled": false,
              "healthcheckPort": 51515,
              "image": "rebellions/k8s-dra-driver-npu",
              "imagePullPolicy": "IfNotPresent",
              "kubeletPluginsDirectoryPath": "/var/lib/kubelet/plugins",
              "kubeletRegistrarDirectoryPath": "/var/lib/kubelet/plugins_registry",
              "registry": "docker.io",
              "version": "v0.1.2"
            },
            "driver": {
              "upgradePolicy": {
                "autoUpgrade": false,
                "drain": {
                  "deleteEmptyDirData": false,
                  "enable": false,
                  "force": false,
                  "timeoutSeconds": 300
                },
                "maxParallelUpgrades": 1,
                "podDeletion": {
                  "force": false,
                  "timeoutSeconds": 300
                },
                "reboot": {
                  "enable": false,
                  "image": {
                    "image": "rebellions/rbln-node-reboot",
                    "registry": "docker.io",
                    "version": "latest"
                  },
                  "rebootTimeoutSeconds": 0
                },
                "waitForCompletion": {
                  "timeoutSeconds": 0
                }
              }
            },
            "metricsExporter": {
              "enabled": true,
              "image": "rebellions/rbln-metrics-exporter",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "v0.2.4"
            },
            "npuFeatureDiscovery": {
              "enabled": true,
              "image": "rebellions/rbln-npu-feature-discovery",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "v0.2.1"
            },
            "rblnDaemon": {
              "enabled": false,
              "hostPort": 50051,
              "image": "rebellions/rbln-daemon",
              "imagePullPolicy": "IfNotPresent",
              "imagePullSecrets": [
                "drivercred"
              ],
              "registry": "repo.rebellions.ai",
              "version": "3.0.0"
            },
            "sandboxDevicePlugin": {
              "enabled": false,
              "image": "rebellions/k8s-device-plugin",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "resourceList": [
                {
                  "productCardNames": [
                    "RBLN-CA12"
                  ],
                  "resourceName": "ATOM_PT",
                  "resourcePrefix": "rebellions.ai"
                },
                {
                  "productCardNames": [
                    "RBLN-CA25"
                  ],
                  "resourceName": "ATOM_MAX_PT",
                  "resourcePrefix": "rebellions.ai"
                },
                {
                  "productCardNames": [
                    "RBLN-CR03"
                  ],
                  "resourceName": "REBEL_PT",
                  "resourcePrefix": "rebellions.ai"
                }
              ],
              "version": "v0.3.7"
            },
            "validator": {
              "image": "rebellions/rbln-npu-operator-validator",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "latest"
            },
            "vfioManager": {
              "enabled": false,
              "image": "rebellions/rbln-vfio-manager",
              "imagePullPolicy": "IfNotPresent",
              "registry": "docker.io",
              "version": "latest"
            },
            "workloadType": "container"
          }
        }
      ]
    capabilities: Basic Install
    containerImage: docker.io/rebellions/rbln-npu-operator@sha256:d70b70e804c63f5008520edeb786324e8ecd361e7fc121d0c11f9158602d55c8

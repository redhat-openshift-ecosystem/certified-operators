---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redisenterpriseclusterrolebindings.app.redislabs.com
spec:
  group: app.redislabs.com
  names:
    kind: RedisEnterpriseClusterRoleBinding
    listKind: RedisEnterpriseClusterRoleBindingList
    plural: redisenterpriseclusterrolebindings
    singular: redisenterpriseclusterrolebinding
    shortNames:
    - recrolebinding
  scope: Namespaced
  versions:
  - name: v1alpha1
    additionalPrinterColumns:
    - jsonPath: .spec.roleRef.name
      name: Role
      type: string
    - jsonPath: .spec.subjects[*].name
      name: Subjects
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    schema:
      openAPIV3Schema:
        description: RedisEnterpriseClusterRoleBinding binds users to a RedisEnterpriseClusterRole.
          It grants the users the cluster access defined by that role.
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: RedisEnterpriseRoleBindingSpec defines the desired state
              of a RedisEnterpriseClusterRoleBinding or RedisEnterpriseRoleBinding.
            properties:
              roleRef:
                description: RoleRef holds a reference to the role object being bound.
                  For RedisEnterpriseClusterRoleBinding, this references a RedisEnterpriseClusterRole
                  in the same namespace (kind RedisEnterpriseClusterRole or empty) or an
                  internal Redis Enterprise role by name (kind 'role'). For RedisEnterpriseRoleBinding,
                  this references a RedisEnterpriseRole in the same namespace (kind RedisEnterpriseRole
                  or empty) or an internal Redis Enterprise role by name (kind 'role').
                properties:
                  kind:
                    description: Kind of the referent.
                    type: string
                    enum:
                    - ""
                    - RedisEnterpriseClusterRole
                    - role
                  name:
                    description: Name of the referent.
                    type: string
                    minLength: 1
                    maxLength: 253
                required:
                - name
                type: object
              subjects:
                description: Subjects holds references to the objects the role applies
                  to. Each subject is a reference to a RedisEnterpriseUser object
                  within the same namespace. The 'kind' field can be left empty,
                  or set to RedisEnterpriseUser. A maximum of 100 subjects may be
                  specified; to bind more, create additional bindings referencing
                  the same role.
                maxItems: 100
                items:
                  description: A reference to another object.
                  properties:
                    kind:
                      description: Kind of the referent.
                      type: string
                      enum:
                      - ""
                      - RedisEnterpriseUser
                      maxLength: 32
                    name:
                      description: Name of the referent.
                      type: string
                      minLength: 1
                      maxLength: 253
                  required:
                  - name
                  type: object
                type: array
                x-kubernetes-validations:
                - rule: |
                    self.all(s1, self.exists_one(s2,
                      (has(s1.kind) && s1.kind != '' ? s1.kind : 'RedisEnterpriseUser') ==
                      (has(s2.kind) && s2.kind != '' ? s2.kind : 'RedisEnterpriseUser') &&
                      s1.name == s2.name))
                  message: subjects must be unique by kind and name
            required:
            - roleRef
            type: object
          status:
            description: RedisEnterpriseRoleBindingStatus defines the observed state
              of a RedisEnterpriseClusterRoleBinding or RedisEnterpriseRoleBinding.
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: redisenterpriseroles.app.redislabs.com
spec:
  group: app.redislabs.com
  names:
    kind: RedisEnterpriseRole
    listKind: RedisEnterpriseRoleList
    plural: redisenterpriseroles
    singular: redisenterpriserole
    shortNames:
    - rerole
  scope: Namespaced
  versions:
  - name: v1alpha1
    additionalPrinterColumns:
    - jsonPath: .spec.managementRole
      name: Management Role
      type: string
    - jsonPath: .spec.acl.name
      name: ACL
      type: string
    - jsonPath: .spec.scopes[*].name
      name: Scopes
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    schema:
      openAPIV3Schema:
        description: RedisEnterpriseRole is a scoped role definition. It grants
          users access to selected databases within a Redis Enterprise Cluster.
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: RedisEnterpriseRoleSpec defines the desired state
              of a RedisEnterpriseRole.
            properties:
              managementRole:
                description: ManagementRole is the named set of Redis Enterprise
                  management permissions assigned to this scoped role. RedisEnterpriseRole
                  supports only database-scoped management roles. If omitted, the
                  role uses the None management role.
                enum:
                - DBMember
                - DBViewer
                - None
                type: string
              scopes:
                description: |-
                  Scopes define the databases to which this role applies.
                  Each scope references a RedisEnterpriseDatabase by name or selector (kind
                  RedisEnterpriseDatabase or empty), or an internal Redis Enterprise database
                  by name (kind 'bdb', name only).
                  For 'bdb' scopes the role grants management access only; its ACL is not bound
                  to that database's permissions.
                minItems: 1
                items:
                  description: A reference to another object(s), either directly
                    by name, or via a label selector.
                  properties:
                    kind:
                      description: Kind of the referent.
                      type: string
                      enum:
                      - ""
                      - RedisEnterpriseDatabase
                      - bdb
                    name:
                      description: Name of the referent.
                      type: string
                      minLength: 1
                      maxLength: 253
                    selector:
                      description: Selector based on label attached to the object.
                      minProperties: 1
                      properties:
                        matchExpressions:
                          description: matchExpressions is a list of label selector
                            requirements. The requirements are ANDed.
                          items:
                            description: A label selector requirement is a selector
                              that contains values, a key, and an operator that relates
                              the key and values.
                            properties:
                              key:
                                description: key is the label key that the selector
                                  applies to.
                                type: string
                              operator:
                                description: operator represents a key's relationship
                                  to a set of values. Valid operators are In, NotIn,
                                  Exists and DoesNotExist.
                                type: string
                              values:
                                description: values is an array of string values.
                                  If the operator is In or NotIn, the values array
                                  must be non-empty. If the operator is Exists or
                                  DoesNotExist, the values array must be empty. This
                                  array is replaced during a strategic merge patch.
                                items:
                                  type: string
                                type: array
                            required:
                            - key
                            - operator
                            type: object
                          type: array
                        matchLabels:
                          additionalProperties:
                            type: string
                          description: matchLabels is a map of {key,value} pairs.
                            A single {key,value} in the matchLabels map is equivalent
                            to an element of matchExpressions, whose key field is
                            "key", the operator is "In", and the values array contains
                            only "value". The requirements are ANDed.
                          type: object
                      type: object
                  type: object
                  oneOf:
                  - required:
                    - name
                  - required:
                    - selector
                  x-kubernetes-validations:
                  - rule: '!(has(self.kind) && self.kind == ''bdb'') || has(self.name)'
                    message: scopes with kind 'bdb' must reference a database by name
                type: array
              acl:
                description: |-
                  ACL defines the data access permissions granted by this scoped role.
                  References a RedisEnterpriseACL (kind RedisEnterpriseACL or empty) or an
                  internal Redis Enterprise ACL by name (kind 'redis_acl').
                properties:
                  kind:
                    description: Kind of the referent.
                    type: string
                    enum:
                    - ""
                    - RedisEnterpriseACL
                    - redis_acl
                  name:
                    description: Name of the referent.
                    type: string
                    minLength: 1
                    maxLength: 253
                required:
                - name
                type: object
            required:
            - scopes
            type: object
          status:
            description: RedisEnterpriseRoleStatus defines the observed state of
              a Redis Enterprise role object. This status type is used by both RedisEnterpriseClusterRole
              and RedisEnterpriseRole which share the same status structure.
            properties:
              uid:
                description: The internal UID of the Role object defined in the Redis
                  Enterprise Cluster.
                type: string
              observedGeneration:
                description: The most recent generation of this resource that was
                  observed and acted upon by the controller.
                format: int64
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}

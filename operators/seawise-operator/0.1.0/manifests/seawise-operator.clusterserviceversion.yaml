  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - kind: Seawise
      name: seawises.backup.seawise.cloud
      version: v1alpha1
  description: |
    # Seawise Backup Dashboard

    Seawise Backup Dashboard provides a modern web interface for managing
    **Velero/OADP** backups and restores on OpenShift, Rancher, and Kubernetes
    clusters.

    ## Features

    - Complete backup & restore management
    - Scheduled backups with cron policies
    - Automatic volume backup with pod annotation
    - Multi-cloud support (AWS, Azure, GCP)
    - Data Protection Application (DPA) management for OpenShift OADP
    - Role-based authentication and user management
    - PDF report generation

    ## Installation

    Once installed, create a `Seawise` custom resource to deploy the dashboard.
    See the provided sample for configuration options.

apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "BackupRestore",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "backuprestore-sample"
          },
          "spec": {
            "backupRef": {
              "name": "storagebackup-sample"
            },
            "clusterName": "sample-cluster",
            "pvcTemplate": {
              "metadata": {
                "name": "backuprestore-sample-pvc"
              },
              "spec": {
                "accessModes": [
                  "ReadWriteOnce"
                ],
                "resources": {
                  "requests": {
                    "storage": "10Gi"
                  }
                }
              }
            }
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "Pool",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "pool-sample"
          },
          "spec": {
            "clusterName": "sample-cluster"
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "SnapshotReplication",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "snapshotreplication-sample"
          },
          "spec": {
            "sourceCluster": "source-cluster",
            "targetCluster": "target-cluster",
            "targetPool": "target-pool"
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "StorageBackup",
          "metadata": {
            "name": "storagebackup-sample"
          },
          "spec": {
            "clusterName": "my-cluster",
            "pvcRef": {
              "name": "my-pvc"
            }
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "StorageCluster",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "sample-cluster"
          },
          "spec": {
            "backup": {
              "credentialsSecretRef": {
                "name": "sample-cluster-backup"
              },
              "localEndpoint": "http://10.10.11.10:9000",
              "localTesting": true,
              "secondaryTarget": 0,
              "snapshotBackups": true,
              "withCompression": false
            }
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "StorageNode",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "storagenode-sample"
          },
          "spec": {
            "clusterImage": "simplyblock/snode:latest",
            "clusterName": "sample-cluster",
            "maxLogicalVolumeCount": 256,
            "workerNodes": [
              "worker-node-1"
            ]
          }
        },
        {
          "apiVersion": "storage.simplyblock.io/v1alpha1",
          "kind": "Task",
          "metadata": {
            "labels": {
              "app.kubernetes.io/managed-by": "kustomize",
              "app.kubernetes.io/name": "simplyblock-operator"
            },
            "name": "task-sample"
          },
          "spec": {
            "clusterName": "sample-cluster"
          }
        }
      ]
    capabilities: Basic Install
    categories: Storage
    com.redhat.openshift.versions: v4.19
    containerImage: quay.io/simplyblock-io/simplyblock-operator@sha256:6913e9b7f72d0280108596be43cb2326c1a66b9cf6884d319c38e290df9ba2e8
    createdAt: "2026-05-28T20:21:15Z"
    description: The Simplyblock Operator helps with installation, operation, and management
    features.operators.openshift.io/cnf: "false"
    features.operators.openshift.io/cni: "false"
    features.operators.openshift.io/csi: "true"
    features.operators.openshift.io/disconnected: "false"
    features.operators.openshift.io/fips-compliant: "false"
    features.operators.openshift.io/proxy-aware: "false"
    features.operators.openshift.io/tls-profiles: "false"
    features.operators.openshift.io/token-auth-aws: "false"
    features.operators.openshift.io/token-auth-azure: "false"
    features.operators.openshift.io/token-auth-gcp: "false"
    operators.operatorframework.io/builder: operator-sdk-v1.42.2
    operators.operatorframework.io/project_layout: go.kubebuilder.io/v4
  name: simplyblock-operator.v26.2.5
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
      - kind: BackupPolicy
        name: backuppolicies.storage.simplyblock.io
        version: v1alpha1
      - description: BackupRestore is the Schema for the backuprestores API.
        displayName: Backup Restore
        kind: BackupRestore
        name: backuprestores.storage.simplyblock.io
        resources:
          - kind: PersistentVolumeClaim
            name: restored-claim
            version: v1
          - kind: PersistentVolume
            name: restored-volume
            version: v1
        specDescriptors:
          - description: BackupRef references the StorageBackup resource to restore from.
            displayName: Backup Ref
            path: backupRef
          - description: Name is the StorageBackup resource name.
            displayName: Backup Name
            path: backupRef.name
          - description: ClusterName is the target storage cluster name.
            displayName: Cluster Name
            path: clusterName
          - description: PVCTemplate describes the PVC to create once the restore completes.
            displayName: PVC Template
            path: pvcTemplate
          - description: |-
              TargetNode is the UUID of the storage node to restore onto.
              Defaults to the node that originally held the backup.
            displayName: Target Node
            path: targetNode
          - description: |-
              TargetPool overrides the pool to restore into.
              Defaults to the source backup's pool.
            displayName: Target Pool
            path: targetPool
        statusDescriptors:
          - description: Message contains the latest reconciliation detail or error.
            displayName: Message
            path: message
          - description: Phase is the high-level lifecycle shown in kubectl output.
            displayName: Phase
            path: phase
          - description: PVName is the name of the PersistentVolume created by the controller.
            displayName: Persistent Volume
            path: pvName
          - description: PVCName is the name of the PersistentVolumeClaim created from pvcTemplate.
            displayName: PersistentVolumeClaim
            path: pvcName
          - description: RestoredLvolID is the UUID of the newly-created logical volume.
            displayName: Restored LVOL ID
            path: restoredLvolID
        version: v1alpha1
      - description: Pool is the Schema for the pools API
        displayName: Pool
        kind: Pool
        name: pools.storage.simplyblock.io
        specDescriptors:
          - description: |-
              Action triggers an imperative pool operation.
              FIXME: Unused for now
            displayName: Action
            path: action
          - description: |-
              AllowedNodes is the list of Kubernetes worker node names allowed to access volumes
              in this pool. The operator resolves each node name to a deterministic NQN derived
              from the node's UID: nqn.2014-08.io.simplyblock:uuid:<node-uid>.
              The CSI node uses the same formula so no manual NQN management is required.
            displayName: Allowed Nodes
            path: allowedNodes
          - description: |-
              CapacityLimit is the maximum aggregate capacity that can be allocated from this pool.
              This maps to sbctl pool add --pool-max. Use sizes like 20M, 20G, or 0 for unlimited.
            displayName: Capacity Limit
            path: capacityLimit
          - description: ClusterName is the target storage cluster name.
            displayName: Cluster Name
            path: clusterName
          - description: |-
              DHCHAP enables DH-HMAC-CHAP key generation for the pool. Authentication is only
              enforced when allowedNodes is non-empty
            displayName: DHCHAP
            path: dhchap
          - description: |-
              LogicalVolumeMaxSize is the maximum size allowed for any single logical volume
              created in this pool. This maps to sbctl pool add --lvol-max. Use sizes like
              20M, 20G, or 0 for unlimited.
            displayName: Logical Volume Maximum Size
            path: logicalVolumeMaxSize
          - description: QosSpec defines QosSpec limits for the pool.
            displayName: QoS
            path: qos
          - description: |-
              Status is an optional desired-status hint for backend workflows.
              FIXME: Unused for now
            displayName: Status
            path: status
          - description: StorageClassParameters sets default StorageClass parameter values for volumes in this pool.
            displayName: Storage Class Parameters
            path: storageClassParameters
          - description: Fabric is the transport fabric (e.g. tcp).
            displayName: Fabric
            path: storageClassParameters.fabric
          - description: QosRwIops sets the read/write IOPS limit (0 = unlimited).
            displayName: Read/Write IOPS
            path: storageClassParameters.qosRwIops
          - description: Replicate enables replication for logical volumes.
            displayName: Replicate By Default
            path: storageClassParameters.replicate
        statusDescriptors:
          - description: Status is the backend lifecycle status.
            displayName: Status
            path: status
          - description: UUID is the backend pool UUID.
            displayName: Pool UUID
            path: uuid
        version: v1alpha1
      - description: SnapshotReplication is the Schema for the snapshotreplications API
        displayName: Snapshot Replication
        kind: SnapshotReplication
        name: snapshotreplications.storage.simplyblock.io
        specDescriptors:
          - displayName: Action
            path: action
          - description: 'Optional: volumes to exclude from failback.'
            displayName: Exclude Volume IDs
            path: excludeVolumeIDs
          - description: |-
              Optional: only these volumes are included in failback.
              If empty, all volumes are candidates unless excluded below.
            displayName: Include Volume IDs
            path: includeVolumeIDs
          - description: 'snapshot replication interval in seconds (default: 300sec)'
            displayName: Interval
            path: interval
          - description: Source cluster for the snapshots
            displayName: Source Cluster
            path: sourceCluster
          - description: required for failback to a fresh source cluster
            displayName: Source Pool
            path: sourcePool
          - description: Target cluster for replication
            displayName: Target Cluster
            path: targetCluster
          - description: Target cluster pool for replication
            displayName: Target Pool
            path: targetPool
          - description: snapshot replication timeout
            displayName: Timeout
            path: timeout
          - description: 'Optional: list of volumes to replicate. Empty means all volumes'
            displayName: Volume IDs
            path: volumeIDs
        statusDescriptors:
          - description: Conditions provides human-readable status conditions for kubectl get output.
            displayName: Conditions
            path: conditions
          - displayName: Configured
            path: configured
          - description: Per-volume replication status
            displayName: Volumes
            path: volumes
        version: v1alpha1
      - description: StorageBackup is the Schema for the storagebackups API.
        displayName: Storage Backup
        kind: StorageBackup
        name: storagebackups.storage.simplyblock.io
        resources:
          - kind: PersistentVolumeClaim
            name: source-claim
            version: v1
          - kind: PersistentVolume
            name: source-volume
            version: v1
        specDescriptors:
          - description: ClusterName is the target storage cluster name.
            displayName: Cluster Name
            path: clusterName
          - description: |-
              PVCRef identifies the PVC whose backing Simplyblock volume should be snapshotted and backed up.
              Not required when SourceClusterUUID is set (imported backup).
            displayName: PVC Ref
            path: pvcRef
          - description: Name is the PVC name.
            displayName: PVC Name
            path: pvcRef.name
          - description: Namespace overrides the backup resource namespace for the PVC lookup.
            displayName: PVC Namespace
            path: pvcRef.namespace
          - description: SnapshotName optionally overrides the internally-created snapshot name.
            displayName: Snapshot Name
            path: snapshotName
          - description: |-
              SourceClusterUUID, when non-empty, marks this StorageBackup as imported from another cluster.
              The StorageBackup controller will not create snapshots or backups for imported resources.
              Set by the BackupImport controller; do not set manually.
            displayName: Source Cluster UUID
            path: sourceClusterUUID
        statusDescriptors:
          - description: BackupID is the backend backup UUID.
            displayName: Backup ID
            path: backupID
          - description: Message contains the latest reconciliation detail or error.
            displayName: Message
            path: message
          - description: Phase is the high-level backup lifecycle shown in kubectl output.
            displayName: Phase
            path: phase
          - description: SnapshotName is the snapshot name used for the backup request.
            displayName: Snapshot Name
            path: snapshotName
        version: v1alpha1
      - description: StorageCluster is the Schema for the storageclusters API
        displayName: Storage Cluster
        kind: StorageCluster
        name: storageclusters.storage.simplyblock.io
        resources:
          - kind: Secret
            name: simplyblock-cluster-credentials
            version: v1
        specDescriptors:
          - description: Action triggers a cluster-level action.
            displayName: Action
            path: action
          - description: Backup specifies the specification for backup to S3 configuration
            displayName: Backup
            path: backup
          - description: Name is the name of the Secret in the same namespace as the cluster CR.
            displayName: Backup Credentials Secret
            path: backup.credentialsSecretRef.name
          - description: BlockSize defines the logical block size in bytes.
            displayName: Block Size
            path: blockSize
          - description: ClientDataIfname defines the client data network interface.
            displayName: Client Data Interface
            path: clientDataIfname
          - description: ClientQpairCount defines client-side queue-pair count.
            displayName: Client Queue Pair Count
            path: clientQpairCount
          - description: CriticalThresholdSpec defines critical-level capacity thresholds.
            displayName: Critical Threshold
            path: criticalThreshold
          - description: EnableNodeAffinity enables node-affinity placement for storage components.
            displayName: Enable Node Affinity
            path: enableNodeAffinity
          - description: FabricType defines the storage fabric type.
            displayName: Fabric Type
            path: fabricType
          - description: HAType defines the backend high-availability mode.
            displayName: HA Type
            path: haType
          - description: HashicorpVaultSettings configures the Vault endpoint used by the cluster for key storage.
            displayName: HashiCorp Vault Settings
            path: hashicorpVaultSettings
          - description: BaseURL is the HashiCorp Vault endpoint (e.g. https://vault.example.com:8200).
            displayName: Vault Base URL
            path: hashicorpVaultSettings.baseURL
          - description: InflightIOThreshold defines the inflight I/O threshold.
            displayName: Inflight IO Threshold
            path: inflightIOThreshold
          - description: IsSingleNode enables single-node cluster mode.
            displayName: Single Node
            path: isSingleNode
          - description: MaxFaultTolerance defines the maximum tolerated concurrent faults.
            displayName: Max Fault Tolerance
            path: maxFaultTolerance
          - description: MaxQueueSize defines the maximum backend queue size.
            displayName: Max Queue Size
            path: maxQueueSize
          - description: NodeRecycle configures the node-recycle action.
            displayName: Node Recycle
            path: nodeRecycle
          - description: NvmfBasePort defines the base NVMf service port.
            displayName: NVMf Base Port
            path: nvmfBasePort
          - description: PageSizeInBlocks defines page size expressed in blocks.
            displayName: Page Size In Blocks
            path: pageSizeInBlocks
          - description: QpairCount defines the NVMe queue-pair count used by the cluster.
            displayName: Queue Pair Count
            path: qpairCount
          - description: RpcBasePort defines the base RPC service port.
            displayName: RPC Base Port
            path: rpcBasePort
          - description: SnodeApiPort defines the storage-node API port.
            displayName: Storage Node API Port
            path: snodeApiPort
          - description: StrictNodeAntiAffinity enforces strict anti-affinity between storage nodes.
            displayName: Strict Node Anti-Affinity
            path: strictNodeAntiAffinity
          - description: StripeSpec configures erasure-coding data/parity chunk counts.
            displayName: Stripe
            path: stripe
          - description: DataChunks defines the number of data chunks in the erasure-coding layout.
            displayName: Data Chunks
            path: stripe.dataChunks
          - description: WarningThresholdSpec defines warning-level capacity thresholds.
            displayName: Warning Threshold
            path: warningThreshold
        statusDescriptors:
          - description: Message is a human-readable action result or error.
            displayName: Action Message
            path: actionStatus.message
          - displayName: Action State
            path: actionStatus.state
          - description: Configured indicates whether initial cluster setup completed.
            displayName: Configured
            path: configured
          - description: SecretName is the Kubernetes Secret containing cluster credentials.
            displayName: Cluster Secret
            path: secretName
          - description: Status is the backend-reported lifecycle status.
            displayName: Status
            path: status
          - description: UUID is the backend cluster UUID.
            displayName: Cluster UUID
            path: uuid
        version: v1alpha1
      - description: StorageNode is the Schema for the storagenodes API
        displayName: Storage Node
        kind: StorageNode
        name: storagenodes.storage.simplyblock.io
        resources:
          - kind: ClusterRole
            name: simplyblock-storage-node
            version: v1
          - kind: ClusterRoleBinding
            name: simplyblock-storage-node
            version: v1
          - kind: DaemonSet
            name: simplyblock-storage-node
            version: v1
          - kind: Service
            name: simplyblock-storage-node
            version: v1
          - kind: ServiceAccount
            name: simplyblock-storage-node
            version: v1
        specDescriptors:
          - description: Action triggers an imperative node operation.
            displayName: Action
            path: action
          - description: ClusterImage is the container image used for storage-node workloads.
            displayName: Cluster Image
            path: clusterImage
          - description: ClusterName is the target storage cluster name.
            displayName: Cluster Name
            path: clusterName
          - description: CorePercentage is the percentage of cores to be used for spdk (0-99).
            displayName: Core Percentage
            path: corePercentage
          - description: DataIfname lists data-plane network interfaces.
            displayName: Data Interfaces
            path: dataIfname
          - description: DeviceNames explicitly defines a comma separated list of nvme namespace names like nvme0n1,nvme1n1...
            displayName: Device Names
            path: deviceNames
          - description: DriveSizeRange filters devices by size range.
            displayName: Drive Size Range
            path: driveSizeRange
          - description: EnableCpuTopology enables topology-aware CPU handling.
            displayName: Enable CPU Topology
            path: enableCpuTopology
          - description: Force enables forced action execution where supported.
            displayName: Force
            path: force
          - description: ForceFormat4K forces 4K blocksize formatting of the NVMe device where supported.
            displayName: Force Format 4K
            path: forceFormat4K
          - description: JournalManagerSpec configures journal manager behavior.
            displayName: Journal Manager
            path: journalManager
          - description: MaxLogicalVolumeCount is the maximum number of logical volumes per node.
            displayName: Max Logical Volume Count
            path: maxLogicalVolumeCount
          - description: MaxSize is the maximum allocatable size of huge pages.
            displayName: Max Size
            path: maxSize
          - description: MgmtIfname is the management interface name used by storage nodes.
            displayName: Management Interface
            path: mgmtIfname
          - description: NodeUUID is required when action is specified
            displayName: Node UUID
            path: nodeUUID
          - description: NodesPerSocket defines how many storage nodes are created per NUMA socket.
            displayName: Nodes Per Socket
            path: nodesPerSocket
          - description: OpenShiftCluster indicates OpenShift-specific behavior should be enabled.
            displayName: OpenShift Cluster
            path: openShiftCluster
          - description: Partitions is the number of partitions created per backend storage device.
            displayName: Partitions
            path: partitions
          - description: PcieAllowList is the list of PCI addresses allowed for use.
            displayName: PCIe Allow List
            path: pcieAllowList
          - description: PcieDenyList is the list of PCI addresses excluded from use.
            displayName: PCIe Deny List
            path: pcieDenyList
          - description: PcieModel filters devices by PCI model.
            displayName: PCIe Model
            path: pcieModel
          - description: ReattachVolume reattaches volumes during restart where supported by the backend.
            displayName: Reattach Volume
            path: reattachVolume
          - description: ReservedSystemCPU defines CPUs reserved for system workloads.
            displayName: Reserved System CPU
            path: reservedSystemCPU
          - description: SkipKubeletConfiguration skips kubelet configuration changes.
            displayName: Skip Kubelet Configuration
            path: skipKubeletConfiguration
          - description: SocketsToUse restricts deployment to selected NUMA sockets.
            displayName: Sockets To Use
            path: socketsToUse
          - description: SpdkImage is the SPDK image reference used by node services.
            displayName: SPDK Image
            path: spdkImage
          - description: SpdkProxyImage is the SPDK proxy image reference used by node services.
            displayName: SPDK Proxy Image
            path: spdkProxyImage
          - description: Tolerations configures pod tolerations for storage-node pods.
            displayName: Tolerations
            path: tolerations
          - description: UbuntuHost indicates the node host OS is Ubuntu.
            displayName: Ubuntu Host
            path: ubuntuHost
          - description: WorkerNode is a single worker node used by action flows.
            displayName: Worker Node
            path: workerNode
          - description: WorkerNodes is the set of Kubernetes worker nodes to manage.
            displayName: Worker Nodes
            path: workerNodes
        statusDescriptors:
          - description: Message is a human-readable action result or error.
            displayName: Action Message
            path: actionStatus.message
          - displayName: Action State
            path: actionStatus.state
          - description: DrainCoordination tracks the upgrade-drain state per worker node.
            displayName: Drain Coordination
            path: drainCoordination
          - description: Nodes is the observed state of each managed storage node.
            displayName: Nodes
            path: nodes
        version: v1alpha1
      - description: Task is the Schema for the tasks API
        displayName: Task
        kind: Task
        name: tasks.storage.simplyblock.io
        specDescriptors:
          - description: ClusterName is the target storage cluster name.
            displayName: Cluster Name
            path: clusterName
          - description: |-
              Subtasks includes related child subtasks when supported by the backend.
              FIXME: Unused for now
            displayName: Subtasks
            path: subtasks
          - description: TaskID filters results to a specific backend task when set.
            displayName: Task ID
            path: taskID
        statusDescriptors:
          - description: Tasks is the currently reported task list for the query scope.
            displayName: Tasks
            path: tasks
        version: v1alpha1
  description: The Simplyblock Operator helps with installation, operation, and management of Simplyblock Control Planes, Storage Planes, and the CSI Driver.

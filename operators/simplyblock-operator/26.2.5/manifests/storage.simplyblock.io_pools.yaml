    schema:
      openAPIV3Schema:
        description: Pool is the Schema for the pools API
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: spec defines the desired state of Pool
            properties:
              action:
                description: |-
                  Action triggers an imperative pool operation.
                  FIXME: Unused for now
                type: string
              allowedNodes:
                description: |-
                  AllowedNodes is the list of Kubernetes worker node names allowed to access volumes
                  in this pool. The operator resolves each node name to a deterministic NQN derived
                  from the node's UID: nqn.2014-08.io.simplyblock:uuid:<node-uid>.
                  The CSI node uses the same formula so no manual NQN management is required.
                items:
                  type: string
                type: array
              capacityLimit:
                description: |-
                  CapacityLimit is the maximum aggregate capacity that can be allocated from this pool.
                  This maps to sbctl pool add --pool-max. Use sizes like 20M, 20G, or 0 for unlimited.
                type: string
              clusterName:
                description: ClusterName is the target storage cluster name.
                type: string
              dhchap:
                default: false
                description: |-
                  DHCHAP enables DH-HMAC-CHAP key generation for the pool. Authentication is only
                  enforced when allowedNodes is non-empty
                type: boolean
              logicalVolumeMaxSize:
                description: |-
                  LogicalVolumeMaxSize is the maximum size allowed for any single logical volume
                  created in this pool. This maps to sbctl pool add --lvol-max. Use sizes like
                  20M, 20G, or 0 for unlimited.
                type: string
              qos:
                description: QosSpec defines QosSpec limits for the pool.
                properties:
                  iops:
                    description: IOPS is the IOPS limit for the pool.
                    format: int32
                    type: integer
                  throughput:
                    description: Throughput contains throughput limits for the pool.
                    properties:
                      read:
                        description: Read is the read throughput limit for the pool.
                        format: int32
                        type: integer
                      readWrite:
                        description: ReadWrite is the combined read/write throughput
                          limit for the pool.
                        format: int32
                        type: integer
                      write:
                        description: Write is the write throughput limit for the pool.
                        format: int32
                        type: integer
                    type: object
                type: object
              status:
                description: |-
                  Status is an optional desired-status hint for backend workflows.

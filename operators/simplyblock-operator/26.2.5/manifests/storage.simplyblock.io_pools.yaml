                  host:
                    description: Host is the backend host handling pool QosSpec enforcement.
                    type: string
                  iops:
                    description: IOPS is the observed/configured IOPS value.
                    format: int32
                    type: integer
                  throughput:
                    description: Throughput contains observed/configured throughput

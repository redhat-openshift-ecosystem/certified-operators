                  numParityChunks:
                    default: "1"
                    description: NumParityChunks is the number of parity chunks (distr_npcs).
                    type: string
                  qosRMbytes:
                    default: "0"
                    description: QosRMbytes sets the read throughput limit in MB/s
                      (0 = unlimited).
                    type: string
                  qosRwIops:
                    default: "0"
                    description: QosRwIops sets the read/write IOPS limit (0 = unlimited).
                    type: string
                  qosRwMbytes:
                    default: "0"
                    description: QosRwMbytes sets the read/write throughput limit
                      in MB/s (0 = unlimited).
                    type: string
                  qosWMbytes:
                    default: "0"
                    description: QosWMbytes sets the write throughput limit in MB/s
                      (0 = unlimited).
                    type: string
                  replicate:
                    default: false
                    description: Replicate enables replication for logical volumes.
                    type: boolean
                  tune2fsReservedBlocks:
                    default: "0"
                    description: Tune2fsReservedBlocks sets the ext4 reserved-blocks

                    # Full preStop hook configuration
                    type: object
                    properties:
                      command:
                        # Full shell command to run in preStop (multi-line allowed)
                        type: string
                  enabled:
                    # Enable db component
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                  annotations:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  tolerations:
                    *componentTolerations
                  persistentVolumeClaim: *persistentVolumeClaim
                  env:
                    type: array

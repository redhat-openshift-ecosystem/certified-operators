                    type: object
                  metrics:
                    properties:
                      enabled:
                        type: boolean
                      port:
                        type: integer
                      serviceMonitor:
                        properties:
                          enabled:
                            type: boolean
                        type: object
                    type: object
                  logLevel:
                    type: string
                  replicasCount:
                    type: integer
                  shardsCount:
                    type: integer
                  ipV6:
                    properties:
                      enabled:
                        type: boolean
                    type: object
                  annotations:
                    type: object
                  affinity:
                    *componentAffinity
                  enabled:
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                  tolerations:
                    *componentTolerations
                  env:
                    type: array
                    items:
                      type: object
                  image:
                    *imageProperties
                  persistence: *persistence
                  resources:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  serviceAccount:
                    properties:
                      name:
                        type: string
                      create:
                        type: boolean
                      annotations:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                type: object
              # Configure platform
              consul:
                properties:
                  kvMaxValueSize:
                    description: Maximum size in bytes for values in Consul KV store
                    type: integer
                  persistence: *persistence
                  annotations:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  serviceMesh:
                    *serviceMesh
                  tolerations:
                    *componentTolerations
                  persistentVolumeClaim: *persistentVolumeClaim
                  env:
                    type: array
                    items:
                      type: object
                    x-kubernetes-preserve-unknown-fields: true
                  image:
                    *imageProperties
                  volumes:
                    *volumeForNfs
                  resources:
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  serviceAccountName:

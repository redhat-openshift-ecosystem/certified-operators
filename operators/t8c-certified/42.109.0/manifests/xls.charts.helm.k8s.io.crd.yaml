---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: xls.charts.helm.k8s.io
  annotations:
    "api-approved.kubernetes.io": "https://github.com/operator-framework/operator-sdk/pull/2703"
spec:
  group: charts.helm.k8s.io
  names:
    kind: Xl
    listKind: XlList
    plural: xls
    singular: xl
  scope: Namespaced
  versions:
  # Each version can be enabled/disabled by Served flag.
  # One and only one version must be marked as the storage version.
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        properties:
          apiVersion:
            # APIVersion defines the versioned schema of this representation
            # of an object. Servers should convert recognized schemas to the latest
            # internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/api-conventions.md#resources'
            type: string
          kind:
            # Kind is a string value representing the REST resource this
            # object represents. Servers may infer this from the endpoint the client
            # submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            type: object
            x-kubernetes-preserve-unknown-fields: true
          status:
            # defines the observed state of Xl
            type: object
            x-kubernetes-preserve-unknown-fields: true
        type: object
    served: true
    storage: false
    subresources:
      status: {}
  - name: v1
    schema:
      openAPIV3Schema:
        # Schema for the xls API
        properties:
          apiVersion:
            type: string
          kind:
            type: string
          metadata:
            type: object
          spec:
            # defines the desired state of Xl
            properties:
              storage:
                type: object
                properties:
                  type:
                    type: string
              nfs:
                type: object
                properties:
                  server:
                    type: string
                  rootPath:
                    type: string
              # Dummy object that will not be included in the installed research,
              # due to its name ("x-" prefix marks this as an something to be processed by a YAML
              # extension). We won't do that, but we can use this object as a container for
              # reusable templates (YAML anchors) to be used later in the file.
              x-templates:
                type: object
                # internal use only
                properties:
                  dbSecretName: &dbComponentProperties
                    # secret containing DB credentials
                    type: string
                  tolerations: &componentTolerations
                    # pod tolerations
                    items:
                      type: object
                    type: array
                    x-kubernetes-preserve-unknown-fields: true
                  affinity: &componentAffinity
                    # Global pod affinity list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  persistentVolume: &persistentVolume
                    type: object
                    # PV options
                    properties:
                      enabled:
                        type: boolean
                        # Whether to use a PVC
                  persistentVolumeClaim: &persistentVolumeClaim
                    type: object
                    # PVC options
                    properties:
                      storageClassName:
                        # StorageClassName to be used for PVCs
                        type: string
                  persistence: &persistence
                    type: object
                    properties:
                      size:
                        # persistent volume size
                        type: string
                  ephemeralVolume: &ephemeralVolume
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      requestSize:
                        type: string
                      limitSize:
                        type: string
                      storageClassName:
                        type: string
                  storageClassName: &storageClassName
                    # StorageClassName to be used for PVCs
                    type: string
                  image: &imageProperties
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                    properties:
                      repository:
                        # container registry and repository name
                        type: string
                      tag:
                        # container tag
                        type: string
                      pullPolicy:
                        # image pull policy
                        type: string
                  serviceMesh: &serviceMesh
                    # istio service mesh options
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        # whether the component should be enrolled in istio data plane
                    x-kubernetes-preserve-unknown-fields: true
                  volumeForNfs: &volumeForNfs
                    # Volume template for direct nfs storage
                    type: array
                    items:
                      type: object
                      properties:
                        name:
                          type: string
                        subdirPath:
                          type: string
              global:
                type: object
                # Platform configuration options
                x-kubernetes-preserve-unknown-fields: true
                properties:
                  # Configuration options for connecting to a shared Cloud Object Store.
                  # This store can be used for a variety of purposes, but we likely want to
                  # share it across all our services and use-cases since there are often
                  # resource limits in public cloud providers.
                  cloudObjectStorage:
                    type: object
                    properties:
                      # ID of cloud storage container (e.g. an S3 bucket).
                      dataStoreId:
                        type: string
                      # Region where the data store lives, if applicable.
                      dataStoreRegion:
                        type: string
                      # ID of the role that should authorize the in-cluster k8s service account
                      # to for this object store (e.g. an AWS Role ARN)
                      roleId:
                        type: string
                  dbSecretName:
                    *dbComponentProperties
                  registry:
                    # Global image registry name for pull secret
                    type: string
                  imageUsername:
                    # Global image registry username for pull secret
                    type: string
                  imagePassword:
                    # Global image registry password for pull secret
                    type: string
                  imagePullSecret:
                    # Global image registry pull secret instead of credentials
                    type: string
                  repository:
                    # Global container registry and repository name
                    type: string
                  tag:
                    # Global container tag
                    type: string
                  pullPolicy:
                    # Global image pull policy
                    type: string
                  customImageNames:
                    # Use custom image names
                    type: boolean
                  enableExternalSecrets:
                    # Use external secrets names
                    type: boolean
                  externalIP:
                    # Static external IP address for ingress LoadBalancer
                    type: string
                  externalConsul:
                    # DNS name for external consul server
                    type: string
                  externalConsulIP:
                    # IP address for external consul server
                    type: string
                  externalDBName:
                    # DNS name for external mysql compliant database server
                    type: string
                  externalDbIP:
                    # IP address for external mysql compliant database server
                    type: string
                  externalTimescaleDBName:
                    # DNS name for external postgresql/timescaledb database server
                    type: string
                  externalTimescaleDBIP:
                    # IP address for external postgresql/timescaledb compliant database server
                    type: string
                  externalPostgresName:
                    # DNS name for external postgresql database server
                    type: string
                  externalPostgresIP:
                    # IP address for external postgresql database server
                    type: string
                  externalInfluxDBName:
                    # DNS name for external influx database server
                    type: string
                  externalKafka:
                    # DNS name for external kafka server
                    type: string
                  externalKafkaIP:
                    # IP address for external kafka server
                    type: string
                  externalRedis:
                    # DNS name for external Redis server
                    type: string
                  externalRedisIP:
                    # IP address for external Redis server
                    type: string
                  externalSyslog:
                    # DNS name and port for external syslog server
                    type: string
                  externalAuditLog:
                    # DNS name and port for external auditlog server
                    type: string
                  nodeSelector:
                    # Global pod nodeSelector list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  tolerations:
                    *componentTolerations
                  affinity:
                    *componentAffinity
                  annotations:
                    # Global pod annotations list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  labels:
                    # Global pod labels list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  serviceAnnotations:
                    # Global service annotations list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  # NOTE: this service mesh definition is similar to the one defined by the
                  # anchor (&serviceMesh) above, but I opted to NOT update the anchor with all the
                  # properties here due to the last-applied-configuration annotation size limit
                  # in k8s. If I put all the properties in this serviceMesh definition on the
                  # anchored one, these properties would get copied to all 170+ dereferences of
                  # the anchor, meaning the JSON size of the CRD would grow -significantly-.
                  # We shouldn't be limited to this size, but since many of our workflows use
                  # kubectl apply (rather than replace), we have to be careful of this for now.
                  serviceMesh:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                      authorizationPolicies:
                        type: object
                        properties:
                          # Defines which k8s principal should be allowed access to internal
                          # turbo services.
                          allowedPrincipal:
                            type: string
                          # If enabled, then create authorization policies that restrict
                          # incoming, outgoing namespace communication apart from defined rules.
                          enabled:
                            type: boolean
                          # If enabled, create the authorization policies, but only do a dry-run,
                          # meaning the policies aren't enforced, but access approvals and denials
                          # are logged for diagnostic purposes.
                          dryRun:
                            type: boolean
                  serviceLabels:
                    # Global service labels list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  readinessPeriodSecs:
                    # Global pod readiness period in seconds
                    type: integer
                  readinessTimeoutSecs:
                    # Global pod readiness timeout in seconds
                    type: integer
                  javaBaseOptions:
                    # Global java options override
                    type: string
                  debug:
                    # Global debug
                    type: boolean
                  logtostdout:
                    # Send logs to stdout of each microservices globally
                    type: boolean
                  persistentVolumeClaim: *persistentVolumeClaim
                  storageClassName: *storageClassName
                  serviceAccountName:
                    # Global serviceAccountName
                    type: string
                  storageAnnotations:
                    # Global pvc annotations list
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  storageSelector:
                    # Use StorageSelector for statically provisioned persistent volume
                    type: boolean
                  containerSecurityContext:
                    # Security context applied at the container level
                    type: object
                    properties:
                      allowPrivilegeEscalation:
                        # Whether a process can gain more privileges than its parent
                        type: boolean
                      privileged:
                        # Run container in privileged mode
                        type: boolean
                      readOnlyRootFilesystem:
                        # Whether the container root filesystem is read-only
                        type: boolean
                      runAsUser:
                        # UID to run the container process as
                        type: integer
                      capabilities:
                        # Linux capabilities to add or drop
                        type: object
                  securityContext:
                    # Security Context for persistent volumes
                    properties:
                      fsGroup:
                        # Group ID used for persisent volumes globally.
                        type: integer
                      runAsUser:
                        # UID to run the container process as
                        type: integer
                      runAsNonRoot:
                        # Require the container to run as a non-root user
                        type: boolean
                      seccompProfile:
                        # Seccomp profile configuration
                        type: object
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                  ingress:
                    properties:
                      domain:
                        # Optional wildcard domain to accept ingress requests for
                        type: string
                      annotations:
                        # Ingress service annotations list
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                      secrets:
                        # Array of certificates to be created for the ingress
                        items:
                          properties:
                            name:
                              # The name of the certificate secret
                              type: string
                            key:
                              # The cert key in pem format
                              type: string
                            certificate:
                              # The certificate in pem format
                              type: string
                          type: object
                        type: array
                    type: object
                  certmanager:
                    properties:
                      enabled:
                        # If set to true, use cert-manager
                        type: boolean
                      issuer:
                        # The name of the certification issuer
                        type: string
                    type: object
                  elk:
                    # Install ELK stack
                    type: boolean
                  databricks:
                    properties:
                      enabled:
                        type: boolean
                    type: object
                  deploymentMode:
                    type: string
                    # Deployment Mode for Turbonomic instance
                  enableDerivedAwsCredentialPath:
                    type: boolean
                  hostingMode:
                    type: string
                    # Whether the Turbonomic instance is managed by the client or IBM
                  hostingProvider:
                    type: string
                    # Cloud Provider on which Turbonomic instance is running
                  hostingPlatform:
                    type: string
                    # Information about the offering by the hosting provider
                  hostingRegion:
                    type: string
                    # Hosting Region in which the component is deployed
                  turboai:
                    type: object
                    properties:
                      secret:
                        type: string
                        # An optional opaque token encapsulating credentials to various services
                      config:
                        properties:
                          env.parameters:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                          feedback.label:
                            type: string
                          feedback.enabled:
                            type: boolean
                          milvus.user:
                            type: string
                          milvus.host:
                            type: string
                          milvus.port:
                            type: string
                          dynamodb.region:
                            type: string
                          watsonx.project_id:
                            type: string
                          watsonx.host:
                            type: string
                          feedback_service.table_name:
                            type: string
                            # The name of the database table where feedback data is stored.
                          tenant.id:
                            type: string
                            # called client id in the API
                          debug:
                            type: boolean
                            # set turboai in debug mode
                        type: object
                  telemetry:
                    type: object
                    properties:
                      enabled:
                        type: boolean
                        # Whether the necessary components are there to collect
                        # telemetry and store it locally. For telemetry to be sent
                        # anywhere, the UI checkbox needs to also be checked.
                      tolerations:
                        *componentTolerations
                      secret:
                        type: string
                        # An opaque token encapsulating one or more remote destinations
                        # for telemetry and the means to authenticate with them.
                      scrapeInterval:
                        type: string
                        # How often to collect telemetry, expressed in the Prometheus duration format
                      scrubbedLabels:
                        type: string
                        # Space-delimited list of labels to remove from each telemetry record
                      scrubbedKafkaTopic:
                        type: string
                        # Name of Kafka topic containing scrubbed telemetry records
                        # (do not change unless instructed to by customer support).
                      shareTelemetry:
                        type: string
                        # Telemetry sharing mode: FORCE_ON, FORCE_OFF, or USER_CHOICE (default)
                      automatic:
                        type: object
                        # Settings specific to automatic transmission of telemetry
                        properties:
                          enabled:
                            type: boolean
                            # Whether to enable the subsystem responsible for automatic
                            # transmission of telemetry. For telemetry to be sent
                            # anywhere, the UI checkbox needs to also be checked.
                          connector_name:
                            type: string
                            # The name of the Kinesis Kafka connector. WARNING: Changing this
                            # will cause all previously transmitted telemetry records to be
                            # retransmitted.
                          base_rate:
                            type: integer
                            # Maximum transmission rate in bytes/second (do not change
                            # unless instructed to by customer support).
                          batch_size:
                            type: integer
                            # Maximum number of records to send per batch (do not change
                            # unless instructed to by customer support).
                          batch_size_bytes:
                            type: integer
                            # Maximum number of bytes per batch (do not change unless
                            # instructed to by customer support).
                          cooldown_time:
                            type: integer
                            # Backoff time in seconds after transmission error (do not
                            # change unless instructed to by customer support).
                          decrease_factor:
                            type: number
                            # Amount to scale transmission rate after a transmission error
                            # (do not change unless instructed to by customer support).
                          error_retries:
                            type: integer
                            # Number of times to retry after a transmisstion error (do not
                            # change unless instructed to by customer support).
                          error_retry_delay:
                            type: number
                            # Time in seconds to wait before retransmitting (do not change
                            # unless instructed to by customer support).
                          increase_factor:
                            type: number
                            # Amount to scale when attempting to increase transmission
                            # rate (do not change unless instructed to by customer support).
                          log_level:
                            type: string
                            # Logging level: TRACE, DEBUG, INFO, WARN, ERROR
                          recovery_interval:
                            type: integer
                            # Amount of time to wait before attempting to increase
                            # transmission rate (do not change unless instructed to by
                            # customer support).
                      frontEnd:
                        type: object
                        # Settings specific to front-end telemetry
                        properties:
                          enabled:
                            type: boolean
                            # Whether to enable the subsystem responsible for collection
                            # of font-end telemetry. For telemetry to be sent anywhere,
                            # the UI checkbox needs to also be checked.
                      plg:
                        type: object
                        # Product Led Growth (PLG) configurations include AWS Prometheus parameters
                        properties:
                          enabled:
                            # If set to true will send metrics to AWS Prometheus remote endpoint
                            type: boolean
                          queue_config:
                            type: object
                            x-kubernetes-preserve-unknown-fields: true
                            # Number of samples to buffer per shard before we block reading of more samples from the WAL (write-ahead log).
                            # properties here correspond to the queue_config options at
                            # https://prometheus.io/docs/prometheus/latest/configuration/configuration/#remote_write
                            properties:
                              max_samples_per_send:
                                # Max samples per send
                                type: integer
                              max_shards:
                                # Max shards configures the maximum number of shards, or parallelism, Prometheus will use for each remote write queue
                                type: integer
                              capacity:
                                # Capacity controls how many samples are queued in memory per shard before blocking reading from the WAL (write-ahead log)
                                type: integer
                      metricFederatedSystem:
                        type: object
                        # write metrics of type 'turbo_*' to metric federated system as Thanos Prometheus in each environment dev, test and prod
                        properties:
                          enabled:
                            # If set to true will send metrics to metric federated system as Thanos Prometheus remote endpoint
                            type: boolean
                          authorization:
                            type: object
                            # authorization
                            properties:
                              type:
                                # Sets the `Authorization` header on every remote read request like bearer
                                type: string
                  turboLite:
                    type: object
                    # Configuration mode for turboLite
                    properties:
                      enabled:
                        type: boolean
                        # Whether to enable turboLite mode
                      testing:
                        type: boolean
                        # development testing mode for turbolite specific probes
                  theia:
                    type: object
                    # Configuration options related to collecting monitoring data from the XL instance
                    properties:
                      enabled:
                        type: boolean
                        # Whether to enable telemetry collection for observability
                      metrics:
                        type: object
                        # Configuration options for metric collection
                        properties:
                          enabled:
                            type: boolean
                            # Whether to enable remote writing to a centralized Prometheus server for monitoring
                          # Sets the AWS access and secret keys in the prometheus server deployment.
                          injectRemoteWriteCredentials:
                            type: boolean
                          prometheusUrl:
                            type: string
                            # The prometheus URL. This is expected to be an AWS managed Prometheus endpoint.
                          prometheusRegion:
                            type: string
                            # The region of the managed prometheus server.
                          queueConfig:
                            type: object
                            # The default remote write queue configuration
                            x-kubernetes-preserve-unknown-fields: true
                            properties:
                              max_samples_per_send:
                                # Max samples per send
                                type: integer
                              max_shards:
                                # Maximum number of shards that Prometheus will use for each remote write queue
                                type: integer
                              capacity:
                                # Number of samples queued in memory per shard before blocking reading from the write-ahead log
                                type: integer
                          remoteWriteConfigs:
                            type: array
                            # remote write configurations to the Theia prometheus endpoint
                            items:
                              type: object
                              properties:
                                jobId:
                                  type: string
                                  # regex of the target job label
                                metricNameRegex:
                                  type: string
                                  # regex of the __name__ label
                                queueConfig:
                                  type: object
                                  # queue configuration override, if present
                                  x-kubernetes-preserve-unknown-fields: true
                                  properties:
                                    max_samples_per_send:
                                      # Max samples per send
                                      type: integer
                                    max_shards:
                                      # Maximum number of shards that Prometheus will use for each remote write queue
                                      type: integer
                                    capacity:
                                      # Number of samples queued in memory per shard before blocking reading from the write-ahead log
                                      type: integer
                  redis:
                    type: object
                    properties:
                      passwordSecret:
                        type: object
                        properties:
                          name:
                            type: string
                          key:
                            type: string
                  containerCost:
                    type: object
                    # configurations across the container cost related components
                    properties:
                      cloudyCostLookBackPeriodInDays:
                        # Unified lookback period for container-cost-extractor,container-action-cost,cloudy-actions and action-orchestrator
                        type: integer
                      workflow:
                        # Indicates the usage of the container cost workflow in Turbo. Currently bypassed by CLOUDABILITY_PREMIUM deploymentMode
                        type: boolean
              # Enable Platform
              nginxingress:
                properties:
                  enabled:
                    # Enable nginx ingress
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                type: object
              openshiftingress:
                properties:
                  enabled:
                    # Enable Openshift routes
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                type: object
              platform:
                properties:
                  enabled:
                    # Enable platform components
                    type: boolean
                type: object
              control:
                properties:
                  enabled:
                    # Enable platform licensed components
                    type: boolean
                type: object
              kubeturbo:
                type: object
                properties:
                  enabled:
                    # Enable kubeturbo for the local k8s cluster
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                  targetConfig:
                    type: object
                    # Target configuration
                    properties:
                      targetName:
                        type: string
                  image:
                    *imageProperties
                  tolerations:
                    *componentTolerations
              prometurbo:
                properties:
                  enabled:
                    # Enable prometurbo for the local prometheus server
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                  targetName:
                    type: string
                  targetTypeSuffix:
                    type: string
                  businessApplications:
                    type: array
                    items:
                      type: object
                    x-kubernetes-preserve-unknown-fields: true
                  image:
                    *imageProperties
                  tolerations:
                    *componentTolerations
                  prometurbo:
                    properties:
                      resources:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                  turbodif:
                    properties:
                      image:
                        *imageProperties
                      resources:
                        type: object
                        x-kubernetes-preserve-unknown-fields: true
                    type: object
                type: object
              metron:
                properties:
                  enabled:
                    # Enable experimental time series data collection.
                    type: boolean
                  serviceMesh:
                    *serviceMesh
                type: object
              clickhouse:
                properties:
                  operator:
                    properties:
                      enabled:
                        type: boolean
                    type: object
                  keeper:

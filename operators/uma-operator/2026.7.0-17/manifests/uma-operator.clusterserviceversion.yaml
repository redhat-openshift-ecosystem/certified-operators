       globalDeployment:
         # If this is enabled then pod and cluster metrics are directly ingestion to DXO2.
         dxo2:
           ingestion: false
         # Below certificate properties are optional and can be configured by the users to use
         # corporate mandated CA, server and client TLS certificates. If not specified out of the box self-signed
         # TLS certificates are used by UMA for securing the apis.

         # Property to for specifying the base64 encoded CA certificate.
         caCert: ""
         # Property to for specifying the base64 encoded CA signed server certificate
         serverCert: ""
         # Property to for specifying the base64 encoded CA signed client certificate
         clientCert: ""
         # Property to for specifying the base64 encoded CA signed server certificate key
         serverKey: ""
         # Property to for specifying the base64 encoded CA signed client certificate key
         clientKey: ""
         mixedMode: "false"
         # Controls whether the containerinfo service communicates over HTTPS (TLS) or plain HTTP.
         containerInfoTlsEnabled: "true"
         # Property to hold the build tag of the agent
         buildTag: "26.7.1.17,990017"


         daemonset:
           # Node affinity rules for UMA Pods
           # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
           nodeAffinity: {}
           # Node labels for UMA Pods
           # Ref: https://kubernetes.io/docs/user-guide/node-selection/
           nodeSelector: {}
           # Additional tolerations for UMA pods
           # https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
           # Default toleration used by UMA
           tolerations:
             - effect: "NoSchedule"
               key: "node-role.kubernetes.io/master"
             - effect: "NoSchedule"
               key: "node-role.kubernetes.io/control-plane"
             - effect: "NoSchedule"
               key: "node-role.kubernetes.io/storage"
             - effect: "NoSchedule"
               operator: "Exists"
             - effect: "NoExecute"
               operator: "Exists"

         deployment:
           # Node affinity rules for UMA Pods
           # Ref: https://kubernetes.io/docs/concepts/scheduling-eviction/assign-pod-node/#affinity-and-anti-affinity
           nodeAffinity: {}
           # Node labels for UMA Pods
           # Ref: https://kubernetes.io/docs/user-guide/node-selection/
           nodeSelector: {}
           # Additional tolerations for UMA pods
           # https://kubernetes.io/docs/concepts/scheduling-eviction/taint-and-toleration/
           # Default toleration used by UMA
           tolerations: []

         umaAgentACCController:
           enabled: true
         umaAgentACCUpgrade:
           enabled: false

       sustainabilityEvents:
         # turn sustainabilityEvents enabled to true for sending sustainability events to OI
         enabled: false

       # ============================================================================
       # Fluent Bit logging configuration
       # Top-level section — maps directly to Helm chart's logging: key.
       # ============================================================================
       logging:
         fluentBit:
           enabled: false
           # When true, injects a Fluent Bit sidecar into auto-attached pods.
           # When false, only the DaemonSet collects logs.
           sidecarInjectionEnabled: false

           # Pod labels added to all UMA pods when Fluent Bit is enabled.
           podLabels:
             logformat: custom
             logtype: agent

           image:
             repository: caapm/fluentbit
             tag: "25.11.1.1"
             pullPolicy: IfNotPresent

           logLevel: "info"
           path: "/var/log/containers/*_{{ .Release.Namespace }}_*.log"
           excludePath: "/var/log/containers/*fluentbit*.log"
           linuxMountPath: /var
           db: "/var/log/flb_kube.db"
           criEnabled: true
           k8sBufferSize: "32k"
           k8sLoggingExclude: "false"
           retryLimit: 5

           useClusterInfo: true
           fallbackToAPI: true
           clusterInfo:
             serviceName: "clusterinfo"
             namespace: ""
             port: "8080"
             scheme: "http"

           persistence:
             mode: "hostPath"

           # Raw Fluent Bit config string (overrides structured config above).
           # Adds logtype/logformat fields required for DX SaaS custom indexing.
           config: |
             [SERVICE]
                 log_level    ${LOG_LEVEL}
                 flush        1
                 ipv6         on
                 HTTP_Server  On
                 HTTP_Listen  0.0.0.0
                 HTTP_Port    2020
             [INPUT]
                 Name              tail
                 Alias             la-tail
                 Tag               kube.*
                 Path              ${INCLUDE_PATH}
                 Exclude_Path      ${EXCLUDE_PATH}
                 Path_Key          filename
                 Mem_Buf_Limit     50MB
                 Skip_Long_Lines   On
                 Refresh_Interval  10
                 Read_from_Head    true
                 Ignore_Older      24h
                 Inotify_Watcher   false
                 DB                ${DB_PATH}
                 DB.sync           normal
                 DB.locking        false
             [FILTER]
                 Name                kubernetes
                 Match               kube.*
                 Kube_URL            https://kubernetes.default.svc.cluster.local:443
                 Merge_Log           Off
                 Merge_Log_Key       log_processed
                 K8S-Logging.Parser  On
                 K8S-Logging.Exclude On
                 Buffer_Size         0
                 Use_Kubelet         true
                 Kubelet_Port        10250
                 TLS.Verify          Off
             [FILTER]
                 Name    modify
                 Match   *
                 Add     tenant_id   ${TENANT_ID}
                 Add     logtype     agent
                 Add     logformat   custom
             [OUTPUT]
                 Name              http
                 Match             *
                 Host              ${LOGSTASH_HOST}
                 Port              ${LOGSTASH_PORT}
                 URI               /la/v2/api/ingestion/logs
                 Format            json
                 json_date_key     timestamp
                 json_date_format  iso8601

           resources:
             limits:
               cpu: "500m"
               memory: "128Mi"
             requests:
               cpu: "250m"
               memory: "64Mi"
           nodeSelector: {}
           tolerations:
             - operator: "Exists"
               effect: "NoSchedule"
             - operator: "Exists"
               effect: "NoExecute"
           extraEnv: []
           extraVolumeMounts: []
           extraVolumes: []

       # ========================================================================
       # DX OpenTelemetry Collector (dx-otel-collector subchart; Chart.yaml)
       # Aligned with dx-otel-collector/helm-charts/values.yaml (child chart 0.1.0).
       # Override as needed. Does not by itself change the UMA or subchart version in Chart.yaml.
       # ========================================================================
       dx-otel-collector:
         enabled: false
         # Default values for dx-otel-collector.
         # This is a YAML-formatted file.
         # Declare variables to be passed into your templates.

         fullnameOverride: "dx-otel-collector"

         # OTLP gateway URL for export; requires both host and port host:port
         dxo2GatewayEndpoint: ""

         # DXO2_AGENT_TOKEN: mirror root agentManager.credentialSecret (subchart scope). Secret vs caaiops ConfigMap.
         agentManager:
           credentialSecret:
             enabled: false
             name: "caaiops-uma-credential"
             key: "agentManager.credential"

         # Valid values are "daemonset" and "deployment".
         mode: deployment

         # Presets only cover components present in the OCB build (builder-config.yaml).
         presets:
           kubernetesAttributes:
             enabled: false
             extractAllPodLabels: false
             extractAllPodAnnotations: false

           # DX distribution components compiled into the binary (see dx-otel-collector/builder-config.yaml).
           # When enabled: false, the chart removes that component from merged `config`. Ignored when
           # alternateConfig is non-empty. memory_limiter and batch are not toggled here.
           bundledComponents:
             otlpReceiver:
               enabled: true
             otlpExporter:
               enabled: true
             prometheusSelfMonitoring:
               enabled: true
             spanMetrics:
               enabled: true
             k8sAttributesProcessor:
               enabled: true
             resourceProcessor:
               enabled: true
             transformTruncate:
               enabled: true
             debugExporter:
               enabled: false
             fileExporters:
               enabled: false
             pprofExtension:
               enabled: true

         configMap:
           # Specifies whether a configMap should be created (true by default)
           create: true
           # Specifies an existing ConfigMap to be mounted to the pod
           # The ConfigMap MUST include the collector configuration via a key named 'relay' or the collector will not start.
           # This also supports template content, which will eventually be converted to yaml.
           existingName: ""
           # Specifies the relative path to custom ConfigMap template file. This option SHOULD be used when bundling a custom
           # ConfigMap template, as it enables pod restart via a template checksum annotation.
           # existingPath: ""

         # Base collector configuration (same structure as the upstream opentelemetry-collector chart).
         # Supports Helm templating. To escape literal {{ }}, use {{` <original content> `}}.
         #
         # The default binary is built from ../../builder-config.yaml (OCB). Receivers/exporters that are
         # not compiled in must stay commented here until you add the module to builder-config.yaml and rebuild.
         #
         # Presets (kubernetesAttributes, bundledComponents) merge on top of this block when applicable.
         config:
           extensions:
             health_check:
               endpoint: ${env:MY_POD_IP}:13133
             pprof:
               endpoint: ${env:MY_POD_IP}:1777

           receivers:
             otlp:
               protocols:
                 grpc:
                   endpoint: ${env:MY_POD_IP}:4317
                   include_metadata: true
                   max_recv_msg_size_mib: 32
                   keepalive:
                     server_parameters:
                       max_connection_age: 30s
                       max_connection_age_grace: 5s
                       time: 10s
                       timeout: 5s
                 http:
                   endpoint: ${env:MY_POD_IP}:4318
                   include_metadata: true

             prometheus:
               config:
                 scrape_configs:
                   - job_name: otelcol
                     scrape_interval: 30s
                     static_configs:
                       - targets:
                           - ${env:MY_POD_IP}:8888
                     metric_relabel_configs:
                       - source_labels: [__name__]
                         regex: ".*grpc_io.*"
                         action: drop
                       - target_label: dxotel_internal
                         replacement: "true"
                       - target_label: otelcol_name
                         replacement: "${env:UMA_CLUSTER_NAME}"
                       - target_label: otelcol_connector_name
                         replacement: "OpenTelemetry"
                       - target_label: otelcol_hostname
                         replacement: "${env:OTEL_K8S_POD_NAME}"
                       - source_labels: [otelcol_name, otelcol_connector_name, otelcol_hostname]
                         separator: "|"
                         target_label: broadcomAgentTriplet

           connectors:
             spanmetrics:
               histogram:
                 explicit:
                   buckets: [2ms, 6ms, 10ms, 25ms, 50ms, 100ms, 250ms, 500ms, 1000ms, 2500ms, 5000ms, 10000ms]
               dimensions:
                 - name: http.method
                 - name: http.status_code
                 - name: http.request.method
                 - name: http.response.status_code
                 - name: http.route
                 - name: net.host.name
                 - name: server.address
                 - name: db.system
                 - name: db.name
                 - name: db.operation
                 - name: rpc.system
                 - name: rpc.service
                 - name: rpc.method
                 - name: peer.service
                 - name: messaging.system
                 - name: messaging.destination.name
               aggregation_temporality: AGGREGATION_TEMPORALITY_DELTA
               metrics_expiration: 5m
               exemplars:
                 enabled: true
                 max_per_data_point: 1
               resource_metrics_key_attributes:
                 - service.name
                 - telemetry.sdk.language
                 - telemetry.sdk.name
               aggregation_cardinality_limit: 20000

           processors:
             memory_limiter:
               check_interval: 1s
               limit_percentage: 75
               spike_limit_percentage: 25
             batch:
               timeout: 10s
               send_batch_size: 100
               send_batch_max_size: 1000
             k8sattributes:
               auth_type: serviceAccount
               passthrough: false
               extract:
                 metadata:
                   - k8s.pod.name
                   - k8s.pod.uid
                   - k8s.pod.start_time
                   - k8s.namespace.name
                   - k8s.node.name
                   - k8s.deployment.name
                   - k8s.replicaset.name
                   - k8s.statefulset.name
                   - k8s.daemonset.name
                 labels:
                   - tag_name: k8s.pod.labels.app
                     key: app
                     from: pod
                 annotations:
                   - tag_name: k8s.pod.annotations.version
                     key: app.version
                     from: pod
               pod_association:
                 - sources:
                     - from: resource_attribute
                       name: k8s.pod.ip
                 - sources:
                     - from: resource_attribute
                       name: k8s.pod.name
                 - sources:
                     - from: connection
             resource/otlp:
               attributes:
                 - key: collector.name
                   value: dx-otel-collector
                   action: upsert
                 - key: k8s.cluster.name
                   value: "${env:UMA_CLUSTER_NAME}"
                   action: upsert
                 - key: k8s.pod.name
                   value: "${env:OTEL_K8S_POD_NAME}"
                   action: insert
                 - key: k8s.namespace.name
                   value: "${env:OTEL_K8S_NAMESPACE}"
                   action: insert
                 - key: k8s.node.name
                   value: "${env:OTEL_K8S_NODE_NAME}"
                   action: insert
                 - key: agentIsConnected
                   value: true
                   action: insert
             resource/selfmon:
               attributes:
                 - key: collector.name
                   value: dx-otel-collector
                   action: upsert
             transform/truncate:
               trace_statements:
                 - context: resource
                   statements:
                     - truncate_all(attributes, 1024)
                 - context: span
                   statements:
                     - truncate_all(attributes, 1024)
                 - context: spanevent
                   statements:
                     - truncate_all(attributes, 1024)
               metric_statements:
                 - context: resource
                   statements:
                     - truncate_all(attributes, 1024)
                 - context: datapoint
                   statements:
                     - truncate_all(attributes, 1024)
               log_statements:
                 - context: resource
                   statements:
                     - truncate_all(attributes, 1024)
                 - context: log
                   statements:
                     - truncate_all(attributes, 1024)
             transform/sanitize_http_semconv:
               error_mode: ignore
               trace_statements:
                 - context: span
                   statements:
                     - set(attributes["http.method"], attributes["http.request.method"]) where attributes["http.method"] == nil and attributes["http.request.method"] != nil
                     - set(attributes["http.request.method"], attributes["http.method"]) where attributes["http.request.method"] == nil and attributes["http.method"] != nil
                     - set(attributes["http.status_code"], attributes["http.response.status_code"]) where attributes["http.status_code"] == nil and attributes["http.response.status_code"] != nil
                     - set(attributes["http.response.status_code"], attributes["http.status_code"]) where attributes["http.response.status_code"] == nil and attributes["http.status_code"] != nil
                     - set(attributes["http.route"], attributes["url.path"]) where attributes["http.route"] == nil and attributes["url.path"] != nil
                     - set(attributes["http.route"], attributes["http.target"]) where attributes["http.route"] == nil and attributes["http.target"] != nil

           exporters:
             debug:
               verbosity: normal
             otlp:
               endpoint: ${env:DXO2_GATEWAY_ENDPOINT}
               tls:
                 insecure: true
               headers:
                 Authorization: "Bearer ${env:DXO2_AGENT_TOKEN}"
               timeout: 30s
               compression: gzip
               retry_on_failure:
                 enabled: true
                 initial_interval: 5s
                 max_interval: 30s
                 max_elapsed_time: 300s
               sending_queue:
                 enabled: true
                 num_consumers: 10
                 queue_size: 1000
             file/traces:
               path: /usr/local/dxotel-collector/logs/traces-dump.json
               rotation:
                 max_megabytes: 10
                 max_days: 3
                 max_backups: 3
                 localtime: true
             file/logs:
               path: /usr/local/dxotel-collector/logs/logs-dump.json
               rotation:
                 max_megabytes: 10
                 max_days: 3
                 max_backups: 3
                 localtime: true

           service:
             extensions: [health_check, pprof]
             telemetry:
               metrics:
                 level: detailed
                 readers:
                   - pull:
                       exporter:
                         prometheus:
                           host: ${env:MY_POD_IP}
                           port: 8888
             pipelines:
               traces:
                 receivers: [otlp]
                 processors: [memory_limiter, k8sattributes, resource/otlp, transform/truncate, transform/sanitize_http_semconv, batch]
                 exporters: [debug, file/traces, spanmetrics, otlp]
               metrics:
                 receivers: [otlp]
                 processors: [memory_limiter, k8sattributes, resource/otlp, transform/truncate, batch]
                 exporters: [debug, otlp]
               metrics/selfmon:
                 receivers: [prometheus]
                 processors: [memory_limiter, resource/selfmon, transform/truncate, batch]
                 exporters: [debug, otlp]
               metrics/spanmetrics:
                 receivers: [spanmetrics]
                 processors: [memory_limiter, k8sattributes, resource/otlp, transform/truncate, batch]
                 exporters: [debug, otlp]
               logs:
                 receivers: [otlp]
                 processors: [memory_limiter, k8sattributes, resource/otlp, transform/truncate, batch]
                 exporters: [debug, file/logs, otlp]

         image:
           # Default image for the Broadcom DX distribution (override repository/tag as needed).
           repository: caapm/dx-otel-collector
           pullPolicy: Always
           # Overrides the image tag whose default is the chart appVersion.
           tag: "26.7.1-2"
         imagePullSecrets: []

         extraEnvs: []

         # Configuration for ports
         # nodePort is also allowed
         ports:
           otlp:
             enabled: true
             containerPort: 4317
             servicePort: 4317
             hostPort: 4317
             protocol: TCP
             # nodePort: 30317
             appProtocol: grpc
           otlp-http:
             enabled: true
             containerPort: 4318
             servicePort: 4318
             hostPort: 4318
             protocol: TCP
           metrics:
             # Enable for in-cluster Prometheus scraping of collector self-metrics.
             enabled: true
             containerPort: 8888
             servicePort: 8888
             protocol: TCP
           pprof:
             enabled: true
             containerPort: 1777
             servicePort: 1777
             protocol: TCP

         # When enabled, the chart will set the GOMEMLIMIT env var to 80% of the configured resources.limits.memory.
         # If no resources.limits.memory are defined then enabling does nothing.
         # It is HIGHLY recommend to enable this setting and set a value for resources.limits.memory.
         useGOMEMLIMIT: true

         # Resource limits & requests.
         # It is HIGHLY recommended to set resource limits.
         resources:
           requests:
             cpu: 100m
             memory: 256Mi
           limits:
             cpu: 1000m
             memory: 1Gi
         podAnnotations: {}

         # only used with deployment mode
         replicaCount: 1

         revisionHistoryLimit: 10

         annotations: {}

         # autoscaling is used only if mode is "deployment"
         autoscaling:
           enabled: false
           minReplicas: 1
           maxReplicas: 10
           behavior: {}
           targetCPUUtilizationPercentage: 80
           # targetMemoryUtilizationPercentage: 80
           # Supply an array of custom metrics to be used for autoscaling. It includes externalMetrics, objectMetrics, and podsMetrics.
           additionalMetrics: []

         rollout:
           rollingUpdate: {}
           # When 'mode: daemonset', maxSurge cannot be used when hostPort is set for any of the ports
           # maxSurge: 25%
           # maxUnavailable: 0
           strategy: RollingUpdate

       # ============================================================================
       # Log Collector Configuration (DX Operational Observability SaaS)
       # Top-level section — maps directly to Helm chart's log-collector: key.
       # Target custom index: ao_itoa_logs_cust_{logtype}_1
       # Pre-requisite: provision the logtype before deploying:
       #   curl -X POST \
       #     'https://<gateway>/loganalytics/internal/v1/api/customlog/provision?logtype=agent' \
       #     -H 'Authorization: Bearer <token>'
       # ============================================================================
       log-collector:
         enabled: false
         replicaCount: 1

         image:
           repository: caapm/logcollector
           tag: 25.11.1.2
           pullPolicy: IfNotPresent

         config:
           debug:
             enabled: false

           fileLogging:
             enabled: true
             fileSizeInMB: 50
             maxSizeInMB: 10

           # DX SaaS ingestion gateway URL (without path — pipeline appends
           # /la/v2/api/ingestion/logs to route to the custom index).
           # US: https://logs-gateway.dxi-na1.saas.broadcom.com
           # EU: https://logs-gateway.dxi-eu1.saas.broadcom.com
           ingestion:
             url: "https://logs-gateway.dxi-na1.saas.broadcom.com"

           sslVerificationMode: "full"

           # REQUIRED: Bearer token from DX SaaS portal (same as agentManager.credential)
           authorization: ""

           # REQUIRED: Tenant ID from DX SaaS portal (same as agentManager.tenantId)
           tenantId: ""

           instanceName: "log-collector-uma"

           # Supportability endpoint — must match agentManager.url region.
           # US: https://apmgw.dxi-na1.saas.broadcom.com
           # EU: https://apmgw.dxi-eu1.saas.broadcom.com
           supportabilityUrl: ""

           metricsFlushInterval: 300

           proxy:
             enabled: false
             hostname: ""
             port: ""
             password: ""
             passwordEncrypted: false

           ports:
             syslog: 6514         # TCP syslog
             syslogUdp: 5140      # UDP syslog
             beats: 5044          # Filebeat / Fluent Bit beats
             httpIngestion: 6060  # HTTP ingestion from Fluent Bit

           performance:
             batchSize: "b1000"
             workerThreads: "w16"
             batchDelay: 2000

         # Extra environment variables injected into the log-collector container.
         extraEnv:
           - name: LS_JAVA_OPTS
             value: "-Dlogstash.codecs.json.ecs_compatibility=disabled"
           # Uncomment to set a custom logtype for the DX SaaS custom index
           # (ao_itoa_logs_cust_{logtype}_1). Requires the logtype to be
           # provisioned first via the DX SaaS provision API.
           # - name: CUSTOM_LOG_TYPE
           #   value: "agent"

         # ── Custom pipeline override (disabled by default) ────────────────────
         # To override the built-in Logstash pipeline:
         #   1. Set configMap.create: true and provide pipeline content in data.
         #   2. Uncomment extraVolumeMounts and extraVolumes below.
         #
         # How it works: startup script reads /opt/caemm/logcollector/conf/,
         # merges into /opt/caemm/merged-conf/logcollector.conf, then Logstash
         # starts. Mounting via extraVolumeMounts replaces the file BEFORE merge.
         # ─────────────────────────────────────────────────────────────────────
         configMap:
           create: false   # Set to true when providing a custom pipeline below
           # data:
           #   "0001-logcollector-standard.conf": |
           #     input {
           #       http {
           #         host    => "${HTTP_INGESTION_HOST:0.0.0.0}"
           #         port    => "${HTTP_INGESTION_PORT:6060}"
           #         threads => "${HTTP_THREAD_COUNT:250}"
           #         type    => "fluentbit"
           #       }
           #       beats {
           #         port => "${LOGCOLLECTOR_BEATS_PORT:5044}"
           #         type => "beats"
           #       }
           #     }
           #     filter {
           #       if [type] == "fluentbit" {
           #         if [kubernetes][labels] {
           #           mutate {
           #             rename => {
           #               "[kubernetes][labels][logtype]"   => "logtype"
           #               "[kubernetes][labels][logformat]" => "logformat"
           #               "[kubernetes][namespace_name]"    => "k8s_namespace"
           #               "[kubernetes][pod_name]"          => "k8s_pod"
           #               "[kubernetes][container_name]"    => "k8s_container"
           #             }
           #           }
           #         }
           #         if ![logtype]   { mutate { add_field => { "logtype"   => "${CUSTOM_LOG_TYPE:agent}" } } }
           #         if ![logformat] { mutate { add_field => { "logformat" => "custom" } } }
           #       }
           #       if [type] == "beats" {
           #         if ![logtype]   { mutate { add_field => { "logtype"   => "${CUSTOM_LOG_TYPE:agent}" } } }
           #         if ![logformat] { mutate { add_field => { "logformat" => "custom" } } }
           #       }
           #       if ![timestamp] {
           #         mutate { add_field => { "timestamp" => "%{@timestamp}" } }
           #       }
           #       mutate { remove_field => ["type", "tags", "host"] }
           #     }
           #     output {
           #       http {
           #         url          => "${INGESTIONAPI_URL}/la/v2/api/ingestion/logs"
           #         http_method  => "post"
           #         format       => "json"
           #         content_type => "application/json"
           #         headers      => { "Authorization" => "${LOGCOLLECTOR_REQUEST_AUTHORIZATION}" }
           #         retry_failed    => true
           #         retryable_codes => [429, 500, 502, 503, 504]
           #       }
           #     }

         # Uncomment when configMap.create is set to true above.
         # extraVolumeMounts:
         #   - name: custom-pipeline
         #     mountPath: /opt/caemm/logcollector/conf/0001-logcollector-standard.conf
         #     subPath: 0001-logcollector-standard.conf
         #     readOnly: true

         # extraVolumes:
         #   - name: custom-pipeline
         #     configMap:
         #       name: uma-log-collector-config

         persistence:
           enabled: true
           storageClass: ""
           size: 10Gi
           existingClaim: ""
           accessMode: ReadWriteOnce

         resources:
           limits:
             cpu: "1"
             memory: 8Gi
           requests:
             cpu: 200m
             memory: 1Gi

         nodeSelector: {}
         tolerations: []

       # Custom CRD Monitoring Configuration
       # Enables generic monitoring of any Kubernetes Custom Resource Definition
       customCRDs:
         enabled: true  # Set to false to disable generic CRD monitoring
         definitions:
           # Argo Rollouts
           - kind: Rollout
             plural: rollouts
             apiGroup: argoproj.io
             apiVersion: v1alpha1
             enabled: true
             autoAttach:
               enabled: false # Set to true to enable auto attach for Argo Rollouts
               podTemplateSpecPath: "spec.template"
             metrics:
               # Spec Metrics
               - name: Desired Replicas
                 path: spec.replicas
               - name: Revision History Limit
                 path: spec.revisionHistoryLimit
               - name: Canary Steps
                 path: spec.strategy.canary.steps
               # Status Metrics
               - name: HPA Replicas
                 path: status.HPAReplicas
               - name: Available Replicas
                 path: status.availableReplicas
               - name: Current Step Index
                 path: status.currentStepIndex
               - name: Current Revision
                 path: status.observedGeneration
               - name: Ready Replicas
                 path: status.readyReplicas
               - name: Current Replicas
                 path: status.replicas
               - name: Updated Replicas
                 path: status.updatedReplicas
               - name: Health
                 path: status.phase
                 valueMapping:
                   "Healthy": 1
                   "Degraded": 0
                   "Progressing": 0
                   "Suspended": 0
                   "Paused": 0
           # Percona XtraDB Cluster Backup
           - kind: PerconaXtraDBClusterBackup
             plural: perconaxtradbclusterbackups
             apiGroup: pxc.percona.com
             apiVersion: v1
             enabled: false # Turned off by default
             nameReplace:
               regex: "-\\d{8}-\\d{6}$"
               replace: ""
             metrics:
               - name: Health
                 path: status.state
                 valueMapping:
                   "Succeeded": 1
                   "Failed": 0
                   "Starting": 2
                   "Running": 2
                   "StopCluster": 2
                   "Restoring": 2
                   "StartCluster": 2
                   "Point-in-time recovering": 2
                   "Preparing Cluster": 2
           # Percona XtraDB Cluster Restore
           - kind: PerconaXtraDBClusterRestore
             plural: perconaxtradbclusterrestores
             apiGroup: pxc.percona.com
             apiVersion: v1
             enabled: false # Turned off by default
             nameReplace:
               regex: "-\\d{8}-\\d{6}$"
               replace: ""
             metrics:
               - name: Health
                 path: status.state
                 valueMapping:
                   "Succeeded": 1
                   "Failed": 0
                   "Restoring": 2
                   "Starting": 2
                   "Stopping Cluster": 2
                   "Starting Cluster": 2
                   "Point-in-time recovering": 2
                   "Preparing Cluster": 2
           # Built-in: Broadcom Instrumentation CRD — always watched; provides per-namespace
           # technology-specific agent/attach overrides for the auto-attach workflow.
           - kind: Instrumentation
             plural: instrumentations
             apiGroup: broadcom.io
             apiVersion: v1alpha1
             enabled: true

  creationTimestamp:
  name: uma-operator.v2026.7.0-17
  namespace: placeholder
spec:
  apiservicedefinitions: {}
  customresourcedefinitions:
    owned:
    - kind: UniversalMonitoringAgent
      name: universalmonitoringagents.ca.broadcom.com
      version: v1alpha1
      description: The Universal Monitoring Agent for Kubernetes monitoring.
      displayName: DX APM Universal Monitoring Agent
  description: |
    The **DX APM Universal Monitoring Agent** for OpenShift acts as a single deployment that automatically discovers and monitors cloud and container infrastructures and containerized application processes. UMA for OpenShift discovers and monitors all the containers on a host. This capability allows to monitor both the Infrastructure ( like Node, Pods, Containers, Cluster Services etc ) and applications running on this infrastructure & correlate them together which can help the triager to isolate if the the problem is related to the application or infrastructure.

    For more information:
    https://techdocs.broadcom.com/us/en/ca-enterprise-software/it-operations-management/dx-apm-agents/SaaS/Universal-Monitoring-Agent/Install-the-Universal-Monitoring-Agent/Install-UMA-for-OpenShift.html

    **Usage**:
    ```
     apiVersion: ca.broadcom.com/v1alpha1
     kind: UniversalMonitoringAgent
     metadata:
       name: uma-monitor
     spec:
       agentManager:
         url: localhost:5001
         credential: ""
         credentialSecret:
           enabled: false
           name: "caaiops-uma-credential"
           key: "agentManager.credential"
         # Tenant ID for log collection - used by log collector and Fluent Bit
         # This should match the tenant ID configured in DX SaaS
         tenantId: ""
         cloudProxy:
           enabled: false
         httpProxy:
           host:
           port:
           username:
           password:
       # Name of the cluster.
       clusterName: DevelopmentCluster
       # Cluster type, either Kubernetes or Openshift.
       type: Openshift
       prefix: k8s

       # architecture This property defines the system architecture of the cluster where uma is being installed.
       # Example, if UMA is being installed on s390x machine set architecture as s390x.
       # supported values are amd64,s390x,arm64 Default: amd64
       architecture: amd64
       EnableResourceLimits: true

       # Deployment size configuration: small, medium, or large
       # This allows scaling resources across all UMA components
       deploymentSize: medium  # Options: small, medium, large

       # Base resource configuration for each component
       # These are the baseline resources that will be multiplied by the size multiplier
       #
       # RESOURCE PRECEDENCE (for backward compatibility during Helm upgrade):
       # 1. Direct resource values (e.g., monitor.container.dockerstats.daemonset.limits.cpu) - HIGHEST PRIORITY
       #    - If specified, these values are used directly (backward compatible with existing installations)
       #    - Existing installations with direct values will continue to work unchanged
       # 2. baseResources with sizeMultipliers - FALLBACK
       #    - Used when direct resource values are not specified
       #    - Resources = baseResources * sizeMultipliers[deploymentSize]
       #
       # MIGRATION PATH:
       # - To force baseResources system: Set baseResources.overrideWithBaseResources: true (ignores all individual resource settings)
       # - To use baseResources system: Remove/comment out direct resource values in component sections
       # - To keep existing behavior: Keep direct resource values (they take precedence when overrideWithBaseResources is false)
       # - baseResources values below match current defaults for smooth migration
       baseResources:
         # Set to true to force all components to use baseResources instead of individual resource settings
         overrideWithBaseResources: false
         # Daemonset (app-container-monitor) base resources
         daemonset:
           limits:
             cpu: "1"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # ClusterInfo deployment base resources
         clusterinfo:
           limits:
             cpu: "2"
             memory: "3000Mi"
           requests:
             cpu: "200m"
             memory: "800Mi"

         # DataReporter (container-monitor) deployment base resources
         dataReporter:
           limits:
             cpu: "2"
             memory: "2000Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # Prometheus deployment base resources
         prometheus:
           limits:
             cpu: "1"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # HTTP Collector deployment base resources
         httpCollector:
           limits:
             cpu: "2"
             memory: "3000Mi"
           requests:
             cpu: "2"
             memory: "500Mi"

         # Kafka monitor base resources
         kafka:
           limits:
             cpu: "1"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # AWS monitor base resources
         aws:
           limits:
             cpu: "2"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # IIB monitor base resources
         iib:
           limits:
             cpu: "2"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # IBM MQ monitor base resources
         ibmmq:
           limits:
             cpu: "2"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # ACC base resources
         acc:
           limits:
             cpu: "1"
             memory: "1024Mi"
           requests:
             cpu: "200m"
             memory: "300Mi"

         # Probe Auto Attach base resources
         probeAutoattach:
           limits:
             cpu: "1"
             memory: "200Mi"
           requests:
             cpu: "400m"
             memory: "80Mi"

       # Deployment size multipliers
       # Resources = baseResources * multiplier
       sizeMultipliers:
         small:
           cpu: 0.5
           memory: 0.5
         medium:
           cpu: 1.0
           memory: 1.0
         large:
           cpu: 2.0
           memory: 2.0

       role: common

       # Optional NetworkPolicy for clusters with default-deny networking (see templates/networkpolicy.yaml)
       networkPolicy:
         enabled: false
         kubernetesAPIServer:
           cidrs: []
         additionalEgress: []

       # Shared with subcharts.
       global:
         uma:
           role: common
           id: "1"

       monitor:
         application:
           autoattach:
             multiContainerSupport:
               enabled: false
             filterType: whitelist
             probe:
               enabled: true
               tlsEnabled: true
               webhookEnabled: false
               manageWebhookCaBundle: false
             # this feature leverages container metadata to resolve agent host name and agent name
             dynamicPropertyResolution:
               hostName: "{k8s_deployment_name},{k8s_statefulset_name},{k8s_daemonset_name},{k8s_deploymentconfig_name},{k8s_pod_name},ContainerHost"
               agentName: ""
               processName: ""
             java:
               enabled: true
               # The agentMode to enable to CSA Java Agent in UMA, it is lightweight agent than default java agent
               # csa - Containerized Service Architecture
               # default - Existing default java agent
               #agentMode: csa
               # The agentSidecarEnabled to enable to use sidecar approach for java-agent,
               # It auto creates new deployment revision with sidecar, and roll-out updated revision.
               agentSidecarEnabled: true
               agentStartupMode:
                 neoEnabled: true
                 neoDelay: 90
               propertiesOverride:
               customJdkTools:
                 enabled: false
                 # Provide your custom created jdk tools jar image name below.
                 imageName: ""
             dotnet:
               enabled: true
               propertiesOverride:
             nginx:
               enabled: true
             SSO:
               enabled: false
             # This feature for enabling auto attach node.js probe into node.js application deployment
             # nodejs.enabled - to switch on/off node.js application discovery and attach
             # enhancedInstrumentation - enables NODE_OPTIONS approach for probe injection (default: false)
             # NOTE: When enhancedInstrumentation is true, filterNpts and whitelistedProcesses are not needed
             #       as NODE_OPTIONS works at the Node.js runtime level for all processes automatically
             # filterNpts - Filters supported node process tools node and pm2 delimited by comma. Example "node,pm2"
             # whitelistedProcesses - to attach known Node.js processes using regex, use prefix with 'add:' to append to default list, otherwise it replaces with current ones.
             nodejs:
               enabled: false
               enhancedInstrumentation: false
               filterNpts: "node"
               whitelistedProcesses: |
                 add:["^node\\s+.*pm2-runtime\\s+.*\\.(yaml|yml|json|js).*$"]
             # This feature for enabling auto attach php probe into PHP application deployment
             # php.enabled - to switch on/off PHP application discovery and attach
             php:
               enabled: true
             # This feature for enabling auto attach python probe into Python application deployment
             # python.enabled - to switch on/off Python application discovery and attach
             python:
               enabled: false
               otel:
                 agent:
                   enabled: true
                   # OTEL agent env (used when agent.enabled: true)
                   # Image name for the OpenTelemetry Python autoinstrumentation operator (e.g., ghcr.io/open-telemetry/opentelemetry-operator/autoinstrumentation-python:0.62b1)
                   # The image should be present in the Kubernetes or OpenShift image registry.
                   # Available versions: https://github.com/open-telemetry/opentelemetry-operator/pkgs/container/opentelemetry-operator%2Fautoinstrumentation-python
                   imageName: ""
                   # Protocol to use for OTLP exporter (e.g., http/protobuf, grpc)
                   exporterOtlpProtocol: "http/protobuf"
           microservicesAgent:
             enabled: false
             enableKernelVersionCheck: true

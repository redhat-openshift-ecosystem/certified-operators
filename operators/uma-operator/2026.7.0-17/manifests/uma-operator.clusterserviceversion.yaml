apiVersion: operators.coreos.com/v1alpha1
kind: ClusterServiceVersion
metadata:
  labels:
    operatorframework.io/arch.amd64: supported
    operatorframework.io/arch.arm64: supported
    operatorframework.io/arch.s390x: supported
    operatorframework.io/os.linux: supported
  annotations:
    alm-examples: |-
      [
        {
          "apiVersion": "ca.broadcom.com/v1alpha1",
          "kind": "UniversalMonitoringAgent",
          "metadata": {
            "name": "uma-monitor"
          },
          "spec": {
            "EnableResourceLimits": true,
            "agentManager": {
              "cloudProxy": {
                "enabled": false
              },
              "credential": "",
              "credentialSecret": {
                "enabled": false,
                "key": "agentManager.credential",
                "name": "caaiops-uma-credential"
              },
              "httpProxy": {
                "host": "",
                "password": "",
                "port": "",
                "username": ""
              },
              "tenantId": "",
              "url": "localhost:5001"
            },
            "architecture": "amd64",
            "baseResources": {
              "acc": {
                "limits": {
                  "cpu": "1",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "aws": {
                "limits": {
                  "cpu": "2",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "clusterinfo": {
                "limits": {
                  "cpu": "2",
                  "memory": "3000Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "800Mi"
                }
              },
              "daemonset": {
                "limits": {
                  "cpu": "1",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "dataReporter": {
                "limits": {
                  "cpu": "2",
                  "memory": "2000Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "httpCollector": {
                "limits": {
                  "cpu": "2",
                  "memory": "3000Mi"
                },
                "requests": {
                  "cpu": "2",
                  "memory": "500Mi"
                }
              },
              "ibmmq": {
                "limits": {
                  "cpu": "2",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "iib": {
                "limits": {
                  "cpu": "2",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "kafka": {
                "limits": {
                  "cpu": "1",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              },
              "overrideWithBaseResources": false,
              "probeAutoattach": {
                "limits": {
                  "cpu": "1",
                  "memory": "200Mi"
                },
                "requests": {
                  "cpu": "400m",
                  "memory": "80Mi"
                }
              },
              "prometheus": {
                "limits": {
                  "cpu": "1",
                  "memory": "1024Mi"
                },
                "requests": {
                  "cpu": "200m",
                  "memory": "300Mi"
                }
              }
            },
            "cloudmonitoring": {
              "aws": {
                "accessKey": "",
                "enabled": false,
                "secretKey": "",
                "servicesList": ""
              }
            },
            "clusterName": "DevelopmentCluster",
            "customCRDs": {
              "definitions": [
                {
                  "apiGroup": "argoproj.io",
                  "apiVersion": "v1alpha1",
                  "autoAttach": {
                    "enabled": false,
                    "podTemplateSpecPath": "spec.template"
                  },
                  "enabled": true,
                  "kind": "Rollout",
                  "metrics": [
                    {
                      "name": "Desired Replicas",
                      "path": "spec.replicas"
                    },
                    {
                      "name": "Revision History Limit",
                      "path": "spec.revisionHistoryLimit"
                    },
                    {
                      "name": "Canary Steps",
                      "path": "spec.strategy.canary.steps"
                    },
                    {
                      "name": "HPA Replicas",
                      "path": "status.HPAReplicas"
                    },
                    {
                      "name": "Available Replicas",
                      "path": "status.availableReplicas"
                    },
                    {
                      "name": "Current Step Index",
                      "path": "status.currentStepIndex"
                    },
                    {
                      "name": "Current Revision",
                      "path": "status.observedGeneration"
                    },
                    {
                      "name": "Ready Replicas",
                      "path": "status.readyReplicas"
                    },
                    {
                      "name": "Current Replicas",
                      "path": "status.replicas"
                    },
                    {
                      "name": "Updated Replicas",
                      "path": "status.updatedReplicas"
                    },
                    {
                      "name": "Health",
                      "path": "status.phase",
                      "valueMapping": {
                        "Degraded": 0,
                        "Healthy": 1,
                        "Paused": 0,
                        "Progressing": 0,
                        "Suspended": 0
                      }
                    }
                  ],
                  "plural": "rollouts"
                },
                {
                  "apiGroup": "pxc.percona.com",
                  "apiVersion": "v1",
                  "enabled": false,
                  "kind": "PerconaXtraDBClusterBackup",
                  "metrics": [
                    {
                      "name": "Health",
                      "path": "status.state",
                      "valueMapping": {
                        "Failed": 0,
                        "Point-in-time recovering": 2,
                        "Preparing Cluster": 2,
                        "Restoring": 2,
                        "Running": 2,
                        "StartCluster": 2,
                        "Starting": 2,
                        "StopCluster": 2,
                        "Succeeded": 1
                      }
                    }
                  ],
                  "nameReplace": {
                    "regex": "-\\d{8}-\\d{6}$",
                    "replace": ""
                  },
                  "plural": "perconaxtradbclusterbackups"
                },
                {
                  "apiGroup": "pxc.percona.com",
                  "apiVersion": "v1",
                  "enabled": false,
                  "kind": "PerconaXtraDBClusterRestore",
                  "metrics": [
                    {
                      "name": "Health",
                      "path": "status.state",
                      "valueMapping": {
                        "Failed": 0,
                        "Point-in-time recovering": 2,
                        "Preparing Cluster": 2,
                        "Restoring": 2,
                        "Starting": 2,
                        "Starting Cluster": 2,
                        "Stopping Cluster": 2,
                        "Succeeded": 1
                      }
                    }
                  ],
                  "nameReplace": {
                    "regex": "-\\d{8}-\\d{6}$",
                    "replace": ""
                  },
                  "plural": "perconaxtradbclusterrestores"
                },
                {
                  "apiGroup": "broadcom.io",
                  "apiVersion": "v1alpha1",
                  "enabled": true,
                  "kind": "Instrumentation",
                  "plural": "instrumentations"
                }
              ],
              "enabled": true
            },
            "deploymentSize": "medium",
            "dx-otel-collector": {
              "agentManager": {
                "credentialSecret": {
                  "enabled": false,
                  "key": "agentManager.credential",
                  "name": "caaiops-uma-credential"
                }
              },
              "annotations": {},
              "autoscaling": {
                "additionalMetrics": [],
                "behavior": {},
                "enabled": false,
                "maxReplicas": 10,
                "minReplicas": 1,
                "targetCPUUtilizationPercentage": 80
              },
              "config": {
                "connectors": {
                  "spanmetrics": {
                    "aggregation_cardinality_limit": 20000,
                    "aggregation_temporality": "AGGREGATION_TEMPORALITY_DELTA",
                    "dimensions": [
                      {
                        "name": "http.method"
                      },
                      {
                        "name": "http.status_code"
                      },
                      {
                        "name": "http.request.method"
                      },
                      {
                        "name": "http.response.status_code"
                      },
                      {
                        "name": "http.route"
                      },
                      {
                        "name": "net.host.name"
                      },
                      {
                        "name": "server.address"
                      },
                      {
                        "name": "db.system"
                      },
                      {
                        "name": "db.name"
                      },
                      {
                        "name": "db.operation"
                      },
                      {
                        "name": "rpc.system"
                      },
                      {
                        "name": "rpc.service"
                      },
                      {
                        "name": "rpc.method"
                      },
                      {
                        "name": "peer.service"
                      },
                      {
                        "name": "messaging.system"
                      },
                      {
                        "name": "messaging.destination.name"
                      }
                    ],
                    "exemplars": {
                      "enabled": true,
                      "max_per_data_point": 1
                    },
                    "histogram": {
                      "explicit": {
                        "buckets": [
                          "2ms",
                          "6ms",
                          "10ms",
                          "25ms",
                          "50ms",
                          "100ms",
                          "250ms",
                          "500ms",
                          "1000ms",
                          "2500ms",
                          "5000ms",
                          "10000ms"
                        ]
                      }
                    },
                    "metrics_expiration": "5m",
                    "resource_metrics_key_attributes": [
                      "service.name",
                      "telemetry.sdk.language",
                      "telemetry.sdk.name"
                    ]
                  }
                },
                "exporters": {
                  "debug": {
                    "verbosity": "normal"
                  },
                  "file/logs": {
                    "path": "/usr/local/dxotel-collector/logs/logs-dump.json",
                    "rotation": {
                      "localtime": true,
                      "max_backups": 3,
                      "max_days": 3,
                      "max_megabytes": 10
                    }
                  },
                  "file/traces": {
                    "path": "/usr/local/dxotel-collector/logs/traces-dump.json",
                    "rotation": {
                      "localtime": true,
                      "max_backups": 3,
                      "max_days": 3,
                      "max_megabytes": 10
                    }
                  },
                  "otlp": {
                    "compression": "gzip",
                    "endpoint": "${env:DXO2_GATEWAY_ENDPOINT}",
                    "headers": {
                      "Authorization": "Bearer ${env:DXO2_AGENT_TOKEN}"
                    },
                    "retry_on_failure": {
                      "enabled": true,
                      "initial_interval": "5s",
                      "max_elapsed_time": "300s",
                      "max_interval": "30s"
                    },
                    "sending_queue": {
                      "enabled": true,
                      "num_consumers": 10,
                      "queue_size": 1000
                    },
                    "timeout": "30s",
                    "tls": {
                      "insecure": true
                    }
                  }
                },
                "extensions": {
                  "health_check": {
                    "endpoint": "${env:MY_POD_IP}:13133"
                  },
                  "pprof": {
                    "endpoint": "${env:MY_POD_IP}:1777"
                  }
                },
                "processors": {
                  "batch": {
                    "send_batch_max_size": 1000,
                    "send_batch_size": 100,
                    "timeout": "10s"
                  },
                  "k8sattributes": {
                    "auth_type": "serviceAccount",
                    "extract": {
                      "annotations": [
                        {
                          "from": "pod",
                          "key": "app.version",
                          "tag_name": "k8s.pod.annotations.version"
                        }
                      ],
                      "labels": [
                        {
                          "from": "pod",
                          "key": "app",
                          "tag_name": "k8s.pod.labels.app"
                        }
                      ],
                      "metadata": [
                        "k8s.pod.name",
                        "k8s.pod.uid",
                        "k8s.pod.start_time",
                        "k8s.namespace.name",
                        "k8s.node.name",
                        "k8s.deployment.name",
                        "k8s.replicaset.name",
                        "k8s.statefulset.name",
                        "k8s.daemonset.name"
                      ]
                    },
                    "passthrough": false,
                    "pod_association": [
                      {
                        "sources": [
                          {
                            "from": "resource_attribute",
                            "name": "k8s.pod.ip"
                          }
                        ]
                      },
                      {
                        "sources": [
                          {
                            "from": "resource_attribute",
                            "name": "k8s.pod.name"
                          }
                        ]
                      },
                      {
                        "sources": [
                          {
                            "from": "connection"
                          }
                        ]
                      }
                    ]
                  },
                  "memory_limiter": {
                    "check_interval": "1s",
                    "limit_percentage": 75,
                    "spike_limit_percentage": 25
                  },
                  "resource/otlp": {
                    "attributes": [
                      {
                        "action": "upsert",
                        "key": "collector.name",
                        "value": "dx-otel-collector"
                      },
                      {
                        "action": "upsert",
                        "key": "k8s.cluster.name",
                        "value": "${env:UMA_CLUSTER_NAME}"
                      },
                      {
                        "action": "insert",
                        "key": "k8s.pod.name",
                        "value": "${env:OTEL_K8S_POD_NAME}"
                      },
                      {
                        "action": "insert",
                        "key": "k8s.namespace.name",
                        "value": "${env:OTEL_K8S_NAMESPACE}"
                      },
                      {
                        "action": "insert",
                        "key": "k8s.node.name",
                        "value": "${env:OTEL_K8S_NODE_NAME}"
                      },
                      {
                        "action": "insert",
                        "key": "agentIsConnected",
                        "value": true
                      }
                    ]
                  },
                  "resource/selfmon": {
                    "attributes": [
                      {
                        "action": "upsert",
                        "key": "collector.name",
                        "value": "dx-otel-collector"
                      }
                    ]
                  },
                  "transform/sanitize_http_semconv": {
                    "error_mode": "ignore",
                    "trace_statements": [
                      {
                        "context": "span",
                        "statements": [
                          "set(attributes[\"http.method\"], attributes[\"http.request.method\"]) where attributes[\"http.method\"] == nil and attributes[\"http.request.method\"] != nil",
                          "set(attributes[\"http.request.method\"], attributes[\"http.method\"]) where attributes[\"http.request.method\"] == nil and attributes[\"http.method\"] != nil",
                          "set(attributes[\"http.status_code\"], attributes[\"http.response.status_code\"]) where attributes[\"http.status_code\"] == nil and attributes[\"http.response.status_code\"] != nil",
                          "set(attributes[\"http.response.status_code\"], attributes[\"http.status_code\"]) where attributes[\"http.response.status_code\"] == nil and attributes[\"http.status_code\"] != nil",
                          "set(attributes[\"http.route\"], attributes[\"url.path\"]) where attributes[\"http.route\"] == nil and attributes[\"url.path\"] != nil",
                          "set(attributes[\"http.route\"], attributes[\"http.target\"]) where attributes[\"http.route\"] == nil and attributes[\"http.target\"] != nil"
                        ]
                      }
                    ]
                  },
                  "transform/truncate": {
                    "log_statements": [
                      {
                        "context": "resource",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      },
                      {
                        "context": "log",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      }
                    ],
                    "metric_statements": [
                      {
                        "context": "resource",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      },
                      {
                        "context": "datapoint",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      }
                    ],
                    "trace_statements": [
                      {
                        "context": "resource",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      },
                      {
                        "context": "span",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      },
                      {
                        "context": "spanevent",
                        "statements": [
                          "truncate_all(attributes, 1024)"
                        ]
                      }
                    ]
                  }
                },
                "receivers": {
                  "otlp": {
                    "protocols": {
                      "grpc": {
                        "endpoint": "${env:MY_POD_IP}:4317",
                        "include_metadata": true,
                        "keepalive": {
                          "server_parameters": {
                            "max_connection_age": "30s",
                            "max_connection_age_grace": "5s",
                            "time": "10s",
                            "timeout": "5s"
                          }
                        },
                        "max_recv_msg_size_mib": 32
                      },
                      "http": {
                        "endpoint": "${env:MY_POD_IP}:4318",
                        "include_metadata": true
                      }
                    }
                  },
                  "prometheus": {
                    "config": {
                      "scrape_configs": [
                        {
                          "job_name": "otelcol",
                          "metric_relabel_configs": [
                            {
                              "action": "drop",
                              "regex": ".*grpc_io.*",
                              "source_labels": [
                                "__name__"
                              ]
                            },
                            {
                              "replacement": "true",
                              "target_label": "dxotel_internal"
                            },
                            {
                              "replacement": "${env:UMA_CLUSTER_NAME}",
                              "target_label": "otelcol_name"
                            },
                            {
                              "replacement": "OpenTelemetry",
                              "target_label": "otelcol_connector_name"
                            },
                            {
                              "replacement": "${env:OTEL_K8S_POD_NAME}",
                              "target_label": "otelcol_hostname"
                            },
                            {
                              "separator": "|",
                              "source_labels": [
                                "otelcol_name",
                                "otelcol_connector_name",
                                "otelcol_hostname"
                              ],
                              "target_label": "broadcomAgentTriplet"
                            }
                          ],
                          "scrape_interval": "30s",
                          "static_configs": [
                            {
                              "targets": [
                                "${env:MY_POD_IP}:8888"
                              ]
                            }
                          ]
                        }
                      ]
                    }
                  }
                },
                "service": {
                  "extensions": [
                    "health_check",
                    "pprof"
                  ],
                  "pipelines": {
                    "logs": {
                      "exporters": [
                        "debug",
                        "file/logs",
                        "otlp"
                      ],
                      "processors": [
                        "memory_limiter",
                        "k8sattributes",
                        "resource/otlp",
                        "transform/truncate",
                        "batch"
                      ],
                      "receivers": [
                        "otlp"
                      ]
                    },
                    "metrics": {
                      "exporters": [
                        "debug",
                        "otlp"
                      ],
                      "processors": [
                        "memory_limiter",
                        "k8sattributes",
                        "resource/otlp",
                        "transform/truncate",
                        "batch"
                      ],
                      "receivers": [
                        "otlp"
                      ]
                    },
                    "metrics/selfmon": {
                      "exporters": [
                        "debug",
                        "otlp"
                      ],
                      "processors": [
                        "memory_limiter",
                        "resource/selfmon",
                        "transform/truncate",
                        "batch"
                      ],
                      "receivers": [
                        "prometheus"
                      ]
                    },
                    "metrics/spanmetrics": {
                      "exporters": [
                        "debug",
                        "otlp"
                      ],
                      "processors": [
                        "memory_limiter",
                        "k8sattributes",
                        "resource/otlp",
                        "transform/truncate",
                        "batch"
                      ],
                      "receivers": [
                        "spanmetrics"
                      ]
                    },
                    "traces": {
                      "exporters": [
                        "debug",
                        "file/traces",
                        "spanmetrics",
                        "otlp"
                      ],
                      "processors": [
                        "memory_limiter",
                        "k8sattributes",
                        "resource/otlp",
                        "transform/truncate",
                        "transform/sanitize_http_semconv",
                        "batch"
                      ],
                      "receivers": [
                        "otlp"
                      ]
                    }
                  },
                  "telemetry": {
                    "metrics": {
                      "level": "detailed",
                      "readers": [
                        {
                          "pull": {
                            "exporter": {
                              "prometheus": {
                                "host": "${env:MY_POD_IP}",
                                "port": 8888
                              }
                            }
                          }
                        }
                      ]
                    }
                  }
                }
              },
              "configMap": {
                "create": true,
                "existingName": ""
              },
              "dxo2GatewayEndpoint": "",
              "enabled": false,
              "extraEnvs": [],
              "fullnameOverride": "dx-otel-collector",

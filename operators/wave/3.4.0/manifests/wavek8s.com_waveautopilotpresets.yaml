apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    helm.sh/resource-policy: keep
  creationTimestamp: null
  name: waveautopilotpresets.wavek8s.com
spec:
  group: wavek8s.com
  names:
    kind: WaveAutopilotPreset
    plural: waveautopilotpresets
    singular: waveautopilotpreset
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: Auto-generated derived type for WaveAutopilotPresetSpec via `CustomResource`
        properties:
          spec:
            properties:
              applicationType:
                enum:
                - cpuIntensive
                - memoryIntensive
                type: string
              cooldownSeconds:
                description: Minimum seconds between consecutive scaling actions.
                format: uint32
                minimum: 0
                nullable: true
                type: integer
              cpuUtilizationBasis:
                description: |-
                  Which CPU basis (request vs limit) autopilot's utilization threshold is
                  evaluated against. Omitted defaults to `request`.
                enum:
                - request
                - limit
                - null
                nullable: true
                type: string
              fallbackCpuUtilization:
                description: Target CPU % for the fallback HPA when ML data is unavailable.
                  Default 80.
                format: double
                nullable: true
                type: number
              fallbackMemoryUtilization:
                description: Target memory % for the fallback path; unset = CPU-only
                  fallback.
                format: double
                nullable: true
                type: number
              fallbackOnly:
                description: |-
                  When true, autopilot only runs the fallback (threshold-based) scaling
                  path, skipping ML prediction. Omitted defaults to `false`.
                nullable: true
                type: boolean
              forecastHorizon:
                description: |-
                  Load-forecasting horizon written to the DB `forecast_horizon` column.
                  `0` = forecasting off (default). The UI/HTTP path sends `0`/`1` today,
                  but the column is an integer so larger horizon values are reserved for
                  future use. Omitted = 0.
                format: int64
                nullable: true
                type: integer
              gradualScaleInEnabled:
                description: Step scale-down gradually instead of dropping straight
                  to the target replica count.
                nullable: true
                type: boolean
              ignoreInitialMetricsSec:
                description: Warm-up period (s) after pod start during which metrics
                  are ignored.
                format: uint32
                minimum: 0
                nullable: true
                type: integer
              latency:
                description: Target latency budget (ms) for latency-aware scaling.
                format: uint64
                minimum: 0
                nullable: true
                type: integer
              load:
                description: |-
                  Demand driver the preset scales on (customPromql/requests/networkIn). Default `networkIn`.
                  (`loadPromql` is intentionally NOT exposed on presets — it is a deprecated field.)
                enum:
                - customPromql
                - requests
                - networkIn
                - null
                nullable: true
                type: string
              maxReplicas:
                format: uint32
                minimum: 0
                type: integer
              minReplicas:
                format: uint32
                minimum: 0
                type: integer
              stabilizationWindowSeconds:
                description: Look-back window (s) a scale-down recommendation must
                  hold before applying.
                format: uint32
                minimum: 0
                nullable: true
                type: integer
              strategy:
                type: string
              thresholds:
                description: Per-metric trigger thresholds for the preset.
                nullable: true
                properties:
                  cpu:
                    format: double
                    nullable: true
                    type: number
                  customMetric:
                    description: Threshold applied to the custom PromQL metric (load=customPromql).
                    format: double
                    nullable: true
                    type: number
                  memory:
                    format: double
                    nullable: true
                    type: number
                  networkIn:
                    description: Network-in threshold (bytes) for network-based load
                      tracking.
                    format: double
                    nullable: true
                    type: number
                  requests:
                    description: Requests-per-second threshold for request-based scaling.
                    format: double
                    nullable: true
                    type: number
                type: object
            required:
            - applicationType
            - maxReplicas
            - minReplicas
            - strategy
            type: object
            x-kubernetes-validations:
            - message: 'set at most one scaling adjustment: cooldownSeconds or stabilizationWindowSeconds
                (omit both for immediate scaling)'
              rule: '!(has(self.cooldownSeconds) && has(self.stabilizationWindowSeconds))'
          status:
            nullable: true
            properties:
              conditions:
                default: []
                items:
                  description: |-
                    Shared status condition shape — mirrors metav1.Condition.
                    Used by all 15 `WaveXStatus` structs (added in Tasks 6-8).

                    No `Default` derive on purpose: an all-empty-string condition (empty `type`/
                    `status`/`reason`) is never valid, so we never want one constructed implicitly.
                    `WaveXStatus` structs default their `conditions` to an empty `Vec`, which does
                    not require `WaveCondition: Default`.
                  properties:
                    lastTransitionTime:
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      type: string
                    type:
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              observedGeneration:
                format: int64
                nullable: true
                type: integer
            type: object
        required:
        - spec
        title: WaveAutopilotPreset
        type: object
    served: true
    storage: true
    subresources:
      status: {}
status:
  acceptedNames:
    kind: ""
    plural: ""
  conditions: null
  storedVersions: null

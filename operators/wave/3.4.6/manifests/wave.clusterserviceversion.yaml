      deployments:
        - label:
            app.kubernetes.io/managed-by: kustomize
            app.kubernetes.io/name: wave-autoscale
            control-plane: controller-manager
          name: wave-autoscale-controller-manager
          spec:
            replicas: 1
            selector:
              matchLabels:
                app.kubernetes.io/name: wave-autoscale
                control-plane: controller-manager
            strategy: {}
            template:
              metadata:
                annotations:
                  kubectl.kubernetes.io/default-container: manager
                labels:
                  app.kubernetes.io/name: wave-autoscale
                  control-plane: controller-manager
              spec:
                containers:
                  - args:
                      - --metrics-bind-address=:8443
                      - --leader-elect
                      - --leader-election-id=wave-autoscale
                      - --health-probe-bind-address=:8081
                    env:
                      - name: WA_IMAGE_TAG
                        value: 3.4.5-redhat
                      - name: WA_AGENT_TAG
                        value: 3.4.1-redhat
                      - name: WA_CADVISOR_TAG
                        value: v0.52.1-redhat

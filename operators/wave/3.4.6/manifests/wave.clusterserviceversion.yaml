  description: |-
    # Wave

    Wave is a Kubernetes **Day-2 operations platform** that delivers
    faster scaling and lower cost — end-to-end optimization from containers to
    traffic, driven by ML-based insights.

    This operator installs and lifecycle-manages the Wave stack on
    OpenShift via OLM by wrapping the certified `wave-autoscale-openshift` Helm
    chart. Create a single `Wave` custom resource to deploy and configure the
    stack (core engine, web console, intelligence service, and the metrics agent).

    ## What gets installed
    - **core** — autoscaling engine, API server, admission webhook
    - **web-console** — operator dashboard
    - **intelligence** — ML forecasting service
    - **agent** (DaemonSet) — node/Pod/container metrics collection

    ## Configuration
    The `Wave` CR spec mirrors the chart values; a license is required before the
    core service starts (set `spec.license.key` or `spec.license.existingSecret`).

    ## Day-2 configuration (separate CRDs)
    Autopilot, smart-sizing, flow, alerting and related behavior are configured
    through the `wavek8s.com` config CRDs, reconciled at runtime by the Wave core
    service (the operator installs those CRDs but does not reconcile them).
